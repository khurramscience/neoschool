<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Plant Life Cycle 🌱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#dcfce7 0%,#86efac 100%);color:#1a1612}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#15803d}
  .stars{display:flex;gap:4px;font-size:24px}.star{filter:grayscale(1);opacity:.35;transition:all .35s}.star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(18px,4.5vw,24px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 10px}
  .slots{display:flex;gap:8px;justify-content:center;margin-bottom:14px}
  .slot{flex:1;max-width:84px;aspect-ratio:1;border:3px dashed #86efac;border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#f0fdf4;position:relative}
  .slot .num{position:absolute;top:4px;left:8px;font-size:11px;font-weight:700;color:#15803d}
  .slot.filled{border-style:solid;border-color:#16a34a;background:#dcfce7;animation:popIn .3s}
  .slot .emoji{font-size:clamp(28px,7vw,40px)}
  @keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
  .stage-label{font-size:clamp(13px,3.3vw,16px);text-align:center;color:#166534;font-weight:600;margin-bottom:14px;min-height:20px}
  .tiles{flex:1;display:flex;flex-wrap:wrap;gap:10px;align-content:flex-start;justify-content:center}
  .tile{background:#fff;border:none;border-radius:16px;padding:14px;cursor:pointer;box-shadow:0 4px 0 #34d399;transition:all .15s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:4px;width:clamp(88px,28vw,120px)}
  .tile .emoji{font-size:clamp(32px,8vw,44px)}.tile .lb{font-size:clamp(12px,3vw,14px);font-weight:700;color:#15803d}
  .tile:active{transform:translateY(2px);box-shadow:0 2px 0 #34d399}
  .tile.used{opacity:.25;pointer-events:none}.tile.wrong{background:#fecaca;animation:shake .4s}
  @keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#15803d;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}.celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#166534;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="title">🌱 Plant Life Cycle</div>
    <div class="stars" id="stars"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div></div>
  <div class="question">Put the stages in order!</div>
  <div class="slots" id="slots"></div>
  <div class="stage-label" id="label">Tap the FIRST stage to start.</div>
  <div class="tiles" id="tiles"></div>
  <div class="help">A plant grows: seed → sprout → seedling → flower. Tap them in order!</div>
</div>
<div class="celebration" id="celebration"></div>
<script>
  // ordered stages (index = correct order)
  const STAGES=[{e:"🌰",l:"Seed"},{e:"🌱",l:"Sprout"},{e:"🌿",l:"Seedling"},{e:"🌻",l:"Flower"}];
  const slotsEl=document.getElementById("slots"),tilesEl=document.getElementById("tiles"),labelEl=document.getElementById("label"),starsEl=document.getElementById("stars"),celebration=document.getElementById("celebration");
  let stars=0,round=0,placed=0;
  let actx=null;function tone(f,d=.15,t="sine",v=.18){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.stop(actx.currentTime+d)}catch{}}
  const S={good:()=>tone(620+placed*80,.12,"triangle",.2),right:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.18,"triangle",.22),i*100))},wrong:()=>tone(220,.25,"sawtooth",.1),win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.22,"triangle",.25),i*120))}};
  function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.rate=.85;u.pitch=1.1;speechSynthesis.cancel();speechSynthesis.speak(u);}catch{}}
  function nextRound(){round++;placed=0;
    slotsEl.innerHTML=STAGES.map((_,i)=>`<div class="slot" id="slot${i}"><span class="num">${i+1}</span></div>`).join("");
    labelEl.textContent="Tap the FIRST stage to start.";
    const shuffled=STAGES.map((s,i)=>({...s,idx:i})).sort(()=>Math.random()-.5);
    tilesEl.innerHTML=shuffled.map(s=>`<button class="tile" data-idx="${s.idx}" onclick="tap(${s.idx},this)"><span class="emoji">${s.e}</span><span class="lb">${s.l}</span></button>`).join("");}
  window.tap=function(idx,btn){
    if(idx===placed){
      const slot=document.getElementById("slot"+placed);
      slot.innerHTML=`<span class="num">${placed+1}</span><span class="emoji">${STAGES[idx].e}</span>`;slot.classList.add("filled");
      btn.classList.add("used");S.good();speak(STAGES[idx].l);placed++;
      if(placed===STAGES.length){labelEl.textContent="🌻 A full life cycle!";S.right();stars++;lightStar(stars);post(true);if(stars>=5)setTimeout(win,800);else setTimeout(nextRound,1300);}
      else labelEl.textContent="What comes next?";
    }else{btn.classList.add("wrong");S.wrong();post(false);labelEl.textContent="Not yet — what comes first?";setTimeout(()=>btn.classList.remove("wrong"),400);}};
  function lightStar(n){const s=starsEl.querySelectorAll(".star");if(s[n-1])s[n-1].classList.add("lit");}
  function confettiBurst(){const c=["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];for(let i=0;i<50;i++){const e=document.createElement("div");e.className="confetti";e.style.left=Math.random()*100+"vw";e.style.background=c[Math.floor(Math.random()*c.length)];e.style.animationDelay=(Math.random()*.8)+"s";document.body.appendChild(e);setTimeout(()=>e.remove(),2600);}}
  function win(){S.win();confettiBurst();celebration.textContent="🎉 Garden scientist! 🎉";celebration.classList.add("show");post(true,true);setTimeout(()=>{celebration.classList.remove("show");stars=0;starsEl.querySelectorAll(".star").forEach(s=>s.classList.remove("lit"));nextRound();},2600);}
  function post(correct,complete=false){try{parent.postMessage({type:"labProgress",lab:"plant-life-cycle",round,correct,stars,complete},"*");}catch{}}
  nextRound();
</script>
</body>
</html>
