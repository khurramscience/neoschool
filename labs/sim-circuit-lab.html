<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Circuit Lab ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fef9c3,#fde047)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:600px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#a16207}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#a16207;box-shadow:0 2px 0 #facc15}
.task{background:#fff;border:3px solid #facc15;border-radius:16px;box-shadow:0 4px 0 #facc15;padding:10px 14px;text-align:center;font-size:clamp(14px,4vw,17px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;height:auto}
.sliders{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #facc15}
.srow label{font-weight:700;color:#a16207;min-width:96px;font-size:13px}
.srow input{flex:1;accent-color:#a16207;height:28px}
.srow .val{min-width:52px;text-align:right;font-weight:700;color:#1a1f3a;font-size:13px}
.check{min-height:52px;width:100%;background:#a16207;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.check:active{transform:translateY(2px)}
.fb{text-align:center;font-size:14px;font-weight:700;min-height:20px;margin-top:6px;color:#a16207}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#a16207}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#a16207;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">⚡ Circuit Lab</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 400 200" id="scene"></svg></div>
  <div class="sliders">
    <div class="srow"><label>🔋 Voltage</label><input type="range" id="volt" min="1" max="12" step="1" value="6"><span class="val" id="voltv">6 V</span></div>
    <div class="srow"><label>🎛️ Resistance</label><input type="range" id="res" min="1" max="12" step="1" value="6"><span class="val" id="resv">6 Ω</span></div>
  </div>
  <button class="check" id="check">Close the switch ⚡</button>
  <div class="fb" id="fb">Ohm's law: I = V ÷ R. More volts = more current; more resistance = less.</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><button id="ovNext">Next →</button></div>
<script>
const GAME={id:"sim-circuit-lab"};
function genChallenges(){
  const ch=[];const pairs=[];
  for(let v=1;v<=12;v++)for(let r=1;r<=12;r++){const i=v/r;if(Number.isInteger(i)&&i>=1&&i<=6)pairs.push({v,r,i});}
  const targets=[2,3,1,4,6];
  for(const tI of targets){const opts=pairs.filter(p=>p.i===tI);ch.push({target:tI,text:"Set the bulb to draw exactly <b>"+tI+" A</b> of current",sol:opts[Math.floor(Math.random()*opts.length)]});}
  return ch;
}
const CH=genChallenges();
let idx=0,score=0,tries=0;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch{}}return AC;}
function tone(f,t=.12,ty="sine",g=.15,w=0){const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime+w);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+w+t);o.connect(v).connect(c.destination);o.start(c.currentTime+w);o.stop(c.currentTime+w+t+.02);}
const CC=["#a16207","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch{}}
function render(){
  const v=+document.getElementById("volt").value,r=+document.getElementById("res").value;
  const i=+(v/r).toFixed(2);
  document.getElementById("voltv").textContent=v+" V";
  document.getElementById("resv").textContent=r+" Ω";
  const bright=Math.min(1,i/6);
  const glow=bright>0.05?"#fde047":"#9ca3af";
  let s='';
  // wire loop
  s+='<rect x="40" y="40" width="320" height="120" rx="10" fill="none" stroke="#334155" stroke-width="5"/>';
  // battery
  s+='<rect x="30" y="80" width="20" height="40" fill="#334155"/><line x1="40" y1="70" x2="40" y2="85" stroke="#334155" stroke-width="3"/><line x1="40" y1="115" x2="40" y2="130" stroke="#334155" stroke-width="7"/><text x="18" y="105" font-size="12" fill="#a16207" font-weight="bold">'+v+'V</text>';
  // resistor (zigzag) top
  s+='<polyline points="150,40 160,30 175,50 190,30 205,50 220,30 235,50 250,40" fill="none" stroke="#b45309" stroke-width="4"/><text x="200" y="22" font-size="11" text-anchor="middle" fill="#a16207" font-weight="bold">'+r+'Ω</text>';
  // bulb right
  s+='<circle cx="360" cy="100" r="22" fill="'+glow+'" stroke="#334155" stroke-width="3" opacity="'+(0.35+bright*0.65)+'"/>';
  if(bright>0.6)for(let k=0;k<8;k++){const a=k*Math.PI/4;s+='<line x1="'+(360+24*Math.cos(a))+'" y1="'+(100+24*Math.sin(a))+'" x2="'+(360+32*Math.cos(a))+'" y2="'+(100+32*Math.sin(a))+'" stroke="#fbbf24" stroke-width="2"/>';}
  // ammeter
  s+='<circle cx="200" cy="160" r="20" fill="#fff" stroke="#334155" stroke-width="3"/><text x="200" y="158" font-size="9" text-anchor="middle" fill="#334155" font-weight="bold">A</text><text x="200" y="170" font-size="11" text-anchor="middle" fill="#a16207" font-weight="bold">'+i.toFixed(1)+'</text>';
  document.getElementById("scene").innerHTML=s;
  document.getElementById("prog").textContent=(idx+1)+"/5";
  document.getElementById("score").textContent=score+" pts";
}
["volt","res"].forEach(id=>document.getElementById(id).oninput=render);
document.getElementById("check").onclick=()=>{
  const c=CH[idx];tries++;
  const v=+document.getElementById("volt").value,r=+document.getElementById("res").value;
  const i=v/r;
  if(Math.abs(i-c.target)<0.01){
    const pts=Math.max(15,45-(tries-1)*10);score+=pts;
    tone(660,.12);tone(880,.14,"sine",.15,.1);confetti(35);
    document.getElementById("fb").textContent="⚡ "+v+"V ÷ "+r+"Ω = "+c.target+"A!  (+"+pts+" pts)";
    document.getElementById("score").textContent=score+" pts";
    setTimeout(next,1300);
  } else {
    tone(200,.2,"triangle",.1);
    document.getElementById("fb").textContent=v+"V ÷ "+r+"Ω = "+i.toFixed(2)+"A — "+(i>c.target?"too much current. Raise resistance or lower voltage.":"too little. Lower resistance or raise voltage.");
  }
};
function load(){tries=0;document.getElementById("volt").value=6;document.getElementById("res").value=6;
  document.getElementById("task").innerHTML=CH[idx].text;
  document.getElementById("fb").textContent="Ohm's law: I = V ÷ R. More volts = more current; more resistance = less.";
  render();}
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Circuit engineer! 🏆";
    document.getElementById("ovScore").textContent=score+" pts · Ohm's law mastered";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ov").classList.add("show");return;}
  load();}
window.__qa={solve:()=>{const c=CH[idx];document.getElementById("volt").value=c.sol.v;document.getElementById("res").value=c.sol.r;render();document.getElementById("check").click();}};
load();
</script></body></html>
