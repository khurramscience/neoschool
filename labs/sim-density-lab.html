<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Density Dock 🛟</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#cffafe,#67e8f9)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:560px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#0e7490}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#0e7490;box-shadow:0 2px 0 #22d3ee}
.task{background:#fff;border:3px solid #22d3ee;border-radius:16px;box-shadow:0 4px 0 #22d3ee;padding:10px 14px;text-align:center;font-size:clamp(13.5px,4vw,17px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;max-height:100%}
.controls{display:flex;flex-direction:column;gap:7px;margin-top:6px}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #22d3ee}
.srow label{font-weight:700;color:#0e7490;min-width:92px;font-size:13px}
.srow input{flex:1;accent-color:#0e7490;height:28px}
.srow .val{min-width:52px;text-align:right;font-weight:700;font-size:13px}
.brow{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.bbtn{min-width:52px;min-height:44px;border:none;border-radius:12px;background:#fff;box-shadow:0 3px 0 #22d3ee;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;color:#0e7490;cursor:pointer;touch-action:manipulation;padding:6px 10px}
.bbtn.on{background:#0e7490;color:#fff}
.check{min-height:50px;width:100%;background:#0e7490;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:13px;font-weight:700;min-height:20px;margin-top:6px;color:#0e7490}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#0e7490}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#0e7490;color:#fff;border:none;border-radius:99px;padding:13px 28px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin:0 4px}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🛟 Density Dock</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 300 200" id="scene"></svg></div><div class="controls"><div class="srow"><label>⚖️ Mass</label><input type="range" id="m" min="1" max="12" step="1" value="6"><span class="val" id="mv">6 kg</span></div><div class="srow"><label>📦 Volume</label><input type="range" id="v" min="1" max="12" step="1" value="6"><span class="val" id="vv">6 L</span></div></div>
  <button class="check" id="check">Launch it 🛟</button>
  <div class="fb" id="fb">Density = mass ÷ volume. Below 1 floats, above 1 sinks (water = 1).</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><div><button id="ovNext">Play again ↻</button><button id="ovDone" style="background:#1a1f3a">Finish ✓</button></div></div>
<script>
const GAME={id:"sim-density-lab"};
let idx=0,score=0,tries=0,__perfects=0;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC;}
function tone(f,t,ty,g){t=t||.12;ty=ty||"sine";g=g||.15;const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+t);o.connect(v).connect(c.destination);o.start();o.stop(c.currentTime+t+.02);}
const CC=["#0e7490","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch(e){}}
function win(pts,msg){score+=pts;if(tries===1)__perfects++;tone(660,.12);tone(880,.14);confetti(30);
  document.getElementById("fb").textContent=msg+"  (+"+pts+" pts)";document.getElementById("score").textContent=score+" pts";setTimeout(next,1350);}
function lose(msg){tone(200,.2,"triangle",.1);document.getElementById("fb").textContent=msg;}
const CH=[
 {d:0.5,text:"🛟 Make a raft that floats <b>half out of the water</b> (density 0.5)"},
 {d:2,text:"⚓ Make an anchor: density exactly <b>2.0</b> — straight to the bottom"},
 {d:1,text:"🐟 Neutral like a fish: density exactly <b>1.0</b> — hovers anywhere"},
 {d:0.25,text:"🪵 Cork mode: density <b>0.25</b> — riding high"},
 {d:1.5,text:"🪨 A slow sinker: density <b>1.5</b>"},
];
function vals(){return {m:+document.getElementById("m").value,v:+document.getElementById("v").value};}
function render(){const {m,v}=vals();const d=m/v;
 document.getElementById("mv").textContent=m+" kg";document.getElementById("vv").textContent=v+" L";
 const size=22+v*3;
 let y; if(d<1)y=90-(1-Math.min(d,1))*size; else if(d===1)y=110; else y=Math.min(196-size,110+(d-1)*40);
 let s='<rect x="0" y="90" width="300" height="110" fill="#38bdf8" opacity="0.55"/><line x1="0" y1="90" x2="300" y2="90" stroke="#0e7490" stroke-width="2"/>';
 s+='<rect x="'+(150-size/2)+'" y="'+y+'" width="'+size+'" height="'+size+'" rx="6" fill="#b45309" stroke="#78350f" stroke-width="3"/>';
 s+='<text x="150" y="'+(y+size/2+5)+'" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">'+m+'kg</text>';
 s+='<text x="150" y="24" font-size="15" text-anchor="middle" fill="#0e7490" font-weight="bold">ρ = '+m+' ÷ '+v+' = '+(Math.round(d*100)/100)+'</text>';
 document.getElementById("scene").innerHTML=s;
 document.getElementById("prog").textContent=(idx+1)+"/5";document.getElementById("score").textContent=score+" pts";}
["m","v"].forEach(i=>document.getElementById(i).oninput=render);
function check(){const c=CH[idx];tries++;const {m,v}=vals();const d=m/v;
 if(Math.abs(d-c.d)<0.001)win(Math.max(15,45-(tries-1)*10),"🛟 Density "+c.d+" — exactly!");
 else lose("ρ = "+(Math.round(d*100)/100)+" — "+(d>c.d?"too dense. Less mass or more volume.":"too light. More mass or less volume."));}
function load(){tries=0;document.getElementById("m").value=6;document.getElementById("v").value=6;
 document.getElementById("task").innerHTML=CH[idx].text;
 document.getElementById("fb").textContent="Density = mass ÷ volume. Below 1 floats, above 1 sinks.";render();}
window.__qa={solve:()=>{const c=CH[idx];for(let m=1;m<=12;m++)for(let v=1;v<=12;v++)if(Math.abs(m/v-c.d)<0.001){document.getElementById("m").value=m;document.getElementById("v").value=v;render();check();return;}}};
document.getElementById("check").onclick=check;
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Density captain! 🏆";
    var st=__perfects>=5?5:__perfects>=4?4:__perfects>=3?3:__perfects>=2?2:1;
    document.getElementById("ovScore").textContent="⭐".repeat(st)+"☆".repeat(5-st)+"   "+(__perfects===5?"PERFECT RUN! ⚡  ":"")+score+" pts · why things float — mastered";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ovDone").onclick=()=>{try{parent.postMessage({type:"labExit"},"*")}catch(e){}if(window===window.top)try{history.back()}catch(e){}};
    document.getElementById("ov").classList.add("show");return;}
  load();}
load();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script>
<script>(function(){function post(kind,text){try{parent.postMessage({type:"labEvent",kind:kind,text:String(text).slice(0,140),ts:Date.now()},"*")}catch(e){}}
function watch(id,kind){var el=document.getElementById(id);if(!el)return;var last=el.textContent;new MutationObserver(function(){var t=el.textContent;if(t&&t!==last){last=t;post(kind,t)}}).observe(el,{childList:true,characterData:true,subtree:true})}
watch("fb","feedback");watch("task","challenge");watch("score","score");
document.addEventListener("click",function(e){var b=e.target.closest("button");if(b&&b.id!=="neoExit")post("action","clicked: "+(b.textContent||b.id).trim().slice(0,60))},true);
post("start","sim loaded: "+document.title);})();</script>
</body></html>
