<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Forces & Motion 🛷</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fef3c7,#fcd34d)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:600px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#b45309}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#b45309;box-shadow:0 2px 0 #fbbf24}
.task{background:#fff;border:3px solid #fbbf24;border-radius:16px;box-shadow:0 4px 0 #fbbf24;padding:10px 14px;text-align:center;font-size:clamp(14px,4vw,17px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;height:auto}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #fbbf24;margin-top:6px}
.srow label{font-weight:700;color:#b45309;min-width:96px;font-size:13px}
.srow input{flex:1;height:28px}
.srow .val{min-width:52px;text-align:right;font-weight:700;font-size:13px}
#force{accent-color:#dc2626}#mass{accent-color:#2563eb}
.check{min-height:50px;width:100%;background:#b45309;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:13.5px;font-weight:700;min-height:20px;margin-top:6px;color:#b45309}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#b45309}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#b45309;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🛷 Forces & Motion</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 400 200" id="scene"></svg></div>
  <div class="srow"><label>💪 Force</label><input type="range" id="force" min="0" max="20" step="1" value="0"><span class="val" id="forcev">0 N</span></div>
  <div class="srow"><label>📦 Mass</label><input type="range" id="mass" min="1" max="10" step="1" value="2"><span class="val" id="massv">2 kg</span></div>
  <button class="check" id="check">Push! ▶</button>
  <div class="fb" id="fb">Newton's 2nd law: acceleration = force ÷ mass (a = F/m).</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><button id="ovNext">Next →</button></div>
<script>
const GAME={id:"sim-forces-motion"};
function gen(){const ch=[];const pairs=[];
 for(let F=0;F<=20;F++)for(let m=1;m<=10;m++){const a=F/m;if(Number.isInteger(a)&&a>=1&&a<=6)pairs.push({F,m,a});}
 const targets=[2,3,1,4,5];
 for(const tA of targets){const o=pairs.filter(p=>p.a===tA);ch.push({target:tA,text:"Give the crate an acceleration of exactly <b>"+tA+" m/s²</b>",sol:o[Math.floor(Math.random()*o.length)]});}
 return ch;}
const CH=gen();
let idx=0,score=0,tries=0,anim=null;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch{}}return AC;}
function tone(f,t=.12,ty="sine",g=.15,w=0){const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime+w);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+w+t);o.connect(v).connect(c.destination);o.start(c.currentTime+w);o.stop(c.currentTime+w+t+.02);}
const CC=["#b45309","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch{}}
function draw(cx,F,m){
  const sz=20+m*5;
  let s='<rect x="0" y="150" width="400" height="50" fill="#d6b370"/>';
  for(let i=0;i<12;i++)s+='<line x1="'+(i*36-((cx*0.3)%36))+'" y1="150" x2="'+(i*36-((cx*0.3)%36)+18)+'" y2="150" stroke="#a1824a" stroke-width="3"/>';
  s+='<rect x="'+cx+'" y="'+(150-sz)+'" width="'+sz+'" height="'+sz+'" rx="5" fill="#92400e" stroke="#78350f" stroke-width="3"/><text x="'+(cx+sz/2)+'" y="'+(150-sz/2+5)+'" font-size="12" text-anchor="middle" fill="#fff" font-weight="bold">'+m+'kg</text>';
  if(F>0){s+='<line x1="'+(cx-F*4)+'" y1="'+(150-sz/2)+'" x2="'+cx+'" y2="'+(150-sz/2)+'" stroke="#dc2626" stroke-width="5"/><polygon points="'+cx+','+(150-sz/2)+' '+(cx-9)+','+(150-sz/2-6)+' '+(cx-9)+','+(150-sz/2+6)+'" fill="#dc2626"/><text x="'+(cx-F*2)+'" y="'+(150-sz/2-10)+'" font-size="11" text-anchor="middle" fill="#dc2626" font-weight="bold">'+F+'N</text>';}
  document.getElementById("scene").innerHTML=s;
}
document.getElementById("force").oninput=()=>{document.getElementById("forcev").textContent=document.getElementById("force").value+" N";draw(40,+document.getElementById("force").value,+document.getElementById("mass").value);};
document.getElementById("mass").oninput=()=>{document.getElementById("massv").textContent=document.getElementById("mass").value+" kg";draw(40,+document.getElementById("force").value,+document.getElementById("mass").value);};
document.getElementById("check").onclick=()=>{
  const c=CH[idx];tries++;
  const F=+document.getElementById("force").value,m=+document.getElementById("mass").value;
  const a=F/m;
  if(anim)clearInterval(anim);
  let cx=40,v=0;tone(300,.15,"square",.08);
  anim=setInterval(()=>{v+=a*0.06;cx+=v;draw(cx,F,m);if(cx>330){clearInterval(anim);settle();}},40);
  function settle(){
    if(Math.abs(a-c.target)<0.01){const pts=Math.max(15,45-(tries-1)*10);score+=pts;
      tone(660,.12);tone(880,.14,"sine",.15,.1);confetti(35);
      document.getElementById("fb").textContent="🚀 "+F+"N ÷ "+m+"kg = "+c.target+" m/s²!  (+"+pts+" pts)";
      document.getElementById("score").textContent=score+" pts";setTimeout(next,1300);
    } else { tone(200,.2,"triangle",.1); document.getElementById("fb").textContent=F+"N ÷ "+m+"kg = "+a.toFixed(2)+" m/s² — "+(a>c.target?"too fast. Less force or more mass.":a<c.target?"too slow. More force or less mass.":""); draw(40,F,m); }
  }
};
function load(){tries=0;document.getElementById("force").value=0;document.getElementById("mass").value=2;
  document.getElementById("forcev").textContent="0 N";document.getElementById("massv").textContent="2 kg";
  document.getElementById("task").innerHTML=CH[idx].text;
  document.getElementById("fb").textContent="Newton's 2nd law: acceleration = force ÷ mass (a = F/m).";
  document.getElementById("prog").textContent=(idx+1)+"/5";draw(40,0,2);}
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Physics force! 🏆";
    document.getElementById("ovScore").textContent=score+" pts · F = ma mastered";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ov").classList.add("show");return;}
  load();}
window.__qa={solve:()=>{const c=CH[idx];document.getElementById("force").value=c.sol.F;document.getElementById("mass").value=c.sol.m;
  document.getElementById("forcev").textContent=c.sol.F+" N";document.getElementById("massv").textContent=c.sol.m+" kg";document.getElementById("check").click();}};
load();
</script><button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script></body></html>
