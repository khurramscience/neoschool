<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Count the Critters! 🐰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fef3c7 0%,#fed7aa 100%);color:#1a1612;-webkit-font-smoothing:antialiased}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .title{font-size:22px;font-weight:700;color:#c25420}
  .stars{display:flex;gap:4px;font-size:24px}
  .star{filter:grayscale(1);opacity:.35;transition:all .35s}
  .star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(20px,5vw,28px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 14px}
  .stage{flex:1;background:#fff;border-radius:24px;border:3px solid #fdba74;display:grid;grid-template-columns:repeat(auto-fit,minmax(80px,1fr));gap:14px;padding:24px 18px;align-content:center;justify-items:center;min-height:200px;box-shadow:0 4px 0 #fdba74}
  .critter{font-size:clamp(38px,10vw,58px);animation:bob 1.4s ease-in-out infinite;cursor:pointer;transition:transform .2s}
  .critter:hover,.critter:active{transform:scale(1.15) rotate(6deg)}
  .critter.counted{animation:pulse 0.4s;filter:drop-shadow(0 0 8px rgba(217,98,43,.5))}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes pulse{50%{transform:scale(1.3)}}
  .choices{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:18px}
  .choice{aspect-ratio:1;background:#fff;border:none;border-radius:18px;font-family:'Quicksand',sans-serif;font-size:clamp(28px,7vw,42px);font-weight:700;color:#1a1f3a;cursor:pointer;box-shadow:0 4px 0 #d9622b;transition:all .15s;touch-action:manipulation}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #d9622b}
  .choice.wrong{background:#fecaca;animation:shake 0.4s}
  .choice.right{background:#bbf7d0;box-shadow:0 4px 0 #16a34a;color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#c25420;pointer-events:none;opacity:0;transition:opacity .25s;text-align:center;background:rgba(255,255,255,.85)}
  .celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#7a7367;text-align:center;margin-top:8px;font-weight:500}
  @media(max-width:380px){.choices{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">🐰 Count the Critters</div>
    <div class="stars" id="stars">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>
  </div>
  <div class="question" id="question">How many critters?</div>
  <div class="stage" id="stage"></div>
  <div class="choices" id="choices"></div>
  <div class="help">Tap each critter to count, then tap the number!</div>
</div>
<div class="celebration" id="celebration"></div>

<script>
  const ANIMALS = ["🐰","🐶","🐱","🐸","🐥","🦊","🐻","🐼","🦁","🐯","🐨","🐮","🐷","🐭","🐹"];
  const stage = document.getElementById("stage");
  const choicesEl = document.getElementById("choices");
  const questionEl = document.getElementById("question");
  const starsEl = document.getElementById("stars");
  const celebration = document.getElementById("celebration");
  let stars = 0;
  let target = 0;
  let round = 0;

  // Web Audio for friendly sound effects (no asset loading)
  let audioCtx = null;
  function tone(freq, dur=0.15, type="sine", vol=0.18) {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
      o.stop(audioCtx.currentTime + dur);
    } catch {}
  }
  const sounds = {
    count: () => tone(660 + Math.random()*120, 0.08, "sine"),
    right: () => { [523, 659, 784].forEach((f,i) => setTimeout(() => tone(f, 0.18, "triangle", 0.22), i*100)); },
    wrong: () => tone(220, 0.25, "sawtooth", 0.1),
    win:   () => { [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.22, "triangle", 0.25), i*120)); },
  };

  function nextRound() {
    round++;
    target = Math.floor(Math.random() * 9) + 2; // 2-10
    const animal = ANIMALS[Math.floor(Math.random() * ANIMALS.length)];
    questionEl.textContent = `How many ${animal} do you see?`;

    stage.innerHTML = "";
    for (let i = 0; i < target; i++) {
      const c = document.createElement("div");
      c.className = "critter";
      c.style.animationDelay = (Math.random() * 1.2) + "s";
      c.textContent = animal;
      c.onclick = () => { c.classList.add("counted"); sounds.count(); setTimeout(() => c.classList.remove("counted"), 400); };
      stage.appendChild(c);
    }

    // 4 choices including the right one
    const opts = new Set([target]);
    while (opts.size < 4) opts.add(Math.max(1, Math.min(10, target + (Math.random()<0.5?-1:1) * (Math.floor(Math.random()*3)+1))));
    const shuffled = [...opts].sort(() => Math.random() - 0.5);
    choicesEl.innerHTML = shuffled.map(n => `<button class="choice" onclick="pick(${n}, this)">${n}</button>`).join("");
  }

  window.pick = function(n, btn) {
    [...document.querySelectorAll(".choice")].forEach(b => b.disabled = true);
    if (n === target) {
      btn.classList.add("right");
      sounds.right();
      stars++;
      lightStar(stars);
      postProgress(true);
      if (stars >= 5) {
        setTimeout(() => win(), 600);
      } else {
        setTimeout(nextRound, 900);
      }
    } else {
      btn.classList.add("wrong");
      sounds.wrong();
      postProgress(false);
      setTimeout(() => {
        btn.classList.remove("wrong");
        [...document.querySelectorAll(".choice")].forEach(b => b.disabled = false);
      }, 500);
    }
  };

  function lightStar(n) {
    const stars = starsEl.querySelectorAll(".star");
    if (stars[n-1]) stars[n-1].classList.add("lit");
  }

  function confettiBurst() {
    const colors = ["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];
    for (let i = 0; i < 50; i++) {
      const c = document.createElement("div");
      c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.8) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }

  function win() {
    sounds.win();
    confettiBurst();
    celebration.textContent = "🎉 You did it! 🎉";
    celebration.classList.add("show");
    postProgress(true, true);
    setTimeout(() => {
      celebration.classList.remove("show");
      stars = 0;
      starsEl.querySelectorAll(".star").forEach(s => s.classList.remove("lit"));
      nextRound();
    }, 2600);
  }

  function postProgress(correct, complete = false) {
    try {
      parent.postMessage({
        type: "labProgress",
        lab: "count-critters",
        round, correct, target, stars,
        complete,
      }, "*");
    } catch {}
  }

  nextRound();
</script>
</body>
</html>
