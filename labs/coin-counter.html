<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Coin Counter 💰</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#dcfce7 0%,#86efac 100%);color:#1a1612;-webkit-font-smoothing:antialiased}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#15803d}
  .stars{display:flex;gap:4px;font-size:24px}
  .star{filter:grayscale(1);opacity:.35;transition:all .35s}
  .star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(20px,5vw,26px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 14px}
  .coins{flex:1;background:#fff;border-radius:24px;border:3px solid #86efac;padding:20px;display:flex;flex-wrap:wrap;gap:12px;align-content:center;justify-content:center;box-shadow:0 4px 0 #86efac;min-height:160px}
  .coin{width:clamp(56px,15vw,76px);height:clamp(56px,15vw,76px);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:700;animation:popIn .4s ease-out backwards;box-shadow:0 3px 0 rgba(0,0,0,.18);text-align:center;line-height:1}
  @keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
  .coin .v{font-size:clamp(13px,3.5vw,17px)}
  .coin .n{font-size:clamp(8px,2.2vw,10px);opacity:.8}
  .penny{background:radial-gradient(circle at 35% 30%,#e8a87c,#b87333);color:#5a2e10}
  .nickel{background:radial-gradient(circle at 35% 30%,#e0e0e0,#a8a8a8);color:#444}
  .dime{background:radial-gradient(circle at 35% 30%,#eaeaea,#b0b0b0);color:#444;width:clamp(46px,12vw,62px);height:clamp(46px,12vw,62px)}
  .quarter{background:radial-gradient(circle at 35% 30%,#e8e8e8,#9a9a9a);color:#333;width:clamp(62px,16vw,84px);height:clamp(62px,16vw,84px)}
  .choices{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
  .choice{aspect-ratio:1.2;background:#fff;border:none;border-radius:18px;font-family:'Quicksand',sans-serif;font-size:clamp(18px,4.5vw,26px);font-weight:700;color:#15803d;cursor:pointer;box-shadow:0 4px 0 #22c55e;transition:all .15s;touch-action:manipulation}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #22c55e}
  .choice.wrong{background:#fecaca;animation:shake .4s}
  .choice.right{background:#bbf7d0;color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#15803d;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}
  .celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#166534;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">💰 Coin Counter</div>
    <div class="stars" id="stars"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div>
  </div>
  <div class="question">How much money is here?</div>
  <div class="coins" id="coins"></div>
  <div class="choices" id="choices"></div>
  <div class="help">Penny=1¢ · Nickel=5¢ · Dime=10¢ · Quarter=25¢</div>
</div>
<div class="celebration" id="celebration"></div>
<script>
  const COINS = { penny:{v:1,n:"1¢",cls:"penny"}, nickel:{v:5,n:"5¢",cls:"nickel"}, dime:{v:10,n:"10¢",cls:"dime"}, quarter:{v:25,n:"25¢",cls:"quarter"} };
  const coinsEl=document.getElementById("coins"), choicesEl=document.getElementById("choices"), starsEl=document.getElementById("stars"), celebration=document.getElementById("celebration");
  let stars=0,target=0,round=0;
  let actx=null; function tone(f,d=.15,t="sine",v=.18){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.stop(actx.currentTime+d)}catch{}}
  const S={clink:()=>tone(880+Math.random()*200,.06,"sine"),right:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.18,"triangle",.22),i*100))},wrong:()=>tone(220,.25,"sawtooth",.1),win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.22,"triangle",.25),i*120))}};
  function nextRound(){
    round++;
    // build a coin set with total a multiple of 5, under ~50¢ early
    const max = round<3?30:60;
    let coins=[]; target=0;
    // pick coin types appropriate to round
    const pool = round<2 ? ["penny","nickel"] : round<4 ? ["penny","nickel","dime"] : ["penny","nickel","dime","quarter"];
    const count = Math.floor(Math.random()*4)+2;
    for(let i=0;i<count;i++){ const k=pool[Math.floor(Math.random()*pool.length)]; if(target+COINS[k].v<=max){coins.push(k);target+=COINS[k].v;} }
    if(target===0){coins=["nickel"];target=5;}
    coinsEl.innerHTML=coins.map((k,i)=>`<div class="coin ${COINS[k].cls}" style="animation-delay:${i*.07}s"><span class="v">${COINS[k].n}</span></div>`).join("");
    setTimeout(()=>S.clink(),150); setTimeout(()=>S.clink(),350);
    const opts=new Set([target]);
    while(opts.size<4){const d=(Math.random()<.5?-1:1)*(Math.floor(Math.random()*3)+1)*5;const v=target+d;if(v>0)opts.add(v);}
    choicesEl.innerHTML=[...opts].sort((a,b)=>a-b).map(n=>`<button class="choice" onclick="pick(${n},this)">${n}¢</button>`).join("");
  }
  window.pick=function(n,btn){[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=true);
    if(n===target){btn.classList.add("right");S.right();stars++;lightStar(stars);post(true);if(stars>=5)setTimeout(win,700);else setTimeout(nextRound,900);}
    else{btn.classList.add("wrong");S.wrong();post(false);setTimeout(()=>{btn.classList.remove("wrong");[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=false);},500);}};
  function lightStar(n){const s=starsEl.querySelectorAll(".star");if(s[n-1])s[n-1].classList.add("lit");}
  function confettiBurst(){const c=["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];for(let i=0;i<50;i++){const e=document.createElement("div");e.className="confetti";e.style.left=Math.random()*100+"vw";e.style.background=c[Math.floor(Math.random()*c.length)];e.style.animationDelay=(Math.random()*.8)+"s";document.body.appendChild(e);setTimeout(()=>e.remove(),2600);}}
  function win(){S.win();confettiBurst();celebration.textContent="🎉 Money master! 🎉";celebration.classList.add("show");post(true,true);setTimeout(()=>{celebration.classList.remove("show");stars=0;starsEl.querySelectorAll(".star").forEach(s=>s.classList.remove("lit"));nextRound();},2600);}
  function post(correct,complete=false){try{parent.postMessage({type:"labProgress",lab:"coin-counter",round,correct,target,stars,complete},"*");}catch{}}
  nextRound();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}if(history.length>1){try{history.back()}catch(e){}setTimeout(function(){location.href="/"},400)}else{location.href="/"}};})();</script></body>
</html>
