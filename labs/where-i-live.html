<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Where I Live 🗺️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#d1fae5 0%,#6ee7b7 100%);color:#1a1612}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .title{font-size:22px;font-weight:700;color:#047857}
  .stars{display:flex;gap:4px;font-size:24px}.star{filter:grayscale(1);opacity:.35;transition:all .35s}.star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(17px,4.2vw,22px);font-weight:700;text-align:center;color:#1a1f3a;margin:4px 0 12px;line-height:1.4}
  .stage{background:#fff;border-radius:24px;border:3px solid #6ee7b7;padding:22px;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 4px 0 #6ee7b7;margin-bottom:14px}
  .scene{font-size:clamp(58px,15vw,92px)}
  .prompt{font-size:clamp(15px,3.8vw,19px);font-weight:600;color:#047857;text-align:center;line-height:1.4}
  .choices{flex:1;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;align-content:start}
  .choice{background:#fff;border:none;border-radius:18px;padding:18px 10px;font-family:'Quicksand',sans-serif;cursor:pointer;box-shadow:0 4px 0 #34d399;transition:all .15s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:5px}
  .choice .ic{font-size:clamp(30px,7vw,42px)}.choice .lb{font-size:clamp(13px,3.4vw,17px);font-weight:700;color:#047857}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #34d399}
  .choice.wrong{background:#fecaca;animation:shake .4s}.choice.right{background:#bbf7d0}.choice.right .lb{color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#047857;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}.celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#065f46;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="title">🗺️ Where I Live</div>
    <div class="stars" id="stars"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div></div>
  <div class="question" id="question"></div>
  <div class="stage"><div class="scene" id="scene"></div><div class="prompt" id="prompt"></div></div>
  <div class="choices" id="choices"></div>
  <div class="help">We live in a home, in a city, in a country, on planet Earth! 🌍</div>
</div>
<div class="celebration" id="celebration"></div>
<script>
  // Geography concept questions for K-2: maps, places, biggest-to-smallest
  const QS=[
    {scene:"🏠",q:"Where do you sleep at night?",answer:"My home",opts:[{ic:"🏠",lb:"My home"},{ic:"🏫",lb:"School"},{ic:"🏥",lb:"Hospital"},{ic:"🏪",lb:"Store"}]},
    {scene:"🌍",q:"What planet do we ALL live on?",answer:"Earth",opts:[{ic:"🌍",lb:"Earth"},{ic:"🌙",lb:"The Moon"},{ic:"☀️",lb:"The Sun"},{ic:"🪐",lb:"Saturn"}]},
    {scene:"🗺️",q:"What do we use to find places?",answer:"A map",opts:[{ic:"🗺️",lb:"A map"},{ic:"🍕",lb:"A pizza"},{ic:"📚",lb:"A book"},{ic:"🎈",lb:"A balloon"}]},
    {scene:"🌊",q:"What covers MOST of the Earth?",answer:"Water",opts:[{ic:"🌊",lb:"Water"},{ic:"🏔️",lb:"Mountains"},{ic:"🏜️",lb:"Sand"},{ic:"🌳",lb:"Trees"}]},
    {scene:"🧭",q:"What helps you find which way is North?",answer:"A compass",opts:[{ic:"🧭",lb:"A compass"},{ic:"⏰",lb:"A clock"},{ic:"📏",lb:"A ruler"},{ic:"🔦",lb:"A flashlight"}]},
    {scene:"🏙️",q:"A place with many buildings and people is a...",answer:"City",opts:[{ic:"🏙️",lb:"City"},{ic:"🌲",lb:"Forest"},{ic:"🏖️",lb:"Beach"},{ic:"🏜️",lb:"Desert"}]},
    {scene:"🌎",q:"Which is BIGGER?",answer:"The whole Earth",opts:[{ic:"🌎",lb:"The whole Earth"},{ic:"🏠",lb:"Your house"},{ic:"🏫",lb:"Your school"},{ic:"🏙️",lb:"Your city"}]},
    {scene:"🚩",q:"A big land with its own flag is a...",answer:"Country",opts:[{ic:"🚩",lb:"Country"},{ic:"🛏️",lb:"Bedroom"},{ic:"🪑",lb:"Chair"},{ic:"🚗",lb:"Car"}]},
    {scene:"🏔️",q:"A very tall, rocky landform is a...",answer:"Mountain",opts:[{ic:"🏔️",lb:"Mountain"},{ic:"🌊",lb:"Ocean"},{ic:"🏝️",lb:"Island"},{ic:"🏞️",lb:"River"}]},
    {scene:"🏝️",q:"Land with water all around it is an...",answer:"Island",opts:[{ic:"🏝️",lb:"Island"},{ic:"⛰️",lb:"Hill"},{ic:"🏜️",lb:"Desert"},{ic:"🌳",lb:"Forest"}]},
  ];
  const sceneEl=document.getElementById("scene"),promptEl=document.getElementById("prompt"),questionEl=document.getElementById("question"),choicesEl=document.getElementById("choices"),starsEl=document.getElementById("stars"),celebration=document.getElementById("celebration");
  let stars=0,round=0,answer="",lastIdx=-1;
  let actx=null;function tone(f,d=.15,t="sine",v=.18){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.stop(actx.currentTime+d)}catch{}}
  const S={right:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.18,"triangle",.22),i*100))},wrong:()=>tone(220,.25,"sawtooth",.1),win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.22,"triangle",.25),i*120))}};
  function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.rate=.85;u.pitch=1.05;speechSynthesis.cancel();speechSynthesis.speak(u);}catch{}}
  function nextRound(){round++;let idx;do{idx=Math.floor(Math.random()*QS.length);}while(idx===lastIdx&&QS.length>1);lastIdx=idx;
    const q=QS[idx];answer=q.answer;sceneEl.textContent=q.scene;questionEl.textContent=q.q;promptEl.textContent="";setTimeout(()=>speak(q.q),250);
    const opts=[...q.opts].sort(()=>Math.random()-.5);
    choicesEl.innerHTML=opts.map(o=>`<button class="choice" onclick="pick('${o.lb.replace(/'/g,"\\'")}',this)"><span class="ic">${o.ic}</span><span class="lb">${o.lb}</span></button>`).join("");}
  window.pick=function(v,btn){[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=true);
    if(v===answer){btn.classList.add("right");S.right();stars++;lightStar(stars);post(true);if(stars>=5)setTimeout(win,700);else setTimeout(nextRound,1000);}
    else{btn.classList.add("wrong");S.wrong();post(false);setTimeout(()=>{btn.classList.remove("wrong");[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=false);},500);}};
  function lightStar(n){const s=starsEl.querySelectorAll(".star");if(s[n-1])s[n-1].classList.add("lit");}
  function confettiBurst(){const c=["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];for(let i=0;i<50;i++){const e=document.createElement("div");e.className="confetti";e.style.left=Math.random()*100+"vw";e.style.background=c[Math.floor(Math.random()*c.length)];e.style.animationDelay=(Math.random()*.8)+"s";document.body.appendChild(e);setTimeout(()=>e.remove(),2600);}}
  function win(){S.win();confettiBurst();celebration.textContent="🎉 Map explorer! 🎉";celebration.classList.add("show");post(true,true);setTimeout(()=>{celebration.classList.remove("show");stars=0;starsEl.querySelectorAll(".star").forEach(s=>s.classList.remove("lit"));nextRound();},2600);}
  function post(correct,complete=false){try{parent.postMessage({type:"labProgress",lab:"where-i-live",round,correct,answer,stars,complete},"*");}catch{}}
  nextRound();
</script>
</body>
</html>
