<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Light Mixer 🔦</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#1e293b,#0f172a)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:560px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#0ea5e9}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#0ea5e9;box-shadow:0 2px 0 #38bdf8}
.task{background:#fff;border:3px solid #38bdf8;border-radius:16px;box-shadow:0 4px 0 #38bdf8;padding:10px 14px;text-align:center;font-size:clamp(13.5px,4vw,17px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;max-height:100%}
.controls{display:flex;flex-direction:column;gap:7px;margin-top:6px}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #38bdf8}
.srow label{font-weight:700;color:#0ea5e9;min-width:92px;font-size:13px}
.srow input{flex:1;accent-color:#0ea5e9;height:28px}
.srow .val{min-width:52px;text-align:right;font-weight:700;font-size:13px}
.brow{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.bbtn{min-width:52px;min-height:44px;border:none;border-radius:12px;background:#fff;box-shadow:0 3px 0 #38bdf8;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;color:#0ea5e9;cursor:pointer;touch-action:manipulation;padding:6px 10px}
.bbtn.on{background:#0ea5e9;color:#fff}
.check{min-height:50px;width:100%;background:#0ea5e9;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:13px;font-weight:700;min-height:20px;margin-top:6px;color:#0ea5e9}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#0ea5e9}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#0ea5e9;color:#fff;border:none;border-radius:99px;padding:13px 28px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin:0 4px}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🔦 Light Mixer</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 300 190" id="scene"></svg></div><div class="controls"><div class="srow"><label style="color:#dc2626">🔴 Red</label><input type="range" id="r" min="0" max="5" step="1" value="0"><span class="val" id="rv">0</span></div><div class="srow"><label style="color:#16a34a">🟢 Green</label><input type="range" id="g" min="0" max="5" step="1" value="0"><span class="val" id="gv">0</span></div><div class="srow"><label style="color:#2563eb">🔵 Blue</label><input type="range" id="b" min="0" max="5" step="1" value="0"><span class="val" id="bv">0</span></div></div>
  <button class="check" id="check">Shine the light 🔦</button>
  <div class="fb" id="fb">Screens make every color from just red, green and blue light — mixing LIGHT is not like mixing paint!</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><div><button id="ovNext">Play again ↻</button><button id="ovDone" style="background:#1a1f3a">Finish ✓</button></div></div>
<script>
const GAME={id:"sim-color-vision"};
let idx=0,score=0,tries=0,__perfects=0;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC;}
function tone(f,t,ty,g){t=t||.12;ty=ty||"sine";g=g||.15;const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+t);o.connect(v).connect(c.destination);o.start();o.stop(c.currentTime+t+.02);}
const CC=["#0ea5e9","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch(e){}}
function win(pts,msg){score+=pts;if(tries===1)__perfects++;tone(660,.12);tone(880,.14);confetti(30);
  document.getElementById("fb").textContent=msg+"  (+"+pts+" pts)";document.getElementById("score").textContent=score+" pts";setTimeout(next,1350);}
function lose(msg){tone(200,.2,"triangle",.1);document.getElementById("fb").textContent=msg;}
const CH=[
 {r:5,g:5,b:0,text:"Surprise! Mix light to make <b>YELLOW</b> 🟡 (no yellow bulb needed)"},
 {r:5,g:0,b:5,text:"Make <b>MAGENTA</b> — the printer\'s secret color"},
 {r:0,g:5,b:5,text:"Make <b>CYAN</b> — sky-pool blue"},
 {r:5,g:5,b:5,text:"Make pure <b>WHITE</b> light"},
 {r:5,g:3,b:0,text:"The hard one: mix <b>ORANGE</b> 🟠"},
];
function vals(){return {r:+document.getElementById("r").value,g:+document.getElementById("g").value,b:+document.getElementById("b").value};}
function render(){const {r,g,b}=vals();
 document.getElementById("rv").textContent=r;document.getElementById("gv").textContent=g;document.getElementById("bv").textContent=b;
 const col="rgb("+r*51+","+g*51+","+b*51+")";
 const t=CH[idx];const tcol="rgb("+t.r*51+","+t.g*51+","+t.b*51+")";
 let s='<rect x="0" y="0" width="300" height="190" fill="#0b1120"/>';
 s+='<circle cx="90" cy="95" r="52" fill="'+col+'" stroke="#475569" stroke-width="2"/><text x="90" y="165" font-size="11" text-anchor="middle" fill="#94a3b8" font-weight="bold">your light</text>';
 s+='<circle cx="210" cy="95" r="52" fill="'+tcol+'" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 4"/><text x="210" y="165" font-size="11" text-anchor="middle" fill="#f59e0b" font-weight="bold">🎯 target</text>';
 document.getElementById("scene").innerHTML=s;
 document.getElementById("prog").textContent=(idx+1)+"/5";document.getElementById("score").textContent=score+" pts";}
["r","g","b"].forEach(i=>document.getElementById(i).oninput=render);
function check(){const c=CH[idx];tries++;const {r,g,b}=vals();
 if(r===c.r&&g===c.g&&b===c.b)win(Math.max(15,40-(tries-1)*10),"🔦 Perfect mix!");
 else{const off=[];if(r!==c.r)off.push("red "+(r<c.r?"↑":"↓"));if(g!==c.g)off.push("green "+(g<c.g?"↑":"↓"));if(b!==c.b)off.push("blue "+(b<c.b?"↑":"↓"));
  lose("Close — adjust: "+off.join(", "));}}
function load(){tries=0;["r","g","b"].forEach(i=>document.getElementById(i).value=0);
 document.getElementById("task").innerHTML=CH[idx].text;
 document.getElementById("fb").textContent="Screens make every color from just red, green and blue light!";render();}
window.__qa={solve:()=>{const c=CH[idx];document.getElementById("r").value=c.r;document.getElementById("g").value=c.g;document.getElementById("b").value=c.b;render();check();}};
document.getElementById("check").onclick=check;
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Light wizard! 🏆";
    var st=__perfects>=5?5:__perfects>=4?4:__perfects>=3?3:__perfects>=2?2:1;
    document.getElementById("ovScore").textContent="⭐".repeat(st)+"☆".repeat(5-st)+"   "+(__perfects===5?"PERFECT RUN! ⚡  ":"")+score+" pts · additive color (RGB) mastered";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ovDone").onclick=()=>{try{parent.postMessage({type:"labExit"},"*")}catch(e){}if(window===window.top)try{history.back()}catch(e){}};
    document.getElementById("ov").classList.add("show");return;}
  load();}
load();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script>
<script>(function(){function post(kind,text){try{parent.postMessage({type:"labEvent",kind:kind,text:String(text).slice(0,140),ts:Date.now()},"*")}catch(e){}}
function watch(id,kind){var el=document.getElementById(id);if(!el)return;var last=el.textContent;new MutationObserver(function(){var t=el.textContent;if(t&&t!==last){last=t;post(kind,t)}}).observe(el,{childList:true,characterData:true,subtree:true})}
watch("fb","feedback");watch("task","challenge");watch("score","score");
document.addEventListener("click",function(e){var b=e.target.closest("button");if(b&&b.id!=="neoExit")post("action","clicked: "+(b.textContent||b.id).trim().slice(0,60))},true);
post("start","sim loaded: "+document.title);})();</script>
</body></html>
