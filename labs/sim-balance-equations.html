<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Equation Balancer ⚗️</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#f3e8ff,#d8b4fe)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:560px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#7e22ce}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#7e22ce;box-shadow:0 2px 0 #c084fc}
.task{background:#fff;border:3px solid #c084fc;border-radius:16px;box-shadow:0 4px 0 #c084fc;padding:10px 14px;text-align:center;font-size:clamp(13.5px,4vw,17px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;max-height:100%}
.controls{display:flex;flex-direction:column;gap:7px;margin-top:6px}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #c084fc}
.srow label{font-weight:700;color:#7e22ce;min-width:92px;font-size:13px}
.srow input{flex:1;accent-color:#7e22ce;height:28px}
.srow .val{min-width:52px;text-align:right;font-weight:700;font-size:13px}
.brow{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.bbtn{min-width:52px;min-height:44px;border:none;border-radius:12px;background:#fff;box-shadow:0 3px 0 #c084fc;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;color:#7e22ce;cursor:pointer;touch-action:manipulation;padding:6px 10px}
.bbtn.on{background:#7e22ce;color:#fff}
.check{min-height:50px;width:100%;background:#7e22ce;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:13px;font-weight:700;min-height:20px;margin-top:6px;color:#7e22ce}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#7e22ce}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#7e22ce;color:#fff;border:none;border-radius:99px;padding:13px 28px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin:0 4px}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">⚗️ Equation Balancer</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox" style="flex-direction:column;gap:10px"><div id="eq" style="font-size:clamp(17px,5vw,24px);font-weight:700;color:#1a1f3a;text-align:center"></div><div id="atoms" style="font-size:13px;font-weight:700;text-align:center;line-height:1.9"></div><div class="brow" id="coefs"></div></div>
  <button class="check" id="check">Balance it ⚗️</button>
  <div class="fb" id="fb">Matter can't vanish — every atom on the left must appear on the right.</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><div><button id="ovNext">Play again ↻</button><button id="ovDone" style="background:#1a1f3a">Finish ✓</button></div></div>
<script>
const GAME={id:"sim-balance-equations"};
let idx=0,score=0,tries=0,__perfects=0;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC;}
function tone(f,t,ty,g){t=t||.12;ty=ty||"sine";g=g||.15;const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+t);o.connect(v).connect(c.destination);o.start();o.stop(c.currentTime+t+.02);}
const CC=["#7e22ce","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch(e){}}
function win(pts,msg){score+=pts;if(tries===1)__perfects++;tone(660,.12);tone(880,.14);confetti(30);
  document.getElementById("fb").textContent=msg+"  (+"+pts+" pts)";document.getElementById("score").textContent=score+" pts";setTimeout(next,1350);}
function lose(msg){tone(200,.2,"triangle",.1);document.getElementById("fb").textContent=msg;}
const CH=[
 {sp:[["H₂",{H:2}],["O₂",{O:2}],["H₂O",{H:2,O:1}]],arrow:2,sol:[2,1,2],text:"Balance: hydrogen + oxygen → water"},
 {sp:[["N₂",{N:2}],["H₂",{H:2}],["NH₃",{N:1,H:3}]],arrow:2,sol:[1,3,2],text:"Balance the ammonia reaction"},
 {sp:[["Na",{Na:1}],["Cl₂",{Cl:2}],["NaCl",{Na:1,Cl:1}]],arrow:2,sol:[2,1,2],text:"Balance: sodium + chlorine → table salt"},
 {sp:[["CH₄",{C:1,H:4}],["O₂",{O:2}],["CO₂",{C:1,O:2}],["H₂O",{H:2,O:1}]],arrow:2,sol:[1,2,1,2],text:"Balance methane burning (combustion)"},
 {sp:[["Fe",{Fe:1}],["O₂",{O:2}],["Fe₂O₃",{Fe:2,O:3}]],arrow:2,sol:[4,3,2],text:"Balance rust forming"},
];
let coef=[];
function counts(){const c=CH[idx];const L={},R={};
 c.sp.forEach((s,i)=>{const side=i<c.arrow?L:R;for(const [a,n] of Object.entries(s[1]))side[a]=(side[a]||0)+n*coef[i];});
 return [L,R];}
function render(){const c=CH[idx];
 document.getElementById("eq").innerHTML=c.sp.map((s,i)=>(coef[i]>1?"<b style=\'color:#7e22ce\'>"+coef[i]+"</b>":"")+s[0]).map((t,i)=>i===c.arrow?"→ "+t:t).join(i=>" + ").split(",").join("")||"";
 let html="";c.sp.forEach((s,i)=>{html+=(i===c.arrow?" → ":(i>0?" + ":""))+(coef[i]>1?"<b style=\'color:#7e22ce\'>"+coef[i]+"</b>":"")+s[0];});
 document.getElementById("eq").innerHTML=html;
 const [L,R]=counts();const atoms=[...new Set([...Object.keys(L),...Object.keys(R)])];
 document.getElementById("atoms").innerHTML=atoms.map(a=>{const ok=(L[a]||0)===(R[a]||0);
  return '<span style="color:'+(ok?"#16a34a":"#dc2626")+'">'+a+": "+(L[a]||0)+" | "+(R[a]||0)+(ok?" ✓":" ✗")+"</span>";}).join(" &nbsp; ");
 const box=document.getElementById("coefs");box.innerHTML="";
 c.sp.forEach((s,i)=>{const b=document.createElement("button");b.className="bbtn"+(coef[i]>1?" on":"");
  b.textContent=coef[i]+"× "+s[0];b.onclick=()=>{coef[i]=coef[i]%6+1;tone(400+coef[i]*60,.05,"sine",.06);render();};box.appendChild(b);});
 document.getElementById("prog").textContent=(idx+1)+"/5";document.getElementById("score").textContent=score+" pts";}
function check(){tries++;const [L,R]=counts();const atoms=[...new Set([...Object.keys(L),...Object.keys(R)])];
 const bal=atoms.every(a=>(L[a]||0)===(R[a]||0));
 const g=(a,b)=>b?g(b,a%b):a;const min=coef.reduce((a,b)=>g(a,b))===1;
 if(bal&&min)win(Math.max(15,45-(tries-1)*10),"⚗️ Perfectly balanced!");
 else if(bal&&!min)lose("Balanced, but not the simplest ratio — divide everything down!");
 else lose("Not balanced yet — the red atoms don't match. Tap coefficients to cycle 1-6.");}
function load(){tries=0;coef=CH[idx].sp.map(()=>1);
 document.getElementById("task").innerHTML=CH[idx].text;
 document.getElementById("fb").textContent="Matter can\'t vanish — every atom on the left must appear on the right.";render();}
window.__qa={solve:()=>{coef=[...CH[idx].sol];render();check();}};
document.getElementById("check").onclick=check;
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Master chemist! 🏆";
    var st=__perfects>=5?5:__perfects>=4?4:__perfects>=3?3:__perfects>=2?2:1;
    document.getElementById("ovScore").textContent="⭐".repeat(st)+"☆".repeat(5-st)+"   "+(__perfects===5?"PERFECT RUN! ⚡  ":"")+score+" pts · chemical equations balanced";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ovDone").onclick=()=>{try{parent.postMessage({type:"labExit"},"*")}catch(e){}if(window===window.top)if(history.length>1){try{history.back()}catch(e){}setTimeout(function(){location.href="/"},400)}else{location.href="/"}};
    document.getElementById("ov").classList.add("show");return;}
  load();}
load();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script>
<script>(function(){function post(kind,text){try{parent.postMessage({type:"labEvent",kind:kind,text:String(text).slice(0,140),ts:Date.now()},"*")}catch(e){}}
function watch(id,kind){var el=document.getElementById(id);if(!el)return;var last=el.textContent;new MutationObserver(function(){var t=el.textContent;if(t&&t!==last){last=t;post(kind,t)}}).observe(el,{childList:true,characterData:true,subtree:true})}
watch("fb","feedback");watch("task","challenge");watch("score","score");
document.addEventListener("click",function(e){var b=e.target.closest("button");if(b&&b.id!=="neoExit")post("action","clicked: "+(b.textContent||b.id).trim().slice(0,60))},true);
post("start","sim loaded: "+document.title);})();</script>
</body></html>
