<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>AI Trainer 🤖</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#ede9fe,#a78bfa)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:600px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#5b21b6}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#5b21b6;box-shadow:0 2px 0 #a78bfa}
.task{background:#fff;border:3px solid #a78bfa;border-radius:16px;box-shadow:0 4px 0 #a78bfa;padding:10px 14px;text-align:center;font-size:clamp(13.5px,3.9vw,16px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;max-height:100%;height:auto;touch-action:none}
.sliders{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #a78bfa}
.srow label{font-weight:700;color:#5b21b6;min-width:90px;font-size:13px}
.srow input{flex:1;accent-color:#5b21b6;height:28px}
.acc{text-align:center;font-size:clamp(17px,5vw,22px);font-weight:700;margin:4px 0;color:#5b21b6}
.check{min-height:50px;width:100%;background:#5b21b6;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:13.5px;font-weight:700;min-height:20px;margin-top:6px;color:#5b21b6}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#5b21b6}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#5b21b6;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🤖 AI Trainer</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 300 260" id="scene"></svg></div>
  <div class="acc" id="acc">Accuracy: 0%</div>
  <div class="sliders">
    <div class="srow"><label>↔️ Boundary</label><input type="range" id="bpos" min="20" max="280" step="2" value="150"></div>
    <div class="srow"><label>🔄 Tilt</label><input type="range" id="btilt" min="-60" max="60" step="4" value="0"></div>
  </div>
  <button class="check" id="check">Deploy model 🚀</button>
  <div class="fb" id="fb">Move the line so it separates the two groups — like a real classifier.</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><button id="ovNext">Next →</button></div>
<script>
const GAME={id:"sim-ai-trainer"};
function genChallenges(){
  const R=(a,b)=>a+Math.random()*(b-a);
  const ch=[];
  // each: two clusters (A left/blue, B right/orange) with a scenario label
  const scenarios=[
    {t:"Teach the AI to tell <b>cats 🐱 from dogs 🐶</b> by ear-size vs tail-length.",aC:[80,90],bC:[220,150]},
    {t:"Spam filter: separate <b>safe ✅ from spam 🚫</b> emails by word patterns.",aC:[90,70],bC:[210,180]},
    {t:"Sort <b>ripe 🍓 from unripe 🟢</b> fruit by color and size.",aC:[70,160],bC:[220,90]},
    {t:"Medical AI: flag <b>healthy 💚 vs at-risk ⚠️</b> scans by two markers.",aC:[100,100],bC:[200,170]},
    {t:"Self-driving car: <b>road 🛣️ vs obstacle 🚧</b> by shape and motion.",aC:[75,120],bC:[215,120]},
  ];
  for(const sc of scenarios){
    const pts=[];
    for(let i=0;i<7;i++)pts.push({x:R(sc.aC[0]-45,sc.aC[0]+45),y:R(sc.aC[1]-45,sc.aC[1]+45),cls:0});
    for(let i=0;i<7;i++)pts.push({x:R(sc.bC[0]-45,sc.bC[0]+45),y:R(sc.bC[1]-45,sc.bC[1]+45),cls:1});
    ch.push({text:sc.t,pts});
  }
  return ch;
}
const CH=genChallenges();
let idx=0,score=0,tries=0;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch{}}return AC;}
function tone(f,t=.12,ty="sine",g=.15,w=0){const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime+w);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+w+t);o.connect(v).connect(c.destination);o.start(c.currentTime+w);o.stop(c.currentTime+w+t+.02);}
const CC=["#5b21b6","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch{}}
// boundary: vertical-ish line at x=bpos, tilted by btilt degrees. classify: which side of line
function predict(px,py,bpos,btilt){
  const rad=btilt*Math.PI/180;
  // line through (bpos,130) with direction; normal test
  const nx=Math.cos(rad), ny=Math.sin(rad);
  return ((px-bpos)*nx + (py-130)*ny) > 0 ? 1 : 0;
}
function accuracy(bpos,btilt){
  const c=CH[idx];let ok=0;
  for(const p of c.pts)if(predict(p.x,p.y,bpos,btilt)===p.cls)ok++;
  return ok/c.pts.length;
}
function render(){
  const c=CH[idx];
  const bpos=+document.getElementById("bpos").value,btilt=+document.getElementById("btilt").value;
  let s='<rect x="0" y="0" width="300" height="260" fill="#faf5ff"/>';
  // boundary line
  const rad=btilt*Math.PI/180, dx=-Math.sin(rad)*400, dy=Math.cos(rad)*400;
  s+='<line x1="'+(bpos-dx)+'" y1="'+(130-dy)+'" x2="'+(bpos+dx)+'" y2="'+(130+dy)+'" stroke="#5b21b6" stroke-width="3.5" stroke-dasharray="7 5"/>';
  for(const p of c.pts){
    const pred=predict(p.x,p.y,bpos,btilt);
    const correct=pred===p.cls;
    const fill=p.cls===0?"#3b82f6":"#f59e0b";
    s+='<circle cx="'+p.x.toFixed(1)+'" cy="'+p.y.toFixed(1)+'" r="9" fill="'+fill+'" stroke="'+(correct?"#22c55e":"#dc2626")+'" stroke-width="3"/>';
    if(!correct)s+='<text x="'+p.x.toFixed(1)+'" y="'+(p.y+4).toFixed(1)+'" font-size="11" text-anchor="middle" fill="#fff" font-weight="bold">✕</text>';
  }
  document.getElementById("scene").innerHTML=s;
  const a=accuracy(bpos,btilt);
  document.getElementById("acc").textContent="Accuracy: "+Math.round(a*100)+"%";
  document.getElementById("acc").style.color=a>=1?"#15803d":a>=.85?"#5b21b6":"#b45309";
  document.getElementById("prog").textContent=(idx+1)+"/5";
  document.getElementById("score").textContent=score+" pts";
}
["bpos","btilt"].forEach(id=>document.getElementById(id).oninput=render);
document.getElementById("check").onclick=()=>{
  const c=CH[idx];tries++;
  const bpos=+document.getElementById("bpos").value,btilt=+document.getElementById("btilt").value;
  const a=accuracy(bpos,btilt);
  if(a>=1){
    const pts=Math.max(15,45-(tries-1)*10);score+=pts;
    tone(660,.12);tone(880,.14,"sine",.15,.1);confetti(35);
    document.getElementById("fb").textContent="🤖 100% accuracy — model deployed!  (+"+pts+" pts)";
    document.getElementById("score").textContent=score+" pts";
    setTimeout(next,1400);
  } else {
    tone(200,.2,"triangle",.1);
    document.getElementById("fb").textContent="Only "+Math.round(a*100)+"% correct — the red-ringed dots are misclassified. Slide or tilt the line.";
  }
};
function load(){tries=0;document.getElementById("bpos").value=150;document.getElementById("btilt").value=0;
  document.getElementById("task").innerHTML=CH[idx].text;
  document.getElementById("fb").textContent="Move the line so it separates the two groups — like a real classifier.";
  render();}
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Machine-learning master! 🏆";
    document.getElementById("ovScore").textContent=score+" pts · you trained 5 classifiers";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ov").classList.add("show");return;}
  load();}
window.__qa={solve:()=>{
  for(let b=20;b<=280;b+=4)for(let t=-60;t<=60;t+=4){
    if(accuracy(b,t)>=1){document.getElementById("bpos").value=b;document.getElementById("btilt").value=t;render();document.getElementById("check").click();return;}}
}};
load();
</script></body></html>
