<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Five Senses 👀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#e0f2fe 0%,#7dd3fc 100%);color:#1a1612}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#0369a1}
  .stars{display:flex;gap:4px;font-size:24px}.star{filter:grayscale(1);opacity:.35;transition:all .35s}.star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(18px,4.5vw,24px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 12px}
  .stage{background:#fff;border-radius:24px;border:3px solid #7dd3fc;padding:22px;display:flex;flex-direction:column;align-items:center;gap:10px;box-shadow:0 4px 0 #7dd3fc;margin-bottom:14px}
  .scene{font-size:clamp(60px,16vw,96px)}
  .prompt{font-size:clamp(16px,4vw,20px);font-weight:600;color:#0369a1;text-align:center}
  .choices{flex:1;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;align-content:start}
  .choice{background:#fff;border:none;border-radius:18px;padding:16px 10px;font-family:'Quicksand',sans-serif;cursor:pointer;box-shadow:0 4px 0 #38bdf8;transition:all .15s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:6px}
  .choice .ic{font-size:clamp(30px,7vw,42px)}.choice .lb{font-size:clamp(13px,3.3vw,16px);font-weight:700;color:#0369a1}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #38bdf8}
  .choice.wrong{background:#fecaca;animation:shake .4s}.choice.right{background:#bbf7d0}.choice.right .lb{color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#0369a1;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}.celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#075985;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="title">👀 Five Senses</div>
    <div class="stars" id="stars"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div></div>
  <div class="question">Which sense do you use?</div>
  <div class="stage"><div class="scene" id="scene"></div><div class="prompt" id="prompt"></div></div>
  <div class="choices" id="choices"></div>
  <div class="help">See 👁️ · Hear 👂 · Smell 👃 · Taste 👅 · Touch ✋</div>
</div>
<div class="celebration" id="celebration"></div>
<script>
  const SENSES=[{id:"see",ic:"👁️",lb:"See"},{id:"hear",ic:"👂",lb:"Hear"},{id:"smell",ic:"👃",lb:"Smell"},{id:"taste",ic:"👅",lb:"Taste"},{id:"touch",ic:"✋",lb:"Touch"}];
  const ITEMS=[{e:"🌈",p:"A bright rainbow",s:"see"},{e:"🎺",p:"A loud trumpet",s:"hear"},{e:"🌸",p:"A sweet flower",s:"smell"},{e:"🍋",p:"A sour lemon",s:"taste"},{e:"🧊",p:"A cold ice cube",s:"touch"},{e:"🔔",p:"A ringing bell",s:"hear"},{e:"🍪",p:"A warm cookie smell",s:"smell"},{e:"🍦",p:"Yummy ice cream",s:"taste"},{e:"🐶",p:"A soft puppy",s:"touch"},{e:"⭐",p:"Stars in the sky",s:"see"},{e:"🥁",p:"A banging drum",s:"hear"},{e:"🌹",p:"A rose's perfume",s:"smell"},{e:"🍓",p:"A juicy strawberry",s:"taste"},{e:"🧸",p:"A fuzzy teddy bear",s:"touch"},{e:"🎆",p:"Colorful fireworks",s:"see"}];
  const sceneEl=document.getElementById("scene"),promptEl=document.getElementById("prompt"),choicesEl=document.getElementById("choices"),starsEl=document.getElementById("stars"),celebration=document.getElementById("celebration");
  let stars=0,round=0,answer="";
  let actx=null;function tone(f,d=.15,t="sine",v=.18){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.stop(actx.currentTime+d)}catch{}}
  const S={right:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.18,"triangle",.22),i*100))},wrong:()=>tone(220,.25,"sawtooth",.1),win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.22,"triangle",.25),i*120))}};
  function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.rate=.85;u.pitch=1.1;speechSynthesis.cancel();speechSynthesis.speak(u);}catch{}}
  function nextRound(){round++;const it=ITEMS[Math.floor(Math.random()*ITEMS.length)];answer=it.s;sceneEl.textContent=it.e;promptEl.textContent=it.p;setTimeout(()=>speak(it.p),250);
    // 4 sense choices including correct
    const opts=new Set([it.s]);while(opts.size<4)opts.add(SENSES[Math.floor(Math.random()*SENSES.length)].id);
    choicesEl.innerHTML=[...opts].sort(()=>Math.random()-.5).map(id=>{const sn=SENSES.find(x=>x.id===id);return `<button class="choice" onclick="pick('${id}',this)"><span class="ic">${sn.ic}</span><span class="lb">${sn.lb}</span></button>`;}).join("");}
  window.pick=function(id,btn){[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=true);
    if(id===answer){btn.classList.add("right");S.right();stars++;lightStar(stars);post(true);if(stars>=5)setTimeout(win,700);else setTimeout(nextRound,1000);}
    else{btn.classList.add("wrong");S.wrong();post(false);setTimeout(()=>{btn.classList.remove("wrong");[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=false);},500);}};
  function lightStar(n){const s=starsEl.querySelectorAll(".star");if(s[n-1])s[n-1].classList.add("lit");}
  function confettiBurst(){const c=["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];for(let i=0;i<50;i++){const e=document.createElement("div");e.className="confetti";e.style.left=Math.random()*100+"vw";e.style.background=c[Math.floor(Math.random()*c.length)];e.style.animationDelay=(Math.random()*.8)+"s";document.body.appendChild(e);setTimeout(()=>e.remove(),2600);}}
  function win(){S.win();confettiBurst();celebration.textContent="🎉 Super senses! 🎉";celebration.classList.add("show");post(true,true);setTimeout(()=>{celebration.classList.remove("show");stars=0;starsEl.querySelectorAll(".star").forEach(s=>s.classList.remove("lit"));nextRound();},2600);}
  function post(correct,complete=false){try{parent.postMessage({type:"labProgress",lab:"five-senses",round,correct,answer,stars,complete},"*");}catch{}}
  nextRound();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script></body>
</html>
