<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Number Base Lab 💾</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#dcfce7,#86efac)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:560px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#15803d}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#15803d;box-shadow:0 2px 0 #4ade80}
.task{background:#fff;border:3px solid #4ade80;border-radius:16px;box-shadow:0 4px 0 #4ade80;padding:10px 14px;text-align:center;font-size:clamp(15px,4.4vw,19px);font-weight:700;color:#1a1f3a;margin:10px 0}
.board{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.bits{display:flex;gap:8px}
.bit{width:clamp(48px,13vw,64px);border:none;border-radius:14px;background:#fff;box-shadow:0 4px 0 #4ade80;cursor:pointer;font-family:'Quicksand',sans-serif;padding:8px 0;touch-action:manipulation;transition:transform .1s}
.bit:active{transform:translateY(2px)}
.bit .v{font-size:26px;font-weight:700;color:#15803d}
.bit .p{font-size:10px;font-weight:700;color:#86efac;margin-top:2px}
.bit.on{background:#15803d}
.bit.on .v{color:#fff}.bit.on .p{color:#bbf7d0}
.total{font-size:clamp(22px,6vw,30px);font-weight:700;color:#15803d}
.check{min-height:52px;width:100%;background:#15803d;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:13.5px;font-weight:700;min-height:20px;margin-top:6px;color:#15803d}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#15803d}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#15803d;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">💾 Number Base Lab</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="board">
    <div class="bits" id="bits"></div>
    <div class="total" id="total"></div>
  </div>
  <button class="check" id="check">Transmit 📡</button>
  <div class="fb" id="fb">Tap tiles to switch digits — each place is worth base × the one before.</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><button id="ovNext">Next →</button></div>
<script>
const GAME={id:"sim-number-base"};
const CH=[
 {base:2,n:5,text:"The robot speaks binary! Build <b>5</b> with light switches (base 2)"},
 {base:2,n:13,text:"Send the code for <b>13</b> in binary"},
 {base:2,n:22,text:"A trickier transmission: <b>22</b> in binary"},
 {base:3,n:7,text:"Alien math uses base 3! Build <b>7</b> in ternary"},
 {base:3,n:16,text:"Master level: <b>16</b> in ternary (digits 0, 1, 2)"},
];
let idx=0,score=0,tries=0,__perfects=0,digits=[];
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch{}}return AC;}
function tone(f,t=.12,ty="sine",g=.15,w=0){const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime+w);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+w+t);o.connect(v).connect(c.destination);o.start(c.currentTime+w);o.stop(c.currentTime+w+t+.02);}
const CC=["#15803d","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch{}}
function value(){const b=CH[idx].base;return digits.reduce((a,d,i)=>a+d*Math.pow(b,digits.length-1-i),0);}
function render(){
  const c=CH[idx];const b=c.base;
  const B=document.getElementById("bits");B.innerHTML="";
  digits.forEach((d,i)=>{
    const place=Math.pow(b,digits.length-1-i);
    const btn=document.createElement("button");btn.className="bit"+(d>0?" on":"");
    btn.innerHTML='<div class="v">'+d+'</div><div class="p">×'+place+'</div>';
    btn.onclick=()=>{digits[i]=(digits[i]+1)%b;tone(400+digits[i]*120,.06,"sine",.08);render();};
    B.appendChild(btn);
  });
  document.getElementById("total").textContent="= "+value()+" (base 10)";
  document.getElementById("prog").textContent=(idx+1)+"/5";
  document.getElementById("score").textContent=score+" pts";
}
document.getElementById("check").onclick=()=>{
  const c=CH[idx];tries++;
  if(value()===c.n){
    const pts=Math.max(15,40-(tries-1)*10);score+=pts;if(tries===1)__perfects++;
    tone(660,.12);tone(880,.14,"sine",.15,.1);confetti(30);
    document.getElementById("fb").textContent="📡 Transmitted! "+digits.join("")+"₍"+c.base+"₎ = "+c.n+"  (+"+pts+" pts)";
    document.getElementById("score").textContent=score+" pts";
    setTimeout(next,1400);
  } else { tone(200,.2,"triangle",.1);
    document.getElementById("fb").textContent="That's "+value()+", not "+c.n+" — "+(value()<c.n?"add value in a bigger place!":"turn something off!"); }
};
function load(){tries=0;const c=CH[idx];
  const len=c.base===2?5:3;
  digits=Array(len).fill(0);
  document.getElementById("task").innerHTML=c.text;
  document.getElementById("fb").textContent="Tap tiles to switch digits — each place is worth base × the one before.";
  render();}
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Base commander! 🏆";
    var __st=__perfects>=5?5:__perfects>=4?4:__perfects>=3?3:__perfects>=2?2:1;
    document.getElementById("ovScore").textContent="⭐".repeat(__st)+"☆".repeat(5-__st)+"   "+(__perfects===5?"PERFECT RUN! ⚡  ":"")+score+" pts · binary & ternary decoded";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ov").classList.add("show");return;}
  load();}
window.__qa={solve:()=>{const c=CH[idx];let n=c.n;const len=digits.length;
  for(let i=len-1;i>=0;i--){const place=Math.pow(c.base,len-1-i);digits[i]=Math.floor(n/place);n-=digits[i]*place;}
  render();document.getElementById("check").click();}};
load();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script>
</body></html>
