<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Capacitor Lab 🔋</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fee2e2,#fca5a5)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:560px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#b91c1c}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#b91c1c;box-shadow:0 2px 0 #f87171}
.task{background:#fff;border:3px solid #f87171;border-radius:16px;box-shadow:0 4px 0 #f87171;padding:10px 14px;text-align:center;font-size:clamp(13.5px,4vw,17px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;max-height:100%}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #f87171;margin-top:6px}
.srow label{font-weight:700;color:#b91c1c;min-width:110px;font-size:13px}
.srow input{flex:1;accent-color:#b91c1c;height:28px}
.srow .val{min-width:52px;text-align:right;font-weight:700;font-size:13px}
.check{min-height:50px;width:100%;background:#b91c1c;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:13px;font-weight:700;min-height:20px;margin-top:6px;color:#b91c1c}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#b91c1c}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#b91c1c;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🔋 Capacitor Lab</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 360 200" id="scene"></svg></div>
  <div class="srow"><label>⚡ Voltage V</label><input type="range" id="volt" min="1" max="12" step="1" value="6"><span class="val" id="voltv">6 V</span></div>
  <div class="srow"><label>🔧 Capacitance C</label><input type="range" id="cap" min="1" max="10" step="1" value="4"><span class="val" id="capv">4 F</span></div>
  <button class="check" id="check">Charge it up ⚡</button>
  <div class="fb" id="fb">Charge stored: Q = C × V. Bigger plates or more volts = more charge.</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><button id="ovNext">Play again ↻</button><button id="ovDone" style="background:#1a1f3a;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)">Finish ✓</button></div>
<script>
const GAME={id:"sim-capacitor-lab"};
function gen(){const ch=[];const pairs=[];
 for(let v=1;v<=12;v++)for(let c=1;c<=10;c++){const q=v*c;if(q>=8&&q<=60)pairs.push({v,c,q});}
 const scen=[[12,"📸 The camera flash needs <b>12 C</b> of charge"],[24,"🚗 The toy car booster needs <b>24 C</b>"],[36,"🤖 Wake the robot: store exactly <b>36 C</b>"],[48,"🛰️ The satellite pulse takes <b>48 C</b>"],[60,"⚡ Max charge! The defibrillator drill: <b>60 C</b>"]];
 for(const [q,txt] of scen){const opts=pairs.filter(p=>p.q===q);ch.push({target:q,text:txt,sol:opts[Math.floor(Math.random()*opts.length)]});}
 return ch;}
const CH=gen();
let idx=0,score=0,tries=0,__perfects=0;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch{}}return AC;}
function tone(f,t=.12,ty="sine",g=.15,w=0){const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime+w);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+w+t);o.connect(v).connect(c.destination);o.start(c.currentTime+w);o.stop(c.currentTime+w+t+.02);}
const CC=["#b91c1c","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch{}}
function render(){
  const v=+document.getElementById("volt").value,c=+document.getElementById("cap").value;
  const q=v*c;
  document.getElementById("voltv").textContent=v+" V";document.getElementById("capv").textContent=c+" F";
  const gap=34-c*2, plateH=40+c*7;
  let s='<rect x="20" y="90" width="26" height="42" rx="4" fill="#334155"/><text x="33" y="85" font-size="11" text-anchor="middle" fill="#b91c1c" font-weight="bold">'+v+'V</text>';
  s+='<line x1="46" y1="111" x2="150" y2="111" stroke="#334155" stroke-width="4"/><line x1="'+(150+gap+10)+'" y1="111" x2="340" y2="111" stroke="#334155" stroke-width="4"/><path d="M340,111 L340,30 L33,30 L33,90" fill="none" stroke="#334155" stroke-width="4"/>';
  s+='<rect x="150" y="'+(111-plateH/2)+'" width="10" height="'+plateH+'" rx="3" fill="#b91c1c"/><rect x="'+(150+gap)+'" y="'+(111-plateH/2)+'" width="10" height="'+plateH+'" rx="3" fill="#2563eb"/>';
  const chg=Math.min(14,Math.round(q/4));
  for(let i=0;i<chg;i++){const y=111-plateH/2+6+(i%7)*(plateH-12)/6;
    s+='<text x="'+(144)+'" y="'+(y+((i>6)?3:0))+'" font-size="11" fill="#b91c1c" font-weight="bold">+</text><text x="'+(150+gap+14)+'" y="'+(y+((i>6)?3:0))+'" font-size="11" fill="#2563eb" font-weight="bold">−</text>';}
  s+='<text x="180" y="175" font-size="16" text-anchor="middle" fill="#b91c1c" font-weight="bold">Q = '+c+' F × '+v+' V = '+q+' C</text>';
  document.getElementById("scene").innerHTML=s;
  document.getElementById("prog").textContent=(idx+1)+"/5";
  document.getElementById("score").textContent=score+" pts";
}
["volt","cap"].forEach(id=>document.getElementById(id).oninput=render);
document.getElementById("check").onclick=()=>{
  const c=CH[idx];tries++;
  const v=+document.getElementById("volt").value,cf=+document.getElementById("cap").value;
  const q=v*cf;
  if(q===c.target){
    const pts=Math.max(15,45-(tries-1)*10);score+=pts;if(tries===1)__perfects++;
    tone(660,.12);tone(880,.14,"sine",.15,.1);confetti(35);
    document.getElementById("fb").textContent="⚡ Charged! "+cf+"F × "+v+"V = "+c.target+"C  (+"+pts+" pts)";
    document.getElementById("score").textContent=score+" pts";setTimeout(next,1300);
  } else { tone(200,.2,"triangle",.1);
    document.getElementById("fb").textContent="Stored "+q+" C — "+(q<c.target?"not enough. Raise V or C.":"too much! Lower V or C."); }
};
function load(){tries=0;document.getElementById("volt").value=6;document.getElementById("cap").value=4;
  document.getElementById("task").innerHTML=CH[idx].text;
  document.getElementById("fb").textContent="Charge stored: Q = C × V. Bigger plates or more volts = more charge.";
  render();}
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Charge champion! 🏆";
    var __st=__perfects>=5?5:__perfects>=4?4:__perfects>=3?3:__perfects>=2?2:1;
    document.getElementById("ovScore").textContent="⭐".repeat(__st)+"☆".repeat(5-__st)+"   "+(__perfects===5?"PERFECT RUN! ⚡  ":"")+score+" pts · Q = CV mastered";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ov").classList.add("show");return;}
  load();}
window.__qa={solve:()=>{const c=CH[idx];document.getElementById("volt").value=c.sol.v;document.getElementById("cap").value=c.sol.c;render();document.getElementById("check").click();}};
load();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script>
<script>(function(){function post(kind,text){try{parent.postMessage({type:"labEvent",kind:kind,text:String(text).slice(0,140),ts:Date.now()},"*")}catch(e){}}
function watch(id,kind){var el=document.getElementById(id);if(!el)return;var last=el.textContent;new MutationObserver(function(){var t=el.textContent;if(t&&t!==last){last=t;post(kind,t)}}).observe(el,{childList:true,characterData:true,subtree:true})}
if(document.getElementById("fb"))watch("fb","feedback");if(document.getElementById("task"))watch("task","challenge");if(document.getElementById("score"))watch("score","score");
document.addEventListener("click",function(e){var b=e.target.closest("button");if(b&&b.id!=="neoExit")post("action","clicked: "+(b.textContent||b.id).trim().slice(0,60))},true);
var inputs=document.querySelectorAll("input[type=range]");inputs.forEach(function(r){r.addEventListener("change",function(){post("adjust",(r.id||"slider")+" → "+r.value)})});
post("start","sim loaded: "+document.title);})();</script><script>(function(){var d=document.getElementById("ovDone");if(d)d.onclick=function(){try{parent.postMessage({type:"labExit"},"*")}catch(e){}if(window===window.top)try{history.back()}catch(e){}};})();</script></body></html>
