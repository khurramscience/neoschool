<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Rhyme Time 🎵</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#dbeafe 0%,#93c5fd 100%);color:#1a1612;-webkit-font-smoothing:antialiased}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#1d4ed8}
  .stars{display:flex;gap:4px;font-size:24px}
  .star{filter:grayscale(1);opacity:.35;transition:all .35s}
  .star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(18px,4.5vw,24px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 12px}
  .target-card{background:#fff;border-radius:24px;border:3px solid #93c5fd;padding:18px;display:flex;align-items:center;justify-content:center;gap:18px;box-shadow:0 4px 0 #93c5fd;margin-bottom:14px}
  .target-pic{font-size:clamp(50px,12vw,72px);line-height:1}
  .target-info{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
  .target-word{font-size:clamp(26px,7vw,36px);font-weight:700;color:#1d4ed8;text-transform:lowercase;letter-spacing:.02em}
  .speaker{background:#1d4ed8;color:#fff;border:none;border-radius:99px;padding:6px 14px;font-family:'Quicksand',sans-serif;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 3px 0 #1e40af}
  .speaker:active{transform:translateY(2px);box-shadow:0 1px 0 #1e40af}
  .grid{flex:1;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;align-content:start}
  .choice{background:#fff;border:none;border-radius:18px;padding:18px 14px;font-family:'Quicksand',sans-serif;cursor:pointer;box-shadow:0 4px 0 #3b82f6;transition:all .15s;touch-action:manipulation;display:flex;align-items:center;gap:12px}
  .choice-pic{font-size:clamp(36px,8vw,48px);line-height:1}
  .choice-word{font-size:clamp(20px,5vw,26px);font-weight:700;color:#1d4ed8;text-transform:lowercase;letter-spacing:.02em}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #3b82f6}
  .choice.wrong{background:#fecaca;animation:shake 0.4s}
  .choice.right{background:#bbf7d0}
  .choice.right .choice-word{color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#1d4ed8;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}
  .celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#1e40af;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">🎵 Rhyme Time</div>
    <div class="stars" id="stars">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>
  </div>
  <div class="question">Which one rhymes?</div>
  <div class="target-card">
    <div class="target-pic" id="targetPic"></div>
    <div class="target-info">
      <div class="target-word" id="targetWord"></div>
      <button class="speaker" onclick="speak()">🔊 Say it</button>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="help">Words that rhyme sound alike at the end. Listen!</div>
</div>
<div class="celebration" id="celebration"></div>

<script>
  // Rhyme families — each is a list of words that rhyme with each other.
  // Pictures provided where strong association exists.
  const FAMILIES = [
    { rhyme:"at",  words:[{w:"cat",e:"🐱"},{w:"hat",e:"🎩"},{w:"bat",e:"🦇"},{w:"mat",e:"🪀"},{w:"rat",e:"🐀"}] },
    { rhyme:"og",  words:[{w:"dog",e:"🐶"},{w:"frog",e:"🐸"},{w:"log",e:"🪵"},{w:"hog",e:"🐗"}] },
    { rhyme:"un",  words:[{w:"sun",e:"☀️"},{w:"bun",e:"🍞"},{w:"run",e:"🏃"},{w:"fun",e:"🎉"}] },
    { rhyme:"ig",  words:[{w:"pig",e:"🐷"},{w:"wig",e:"💇"},{w:"big",e:"🐘"},{w:"dig",e:"⛏️"}] },
    { rhyme:"all", words:[{w:"ball",e:"⚽"},{w:"wall",e:"🧱"},{w:"call",e:"📞"},{w:"tall",e:"🦒"}] },
    { rhyme:"ake", words:[{w:"cake",e:"🎂"},{w:"snake",e:"🐍"},{w:"lake",e:"🏞️"},{w:"rake",e:"🥄"}] },
    { rhyme:"ee",  words:[{w:"bee",e:"🐝"},{w:"tree",e:"🌳"},{w:"key",e:"🔑"},{w:"three",e:"3️⃣"}] },
    { rhyme:"oon", words:[{w:"moon",e:"🌙"},{w:"spoon",e:"🥄"},{w:"balloon",e:"🎈"}] },
    { rhyme:"ar",  words:[{w:"car",e:"🚗"},{w:"star",e:"⭐"},{w:"jar",e:"🫙"}] },
    { rhyme:"ish", words:[{w:"fish",e:"🐟"},{w:"dish",e:"🍽️"},{w:"wish",e:"⭐"}] },
  ];

  const targetPic = document.getElementById("targetPic");
  const targetWord = document.getElementById("targetWord");
  const gridEl = document.getElementById("grid");
  const starsEl = document.getElementById("stars");
  const celebration = document.getElementById("celebration");
  let stars = 0, target = null, correctChoice = null, round = 0;

  let audioCtx = null;
  function tone(f,d=0.15,t="sine",v=0.18){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}catch{}}
  const sounds = {
    right: () => { [523, 659, 784].forEach((f,i) => setTimeout(() => tone(f, 0.18, "triangle", 0.22), i*100)); },
    wrong: () => tone(220, 0.25, "sawtooth", 0.1),
    win:   () => { [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.22, "triangle", 0.25), i*120)); },
  };

  window.speak = function() {
    if (!target) return;
    try { const u = new SpeechSynthesisUtterance(target.w); u.rate = 0.7; u.pitch = 1.15; speechSynthesis.cancel(); speechSynthesis.speak(u); } catch {}
  };

  function nextRound() {
    round++;
    const family = FAMILIES[Math.floor(Math.random() * FAMILIES.length)];
    const shuffled = [...family.words].sort(() => Math.random() - 0.5);
    target = shuffled[0];
    correctChoice = shuffled[1]; // a word from the same family

    targetPic.textContent = target.e;
    targetWord.textContent = target.w;
    setTimeout(speak, 300);

    // 1 correct from same family + 3 distractors from OTHER families
    const distractors = [];
    const otherFamilies = FAMILIES.filter(f => f.rhyme !== family.rhyme).sort(() => Math.random() - 0.5);
    for (const f of otherFamilies) {
      if (distractors.length >= 3) break;
      const candidate = f.words[Math.floor(Math.random() * f.words.length)];
      if (!distractors.find(d => d.w === candidate.w)) distractors.push(candidate);
    }

    const choices = [correctChoice, ...distractors].sort(() => Math.random() - 0.5);
    gridEl.innerHTML = choices.map(c => `
      <button class="choice" onclick="pick('${c.w}', this)">
        <div class="choice-pic">${c.e}</div>
        <div class="choice-word">${c.w}</div>
      </button>`).join("");
  }

  window.pick = function(word, btn) {
    [...document.querySelectorAll(".choice")].forEach(b => b.disabled = true);
    if (word === correctChoice.w) {
      btn.classList.add("right");
      try { const u = new SpeechSynthesisUtterance(`${target.w}... ${word}`); u.rate = 0.7; u.pitch = 1.15; speechSynthesis.cancel(); speechSynthesis.speak(u); } catch {}
      sounds.right();
      stars++; lightStar(stars);
      postProgress(true);
      if (stars >= 5) setTimeout(win, 1500);
      else setTimeout(nextRound, 1500);
    } else {
      btn.classList.add("wrong");
      sounds.wrong();
      postProgress(false);
      setTimeout(() => {
        btn.classList.remove("wrong");
        [...document.querySelectorAll(".choice")].forEach(b => b.disabled = false);
      }, 500);
    }
  };

  function lightStar(n) { const s = starsEl.querySelectorAll(".star"); if (s[n-1]) s[n-1].classList.add("lit"); }
  function confettiBurst() {
    const colors = ["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];
    for (let i = 0; i < 50; i++) {
      const c = document.createElement("div"); c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.8) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }
  function win() {
    sounds.win(); confettiBurst();
    celebration.textContent = "🎉 Rhyme master! 🎉";
    celebration.classList.add("show");
    postProgress(true, true);
    setTimeout(() => {
      celebration.classList.remove("show");
      stars = 0; starsEl.querySelectorAll(".star").forEach(s => s.classList.remove("lit"));
      nextRound();
    }, 2800);
  }
  function postProgress(correct, complete=false) {
    try { parent.postMessage({ type:"labProgress", lab:"rhyme-time", round, correct, pair:`${target?.w}-${correctChoice?.w}`, stars, complete }, "*"); } catch {}
  }
  nextRound();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script></body>
</html>
