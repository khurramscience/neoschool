<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Greater or Less ⚖️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fae8ff 0%,#e9d5ff 100%);color:#1a1612;-webkit-font-smoothing:antialiased}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#9333ea}
  .stars{display:flex;gap:4px;font-size:24px}
  .star{filter:grayscale(1);opacity:.35;transition:all .35s}
  .star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(20px,5vw,28px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 14px}
  .scales{flex:1;display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:stretch;min-height:200px}
  .side{background:#fff;border-radius:22px;border:3px solid #d8b4fe;padding:14px;display:flex;flex-direction:column;box-shadow:0 4px 0 #d8b4fe}
  .side-num{font-size:clamp(38px,9vw,52px);font-weight:700;color:#9333ea;text-align:center;margin-bottom:8px}
  .side-items{flex:1;display:flex;flex-wrap:wrap;gap:6px;align-content:center;justify-content:center;min-height:100px}
  .item{font-size:clamp(24px,6vw,36px);animation:popIn 0.4s ease-out backwards}
  @keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .vs{display:flex;align-items:center;justify-content:center;font-size:36px;color:#9333ea;font-weight:700;width:30px}
  .choices{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}
  .choice{background:#fff;border:none;border-radius:18px;padding:18px 14px;font-family:'Quicksand',sans-serif;font-size:clamp(15px,3.5vw,17px);font-weight:700;color:#1a1f3a;cursor:pointer;box-shadow:0 4px 0 #9333ea;transition:all .15s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:6px}
  .choice .sym{font-size:clamp(28px,7vw,40px);font-weight:700;color:#9333ea;line-height:1}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #9333ea}
  .choice.wrong{background:#fecaca;animation:shake 0.4s}
  .choice.right{background:#bbf7d0}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#9333ea;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}
  .celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#7a7367;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">⚖️ Greater or Less</div>
    <div class="stars" id="stars">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>
  </div>
  <div class="question" id="question">Which is bigger?</div>
  <div class="scales">
    <div class="side"><div class="side-num" id="numA">0</div><div class="side-items" id="itemsA"></div></div>
    <div class="vs">vs</div>
    <div class="side"><div class="side-num" id="numB">0</div><div class="side-items" id="itemsB"></div></div>
  </div>
  <div class="choices">
    <button class="choice" onclick="pick('left', this)"><span class="sym">&lt;</span>Left is more</button>
    <button class="choice" onclick="pick('equal', this)"><span class="sym">=</span>Equal</button>
    <button class="choice" onclick="pick('right', this)"><span class="sym">&gt;</span>Right is more</button>
  </div>
  <div class="help">Count both sides. Which has more, or are they equal?</div>
</div>
<div class="celebration" id="celebration"></div>

<script>
  // The choice labels are intentionally clear ('left is more' / 'right is more' / 'equal')
  // because K kids haven't learned the < > symbols yet. The symbols are shown as
  // reinforcement.
  const ICONS = ["🍓","🍎","🍌","⭐","💖","🐝","🦋","🌸","🪲","🌼"];
  const itemsA = document.getElementById("itemsA");
  const itemsB = document.getElementById("itemsB");
  const numA = document.getElementById("numA");
  const numB = document.getElementById("numB");
  const starsEl = document.getElementById("stars");
  const celebration = document.getElementById("celebration");
  let stars = 0, a = 0, b = 0, target = "", round = 0;

  let audioCtx = null;
  function tone(f,d=0.15,t="sine",v=0.18){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}catch{}}
  const sounds = {
    right: () => { [523, 659, 784].forEach((f,i) => setTimeout(() => tone(f, 0.18, "triangle", 0.22), i*100)); },
    wrong: () => tone(220, 0.25, "sawtooth", 0.1),
    win:   () => { [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.22, "triangle", 0.25), i*120)); },
  };

  function nextRound() {
    round++;
    // One out of every ~4 rounds: equal
    const equal = Math.random() < 0.25;
    a = Math.floor(Math.random() * 9) + 1;
    b = equal ? a : Math.max(1, Math.min(10, a + (Math.random() < 0.5 ? -1 : 1) * (Math.floor(Math.random() * 4) + 1)));
    if (b === a && !equal) b = Math.min(10, a + 1);
    target = a > b ? "left" : (a < b ? "right" : "equal");

    numA.textContent = a;
    numB.textContent = b;
    const iconA = ICONS[Math.floor(Math.random() * ICONS.length)];
    const iconB = ICONS[Math.floor(Math.random() * ICONS.length)];
    itemsA.innerHTML = Array.from({length: a}, (_, i) => `<div class="item" style="animation-delay:${i*0.05}s">${iconA}</div>`).join("");
    itemsB.innerHTML = Array.from({length: b}, (_, i) => `<div class="item" style="animation-delay:${i*0.05}s">${iconB}</div>`).join("");

    [...document.querySelectorAll(".choice")].forEach(b => { b.disabled = false; b.classList.remove("wrong","right"); });
  }

  window.pick = function(side, btn) {
    [...document.querySelectorAll(".choice")].forEach(b => b.disabled = true);
    if (side === target) {
      btn.classList.add("right");
      sounds.right();
      stars++; lightStar(stars);
      postProgress(true);
      if (stars >= 5) setTimeout(win, 600);
      else setTimeout(nextRound, 900);
    } else {
      btn.classList.add("wrong");
      sounds.wrong();
      postProgress(false);
      setTimeout(() => {
        btn.classList.remove("wrong");
        [...document.querySelectorAll(".choice")].forEach(b => b.disabled = false);
      }, 500);
    }
  };

  function lightStar(n) { const s = starsEl.querySelectorAll(".star"); if (s[n-1]) s[n-1].classList.add("lit"); }
  function confettiBurst() {
    const colors = ["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];
    for (let i = 0; i < 50; i++) {
      const c = document.createElement("div"); c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.8) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }
  function win() {
    sounds.win(); confettiBurst();
    celebration.textContent = "🎉 Math wizard! 🎉";
    celebration.classList.add("show");
    postProgress(true, true);
    setTimeout(() => {
      celebration.classList.remove("show");
      stars = 0; starsEl.querySelectorAll(".star").forEach(s => s.classList.remove("lit"));
      nextRound();
    }, 2600);
  }
  function postProgress(correct, complete=false) {
    try { parent.postMessage({ type:"labProgress", lab:"greater-or-less", round, correct, comparison:`${a} vs ${b}`, target, stars, complete }, "*"); } catch {}
  }
  nextRound();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script></body>
</html>
