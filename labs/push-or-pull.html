<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Push or Pull 🛒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fef3c7 0%,#fbbf24 100%);color:#1a1612}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .title{font-size:22px;font-weight:700;color:#b45309}
  .stars{display:flex;gap:4px;font-size:24px}.star{filter:grayscale(1);opacity:.35;transition:all .35s}.star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(18px,4.5vw,24px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 12px}
  .stage{background:#fff;border-radius:24px;border:3px solid #fbbf24;padding:24px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 4px 0 #fbbf24;margin-bottom:18px}
  .obj{font-size:clamp(64px,17vw,100px)}
  .oname{font-size:clamp(15px,3.8vw,19px);font-weight:600;color:#b45309;text-align:center;line-height:1.4}
  .choices{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .choice{background:#fff;border:none;border-radius:20px;padding:22px 10px;font-family:'Quicksand',sans-serif;cursor:pointer;box-shadow:0 4px 0 #f59e0b;transition:all .15s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:8px}
  .choice .ic{font-size:clamp(40px,10vw,56px)}.choice .lb{font-size:clamp(18px,4.5vw,24px);font-weight:700;color:#b45309}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #f59e0b}
  .choice.wrong{background:#fecaca;animation:shake .4s}.choice.right{background:#bbf7d0}.choice.right .lb{color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#b45309;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}.celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#92400e;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="title">🛒 Push or Pull</div>
    <div class="stars" id="stars"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div></div>
  <div class="question">Is this a push or a pull?</div>
  <div class="stage"><div class="obj" id="obj"></div><div class="oname" id="oname"></div></div>
  <div class="choices">
    <button class="choice" onclick="pick('push',this)"><span class="ic">👉</span><span class="lb">Push</span></button>
    <button class="choice" onclick="pick('pull',this)"><span class="ic">🫳</span><span class="lb">Pull</span></button>
  </div>
  <div class="help">A push moves things AWAY. A pull brings things TOWARD you.</div>
</div>
<div class="celebration" id="celebration"></div>
<script>
  const ACTS=[{e:"🛒",n:"Pushing a shopping cart",a:"push"},{e:"🚪",n:"Pulling a door open",a:"pull"},{e:"🪁",n:"Pulling a kite string",a:"pull"},{e:"🔔",n:"Pushing a doorbell",a:"push"},{e:"🛝",n:"Pushing a friend on a swing",a:"push"},{e:"🎣",n:"Pulling in a fish",a:"pull"},{e:"🧲",n:"A magnet pulling metal",a:"pull"},{e:"⚽",n:"Kicking (pushing) a ball",a:"push"},{e:"🛷",n:"Pulling a sled",a:"pull"},{e:"🚲",n:"Pushing bike pedals",a:"push"},{e:"🪅",n:"Pulling a piñata rope",a:"pull"},{e:"🛗",n:"Pushing an elevator button",a:"push"},{e:"🧸",n:"Pulling a toy wagon",a:"pull"},{e:"🚮",n:"Pushing a trash can",a:"push"}];
  const objEl=document.getElementById("obj"),onameEl=document.getElementById("oname"),starsEl=document.getElementById("stars"),celebration=document.getElementById("celebration");
  let stars=0,round=0,answer="";
  let actx=null;function tone(f,d=.15,t="sine",v=.18){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.stop(actx.currentTime+d)}catch{}}
  const S={right:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.18,"triangle",.22),i*100))},wrong:()=>tone(220,.25,"sawtooth",.1),win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.22,"triangle",.25),i*120))}};
  function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.rate=.85;u.pitch=1.05;speechSynthesis.cancel();speechSynthesis.speak(u);}catch{}}
  function nextRound(){round++;const it=ACTS[Math.floor(Math.random()*ACTS.length)];answer=it.a;objEl.textContent=it.e;onameEl.textContent=it.n;setTimeout(()=>speak(it.n),250);
    [...document.querySelectorAll(".choice")].forEach(b=>{b.disabled=false;b.classList.remove("wrong","right");});}
  window.pick=function(a,btn){[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=true);
    if(a===answer){btn.classList.add("right");S.right();stars++;lightStar(stars);post(true);if(stars>=5)setTimeout(win,700);else setTimeout(nextRound,900);}
    else{btn.classList.add("wrong");S.wrong();post(false);setTimeout(()=>{btn.classList.remove("wrong");[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=false);},500);}};
  function lightStar(n){const s=starsEl.querySelectorAll(".star");if(s[n-1])s[n-1].classList.add("lit");}
  function confettiBurst(){const c=["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];for(let i=0;i<50;i++){const e=document.createElement("div");e.className="confetti";e.style.left=Math.random()*100+"vw";e.style.background=c[Math.floor(Math.random()*c.length)];e.style.animationDelay=(Math.random()*.8)+"s";document.body.appendChild(e);setTimeout(()=>e.remove(),2600);}}
  function win(){S.win();confettiBurst();celebration.textContent="🎉 Force expert! 🎉";celebration.classList.add("show");post(true,true);setTimeout(()=>{celebration.classList.remove("show");stars=0;starsEl.querySelectorAll(".star").forEach(s=>s.classList.remove("lit"));nextRound();},2600);}
  function post(correct,complete=false){try{parent.postMessage({type:"labProgress",lab:"push-or-pull",round,correct,answer,stars,complete},"*");}catch{}}
  nextRound();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}if(history.length>1){try{history.back()}catch(e){}setTimeout(function(){location.href="/"},400)}else{location.href="/"}};})();</script></body>
</html>
