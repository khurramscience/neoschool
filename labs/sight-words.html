<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Sight Words 🌟</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fef9c3 0%,#fde047 100%);color:#1a1612;-webkit-font-smoothing:antialiased}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .title{font-size:22px;font-weight:700;color:#a16207}
  .stars{display:flex;gap:4px;font-size:24px}
  .star{filter:grayscale(1);opacity:.35;transition:all .35s}
  .star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(20px,5vw,28px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 10px}
  .target-box{background:#fff;border-radius:24px;border:3px solid #fde047;padding:22px 18px;display:flex;flex-direction:column;align-items:center;gap:12px;box-shadow:0 4px 0 #fde047;margin-bottom:14px}
  .target-emoji{font-size:clamp(40px,10vw,60px)}
  .target-word{font-family:'Quicksand',sans-serif;font-size:clamp(16px,4vw,20px);color:#7a7367;font-style:italic;text-align:center}
  .speaker{background:#a16207;color:#fff;border:none;border-radius:99px;padding:10px 22px;font-family:'Quicksand',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 3px 0 #854d0e}
  .speaker:active{transform:translateY(2px);box-shadow:0 1px 0 #854d0e}
  .grid{flex:1;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;align-content:start}
  .choice{background:#fff;border:none;border-radius:18px;padding:24px 16px;font-family:'Quicksand',sans-serif;font-size:clamp(28px,7vw,38px);font-weight:700;color:#a16207;cursor:pointer;box-shadow:0 4px 0 #ca8a04;transition:all .15s;touch-action:manipulation;text-transform:lowercase}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #ca8a04}
  .choice.wrong{background:#fecaca;animation:shake 0.4s}
  .choice.right{background:#bbf7d0;color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#a16207;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}
  .celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#7a7367;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">🌟 Sight Words</div>
    <div class="stars" id="stars">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>
  </div>
  <div class="question">Find this word!</div>
  <div class="target-box">
    <div class="target-emoji" id="emoji">👂</div>
    <div class="target-word" id="hint">Listen carefully…</div>
    <button class="speaker" onclick="speak()">🔊 Say it again</button>
  </div>
  <div class="grid" id="grid"></div>
  <div class="help">Tap "Say it" to hear the word, then find it below.</div>
</div>
<div class="celebration" id="celebration"></div>

<script>
  // Dolch pre-K + K sight words (highest frequency, most foundational)
  const SIGHT_WORDS = [
    "the","of","and","a","to","in","is","you","that","it",
    "he","was","for","on","are","as","with","his","they","at",
    "see","go","look","my","like","play","run","said","up","we",
    "can","come","down","find","help","here","I","jump","little","make",
    "me","not","one","red","blue","yellow","big","funny","do","be"
  ];

  const emojiEl = document.getElementById("emoji");
  const hintEl = document.getElementById("hint");
  const gridEl = document.getElementById("grid");
  const starsEl = document.getElementById("stars");
  const celebration = document.getElementById("celebration");
  let stars = 0, target = "", round = 0;

  let audioCtx = null;
  function tone(f,d=0.15,t="sine",v=0.18){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}catch{}}
  const sounds = {
    right: () => { [523, 659, 784].forEach((f,i) => setTimeout(() => tone(f, 0.18, "triangle", 0.22), i*100)); },
    wrong: () => tone(220, 0.25, "sawtooth", 0.1),
    win:   () => { [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.22, "triangle", 0.25), i*120)); },
  };

  window.speak = function() {
    if (!target) return;
    try { const u = new SpeechSynthesisUtterance(target); u.rate = 0.75; u.pitch = 1.1; speechSynthesis.cancel(); speechSynthesis.speak(u); } catch {}
  };

  function nextRound() {
    round++;
    target = SIGHT_WORDS[Math.floor(Math.random() * SIGHT_WORDS.length)];
    // Show a hint after 2nd round to keep it readable
    hintEl.textContent = round > 1 ? `(it's a ${target.length}-letter word)` : "Listen carefully…";
    setTimeout(speak, 300);

    // 4 choices: target + 3 similar-length distractors
    const opts = new Set([target]);
    const candidates = SIGHT_WORDS.filter(w => w !== target);
    candidates.sort(() => Math.random() - 0.5);
    let i = 0;
    while (opts.size < 4 && i < candidates.length) {
      // Prefer similar length to make it harder than visual scanning
      if (Math.abs(candidates[i].length - target.length) <= 2) opts.add(candidates[i]);
      i++;
    }
    while (opts.size < 4 && i < candidates.length) { opts.add(candidates[i]); i++; }

    const shuffled = [...opts].sort(() => Math.random() - 0.5);
    gridEl.innerHTML = shuffled.map(w => `<button class="choice" onclick="pick('${w}', this)">${w}</button>`).join("");
  }

  window.pick = function(word, btn) {
    [...document.querySelectorAll(".choice")].forEach(b => b.disabled = true);
    if (word === target) {
      btn.classList.add("right");
      sounds.right();
      stars++; lightStar(stars);
      postProgress(true);
      if (stars >= 5) setTimeout(win, 700);
      else setTimeout(nextRound, 900);
    } else {
      btn.classList.add("wrong");
      sounds.wrong();
      postProgress(false);
      setTimeout(() => {
        btn.classList.remove("wrong");
        [...document.querySelectorAll(".choice")].forEach(b => b.disabled = false);
      }, 500);
    }
  };

  function lightStar(n) { const s = starsEl.querySelectorAll(".star"); if (s[n-1]) s[n-1].classList.add("lit"); }
  function confettiBurst() {
    const colors = ["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];
    for (let i = 0; i < 50; i++) {
      const c = document.createElement("div"); c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.8) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }
  function win() {
    sounds.win(); confettiBurst();
    celebration.textContent = "🎉 Reading star! 🎉";
    celebration.classList.add("show");
    postProgress(true, true);
    setTimeout(() => {
      celebration.classList.remove("show");
      stars = 0; starsEl.querySelectorAll(".star").forEach(s => s.classList.remove("lit"));
      nextRound();
    }, 2800);
  }
  function postProgress(correct, complete=false) {
    try { parent.postMessage({ type:"labProgress", lab:"sight-words", round, correct, target, stars, complete }, "*"); } catch {}
  }
  nextRound();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}if(history.length>1){try{history.back()}catch(e){}setTimeout(function(){location.href="/"},400)}else{location.href="/"}};})();</script></body>
</html>
