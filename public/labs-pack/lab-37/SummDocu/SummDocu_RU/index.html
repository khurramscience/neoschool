<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Математическая Мозаика</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧩 Математическая Мозаика</h1>
            <p>Размести кусочки мозаики так, чтобы суммы чисел по горизонтали и вертикали совпадали с указанными значениями</p>
        </header>

        <div class="game-controls">
            <button id="newGameBtn" class="btn">Новая игра</button>
            <button id="checkBtn" class="btn">Проверить</button>
            <button id="hintBtn" class="btn">Подсказка</button>
            <div class="size-selector">
                <label for="gridSizeSelect">Размер поля:</label>
                <select id="gridSizeSelect" class="size-select">
                    <option value="2">2x2</option>
                    <option value="3">3x3</option>
                    <option value="4" selected>4x4</option>
                    <option value="5">5x5</option>
                    <option value="6">6x6</option>
                </select>
            </div>
            <div class="score">Уровень: <span id="level">1</span></div>
        </div>

        <div class="game-board">
            <!-- Суммы по горизонтали (сверху) -->
            <div class="horizontal-sums top-sums"></div>
            
            <div class="main-area">
                <!-- Суммы по вертикали (слева) -->
                <div class="vertical-sums left-sums"></div>
                
                <!-- Игровое поле -->
                <div class="grid-container">
                    <div id="gameGrid" class="game-grid"></div>
                </div>
                
                <!-- Суммы по вертикали (справа) -->
                <div class="vertical-sums right-sums"></div>
            </div>
            
            <!-- Суммы по горизонтали (снизу) -->
            <div class="horizontal-sums bottom-sums"></div>
        </div>

        <!-- Область с кусочками мозаики -->
        <div class="pieces-container">
            <h3>Кусочки мозаики:</h3>
            <div id="piecesArea" class="pieces-area"></div>
        </div>

        <!-- Модальное окно для результатов -->
        <div id="resultModal" class="modal">
            <div class="modal-content">
                <span class="close">&times;</span>
                <h2 id="resultTitle"></h2>
                <p id="resultMessage"></p>
                <button id="nextLevelBtn" class="btn">Следующий уровень</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
