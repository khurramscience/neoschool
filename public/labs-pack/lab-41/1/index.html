<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Laboratory</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧮 Math Laboratory</h1>
            <p>Practice addition, subtraction and multiplication skills!</p>
        </header>

        <div class="game-container">
            <!-- Start screen -->
            <div id="start-screen" class="screen active">
                <div class="card">
                    <h2>Game Settings</h2>
                    <div class="settings">
                        <div class="setting-group">
                            <label>Time (seconds):</label>
                            <input type="number" id="time-limit" value="60" min="10" max="300">
                        </div>
                        <div class="setting-group">
                            <label>Operations:</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" id="addition" checked> Addition (+)</label>
                                <label><input type="checkbox" id="subtraction" checked> Subtraction (-)</label>
                                <label><input type="checkbox" id="multiplication" checked> Multiplication (×)</label>
                            </div>
                        </div>
                        <div class="setting-group">
                            <label>Difficulty:</label>
                            <select id="difficulty">
                                <option value="easy">Easy (1-10)</option>
                                <option value="medium" selected>Medium (1-50)</option>
                                <option value="hard">Hard (1-100)</option>
                            </select>
                        </div>
                    </div>
                    <button id="start-btn" class="btn btn-primary">Start Game</button>
                </div>
            </div>

            <!-- Game screen -->
            <div id="game-screen" class="screen">
                <div class="game-header">
                    <div class="timer">
                        <span>⏱️ Time:</span>
                        <span id="time-display">60</span>
                    </div>
                    <div class="score">
                        <span>✅ Correct:</span>
                        <span id="correct-answers">0</span>
                    </div>
                    <div class="total">
                        <span>📝 Total:</span>
                        <span id="total-answers">0</span>
                    </div>
                </div>

                <div class="card game-card">
                    <div class="question">
                        <span id="num1">5</span>
                        <span id="operator">+</span>
                        <span id="num2">3</span>
                        <span>=</span>
                        <input type="number" id="answer-input" placeholder="?" autocomplete="off">
                    </div>
                    <button id="submit-btn" class="btn btn-success">Answer</button>
                </div>

                <button id="end-game-btn" class="btn btn-secondary">End Game</button>
            </div>

            <!-- Results screen -->
            <div id="results-screen" class="screen">
                <div class="card">
                    <h2>🎉 Game Results</h2>
                    <div class="stats">
                        <div class="stat-item">
                            <span class="stat-label">Correct answers:</span>
                            <span id="final-correct" class="stat-value">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Total questions:</span>
                            <span id="final-total" class="stat-value">0</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Success rate:</span>
                            <span id="final-percentage" class="stat-value">0%</span>
                        </div>
                    </div>

                    <div class="mistakes-section">
                        <h3>❌ Wrong answers:</h3>
                        <div id="mistakes-list" class="mistakes-list">
                            <!-- Mistakes will be displayed here -->
                        </div>
                    </div>

                    <div class="actions">
                        <button id="play-again-btn" class="btn btn-primary">Play Again</button>
                        <button id="back-to-menu-btn" class="btn btn-secondary">Back to Menu</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
