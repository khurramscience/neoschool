<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Memory - Laboratory Work</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧮 Math Memory</h1>
            <p>Find pairs: example and its answer!</p>
        </header>

        <div class="game-controls">
            <div class="mode-selector">
                <h3>Choose game mode:</h3>
                <div class="mode-buttons">
                    <button id="stepsMode" class="mode-btn active">Count Steps</button>
                    <button id="timeMode" class="mode-btn">Count Time</button>
                </div>
            </div>
            
            <div class="difficulty-selector">
                <h3>Difficulty:</h3>
                <select id="difficulty">
                    <option value="easy">Easy (6 pairs)</option>
                    <option value="medium" selected>Medium (8 pairs)</option>
                    <option value="hard">Hard (12 pairs)</option>
                </select>
            </div>

            <button id="startGame" class="start-btn">Start Game</button>
        </div>

        <div class="game-info">
            <div class="info-item">
                <span class="label">Steps:</span>
                <span id="stepsCount">0</span>
            </div>
            <div class="info-item">
                <span class="label">Time:</span>
                <span id="timeCount">00:00</span>
            </div>
            <div class="info-item">
                <span class="label">Pairs Found:</span>
                <span id="pairsFound">0</span>
            </div>
        </div>

        <div id="gameBoard" class="game-board"></div>

        <div id="gameOver" class="game-over hidden">
            <div class="game-over-content">
                <h2>🎉 Congratulations!</h2>
                <p>You found all pairs!</p>
                <div class="results">
                    <p>Steps: <span id="finalSteps">0</span></p>
                    <p>Time: <span id="finalTime">00:00</span></p>
                </div>
                <button id="playAgain" class="play-again-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
