<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Syllable Clap 🥁</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#f3e8ff 0%,#d8b4fe 100%);color:#1a1612;-webkit-font-smoothing:antialiased}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#7e22ce}
  .stars{display:flex;gap:4px;font-size:24px}
  .star{filter:grayscale(1);opacity:.35;transition:all .35s}
  .star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(20px,5vw,26px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 12px}
  .word-card{background:#fff;border-radius:24px;border:3px solid #d8b4fe;padding:20px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 4px 0 #d8b4fe;margin-bottom:14px;flex:0 0 auto}
  .picture{font-size:clamp(60px,15vw,90px);line-height:1}
  .word{font-size:clamp(32px,8vw,46px);font-weight:700;color:#7e22ce;text-transform:lowercase;letter-spacing:.02em}
  .clap-btn{background:#7e22ce;color:#fff;border:none;border-radius:99px;padding:10px 22px;font-family:'Quicksand',sans-serif;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 3px 0 #6b21a8}
  .clap-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #6b21a8}
  .clap-display{display:flex;gap:10px;justify-content:center;min-height:44px;align-items:center}
  .clap{font-size:34px;animation:clapPop .35s ease-out backwards}
  @keyframes clapPop{0%{transform:scale(0) rotate(-30deg)}60%{transform:scale(1.3) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
  .choices{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-content:start}
  .choice{aspect-ratio:1;background:#fff;border:none;border-radius:18px;font-family:'Quicksand',sans-serif;font-size:clamp(34px,8vw,46px);font-weight:700;color:#7e22ce;cursor:pointer;box-shadow:0 4px 0 #a855f7;transition:all .15s;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #a855f7}
  .choice.wrong{background:#fecaca;animation:shake 0.4s}
  .choice.right{background:#bbf7d0;color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#7e22ce;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}
  .celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#581c87;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">🥁 Syllable Clap</div>
    <div class="stars" id="stars">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>
  </div>
  <div class="question">How many claps in the word?</div>
  <div class="word-card">
    <div class="picture" id="picture"></div>
    <div class="word" id="word"></div>
    <button class="clap-btn" onclick="clapItOut()">👏 Clap it</button>
    <div class="clap-display" id="claps"></div>
  </div>
  <div class="choices">
    <button class="choice" onclick="pick(1, this)">1</button>
    <button class="choice" onclick="pick(2, this)">2</button>
    <button class="choice" onclick="pick(3, this)">3</button>
    <button class="choice" onclick="pick(4, this)">4</button>
  </div>
  <div class="help">Listen to the syllables (the beats). Cat = 1. Mon-key = 2. Ba-na-na = 3.</div>
</div>
<div class="celebration" id="celebration"></div>

<script>
  // Words paired with picture + syllable count. Curated for clear syllabic structure.
  const WORDS = [
    {w:"cat",       e:"🐱", s:1},
    {w:"dog",       e:"🐶", s:1},
    {w:"sun",       e:"☀️", s:1},
    {w:"fish",      e:"🐟", s:1},
    {w:"tree",      e:"🌳", s:1},
    {w:"car",       e:"🚗", s:1},
    {w:"rabbit",    e:"🐰", s:2},
    {w:"monkey",    e:"🐒", s:2},
    {w:"apple",     e:"🍎", s:2},
    {w:"flower",    e:"🌸", s:2},
    {w:"pencil",    e:"✏️", s:2},
    {w:"turtle",    e:"🐢", s:2},
    {w:"happy",     e:"😀", s:2},
    {w:"butter",    e:"🧈", s:2},
    {w:"banana",    e:"🍌", s:3},
    {w:"elephant",  e:"🐘", s:3},
    {w:"dinosaur",  e:"🦕", s:3},
    {w:"butterfly", e:"🦋", s:3},
    {w:"family",    e:"👨‍👩‍👧", s:3},
    {w:"tomato",    e:"🍅", s:3},
    {w:"caterpillar", e:"🐛", s:4},
    {w:"watermelon",  e:"🍉", s:4},
    {w:"alligator",   e:"🐊", s:4},
  ];

  const pictureEl = document.getElementById("picture");
  const wordEl = document.getElementById("word");
  const clapsEl = document.getElementById("claps");
  const starsEl = document.getElementById("stars");
  const celebration = document.getElementById("celebration");
  let stars = 0, current = null, round = 0;

  let audioCtx = null;
  function tone(f,d=0.15,t="sine",v=0.18){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}catch{}}
  const sounds = {
    clap:  () => tone(180 + Math.random()*60, 0.08, "square", 0.15),
    right: () => { [523, 659, 784].forEach((f,i) => setTimeout(() => tone(f, 0.18, "triangle", 0.22), i*100)); },
    wrong: () => tone(220, 0.25, "sawtooth", 0.1),
    win:   () => { [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.22, "triangle", 0.25), i*120)); },
  };

  // Animate claps + speak the word in syllables (one syllable per clap)
  window.clapItOut = function() {
    if (!current) return;
    clapsEl.innerHTML = "";
    // Speak slowly with pauses (the speech engine handles syllable break poorly,
    // so we just slow the rate and let the animation carry the beat)
    try {
      const u = new SpeechSynthesisUtterance(current.w);
      u.rate = 0.55; u.pitch = 1.15;
      speechSynthesis.cancel(); speechSynthesis.speak(u);
    } catch {}
    for (let i = 0; i < current.s; i++) {
      setTimeout(() => {
        const c = document.createElement("div");
        c.className = "clap";
        c.textContent = "👏";
        c.style.animationDelay = "0s";
        clapsEl.appendChild(c);
        sounds.clap();
      }, i * 380);
    }
  };

  function nextRound() {
    round++;
    current = WORDS[Math.floor(Math.random() * WORDS.length)];
    pictureEl.textContent = current.e;
    wordEl.textContent = current.w;
    clapsEl.innerHTML = "";
    setTimeout(clapItOut, 300);
  }

  window.pick = function(n, btn) {
    [...document.querySelectorAll(".choice")].forEach(b => b.disabled = true);
    if (n === current.s) {
      btn.classList.add("right");
      sounds.right();
      stars++; lightStar(stars);
      postProgress(true);
      if (stars >= 5) setTimeout(win, 800);
      else setTimeout(() => { [...document.querySelectorAll(".choice")].forEach(b => { b.disabled = false; b.classList.remove("right"); }); nextRound(); }, 1200);
    } else {
      btn.classList.add("wrong");
      sounds.wrong();
      postProgress(false);
      setTimeout(() => {
        btn.classList.remove("wrong");
        [...document.querySelectorAll(".choice")].forEach(b => b.disabled = false);
      }, 500);
    }
  };

  function lightStar(n) { const s = starsEl.querySelectorAll(".star"); if (s[n-1]) s[n-1].classList.add("lit"); }
  function confettiBurst() {
    const colors = ["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];
    for (let i = 0; i < 50; i++) {
      const c = document.createElement("div"); c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.8) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }
  function win() {
    sounds.win(); confettiBurst();
    celebration.textContent = "🎉 Clap champion! 🎉";
    celebration.classList.add("show");
    postProgress(true, true);
    setTimeout(() => {
      celebration.classList.remove("show");
      stars = 0; starsEl.querySelectorAll(".star").forEach(s => s.classList.remove("lit"));
      [...document.querySelectorAll(".choice")].forEach(b => { b.disabled = false; b.classList.remove("right"); });
      nextRound();
    }, 2800);
  }
  function postProgress(correct, complete=false) {
    try { parent.postMessage({ type:"labProgress", lab:"syllable-clap", round, correct, word: current?.w, syllables: current?.s, stars, complete }, "*"); } catch {}
  }
  nextRound();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script></body>
</html>
