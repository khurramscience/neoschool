<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>pH Mixer 🧫</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#ecfccb,#bef264)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:560px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#4d7c0f}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#4d7c0f;box-shadow:0 2px 0 #a3e635}
.task{background:#fff;border:3px solid #a3e635;border-radius:16px;box-shadow:0 4px 0 #a3e635;padding:10px 14px;text-align:center;font-size:clamp(15px,4.4vw,18px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;height:auto}
.liquid{transition:fill .4s}
.meter{transition:x .4s}
.drops{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:6px}
.drops button{min-height:56px;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.15);touch-action:manipulation}
.drops .acid{background:#fecaca;color:#b91c1c}
.drops .base{background:#bfdbfe;color:#1d4ed8}
.drops .rst{background:#fff;color:#4d7c0f}
.drops button:active{transform:translateY(2px)}
.fb{text-align:center;font-size:14px;font-weight:700;min-height:20px;margin-top:8px;color:#4d7c0f}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#4d7c0f}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#4d7c0f;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🧫 pH Mixer</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 400 240" id="scene"></svg></div>
  <div class="drops">
    <button class="acid" id="addAcid">🍋 + Acid drop</button>
    <button class="base" id="addBase">🧼 + Base drop</button>
    <button class="rst" id="reset">↺ Fresh water</button>
  </div>
  <div class="fb" id="fb">Acid pushes pH down · base pushes pH up</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><button id="ovNext">Next →</button></div>
<script>
const GAME={id:"sim-ph-mixer"};
function genChallenges(){
  return [
    {start:7,target:4,text:"Make a sour solution: bring the pH to <b>4</b>"},
    {start:7,target:10,text:"Make a slippery base: bring the pH to <b>10</b>"},
    {start:7,target:2,text:"Stomach-acid strong: pH <b>2</b>"},
    {start:3,target:7,text:"Neutralize this acid back to <b>7</b>"},
    {start:12,target:7,text:"Neutralize this base back to <b>7</b>"},
  ];
}
const CH=genChallenges();
let idx=0,score=0,ph=7,drops=0,__perfects=0;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch{}}return AC;}
function tone(f,t=.12,ty="sine",g=.15,w=0){const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime+w);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+w+t);o.connect(v).connect(c.destination);o.start(c.currentTime+w);o.stop(c.currentTime+w+t+.02);}
const CC=["#4d7c0f","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch{}}
function phColor(p){
  const stops=[[0,"#dc2626"],[3,"#f97316"],[5,"#facc15"],[7,"#4ade80"],[9,"#22d3ee"],[11,"#6366f1"],[14,"#7c3aed"]];
  for(let i=0;i<stops.length-1;i++){const [p0,c0]=stops[i],[p1,c1]=stops[i+1];
    if(p>=p0&&p<=p1){const t=(p-p0)/(p1-p0);
      const h=(a,b)=>Math.round(parseInt(a,16)+(parseInt(b,16)-parseInt(a,16))*t).toString(16).padStart(2,"0");
      return "#"+h(c0.slice(1,3),c1.slice(1,3))+h(c0.slice(3,5),c1.slice(3,5))+h(c0.slice(5,7),c1.slice(5,7));}}
  return "#4ade80";
}
function render(){
  const col=phColor(ph);
  const mx=40+(ph/14)*320;
  let s='<rect x="120" y="40" width="160" height="150" rx="14" fill="#ffffffaa" stroke="#64748b" stroke-width="4"/>';
  s+='<rect class="liquid" x="128" y="80" width="144" height="102" rx="8" fill="'+col+'"/>';
  s+='<text x="200" y="140" font-size="30" text-anchor="middle" fill="#fff" font-weight="bold" style="text-shadow:0 1px 3px rgba(0,0,0,.4)">pH '+ph.toFixed(1)+'</text>';
  // scale bar
  s+='<rect x="40" y="212" width="320" height="12" rx="6" fill="url(#g)"/>';
  s+='<defs><linearGradient id="g"><stop offset="0%" stop-color="#dc2626"/><stop offset="35%" stop-color="#facc15"/><stop offset="50%" stop-color="#4ade80"/><stop offset="70%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient></defs>';
  s+='<polygon points="'+mx+',208 '+(mx-7)+',196 '+(mx+7)+',196" fill="#1f2937"/>';
  s+='<text x="40" y="238" font-size="11" fill="#334155" font-weight="bold">0 acid</text><text x="200" y="238" font-size="11" text-anchor="middle" fill="#334155" font-weight="bold">7 neutral</text><text x="360" y="238" font-size="11" text-anchor="end" fill="#334155" font-weight="bold">14 base</text>';
  // target marker
  const tx=40+(CH[idx].target/14)*320;
  s+='<circle cx="'+tx+'" cy="218" r="9" fill="none" stroke="#1f2937" stroke-width="3"/>';
  document.getElementById("scene").innerHTML=s;
  document.getElementById("prog").textContent=(idx+1)+"/5";
  document.getElementById("score").textContent=score+" pts";
}
function checkWin(){
  const c=CH[idx];
  if(Math.abs(ph-c.target)<0.01){
    const pts=Math.max(15,40-Math.max(0,drops-Math.abs(c.target-c.start)*2)*5);score+=pts;if(drops<=Math.abs(c.target-c.start)*2)__perfects++;
    tone(660,.12);tone(880,.14,"sine",.15,.1);confetti(30);
    document.getElementById("fb").textContent="🧪 Perfect! pH "+c.target+" achieved  (+"+pts+" pts)";
    document.getElementById("score").textContent=score+" pts";
    setTimeout(next,1300);
    return true;
  }
  return false;
}
document.getElementById("addAcid").onclick=()=>{ph=Math.max(0,+(ph-0.5).toFixed(1));drops++;tone(420,.07,"sine",.08);
  document.getElementById("fb").textContent="Acid drop — H⁺ ions push pH DOWN.";render();checkWin();};
document.getElementById("addBase").onclick=()=>{ph=Math.min(14,+(ph+0.5).toFixed(1));drops++;tone(520,.07,"sine",.08);
  document.getElementById("fb").textContent="Base drop — OH⁻ ions push pH UP.";render();checkWin();};
document.getElementById("reset").onclick=()=>{ph=CH[idx].start;drops=0;render();};
function load(){const c=CH[idx];ph=c.start;drops=0;
  document.getElementById("task").innerHTML=c.text;
  document.getElementById("fb").textContent="Acid pushes pH down · base pushes pH up";
  render();}
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Chemistry mixmaster! 🏆";
    var __st=__perfects>=5?5:__perfects>=4?4:__perfects>=3?3:__perfects>=2?2:1;document.getElementById("ovScore").textContent="⭐".repeat(__st)+"☆".repeat(5-__st)+"   "+(__perfects===5?"PERFECT RUN! ⚡  ":"")+score+" pts · acids, bases, and neutralization";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ov").classList.add("show");return;}
  load();}
window.__qa={solve:()=>{const c=CH[idx];let guard=0;
  while(Math.abs(ph-c.target)>0.01&&guard++<40){
    if(ph>c.target)document.getElementById("addAcid").click();else document.getElementById("addBase").click();}}};
load();
</script><button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script></body></html>
