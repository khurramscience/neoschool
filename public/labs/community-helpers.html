<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Community Helpers 🚒</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fee2e2 0%,#fca5a5 100%);color:#1a1612}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .title{font-size:22px;font-weight:700;color:#b91c1c}
  .stars{display:flex;gap:4px;font-size:24px}.star{filter:grayscale(1);opacity:.35;transition:all .35s}.star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(17px,4.3vw,22px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 12px}
  .stage{background:#fff;border-radius:24px;border:3px solid #fca5a5;padding:20px;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 4px 0 #fca5a5;margin-bottom:14px}
  .scene{font-size:clamp(56px,15vw,90px)}
  .prompt{font-size:clamp(15px,3.8vw,19px);font-weight:600;color:#b91c1c;text-align:center;line-height:1.4}
  .choices{flex:1;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;align-content:start}
  .choice{background:#fff;border:none;border-radius:18px;padding:16px 10px;font-family:'Quicksand',sans-serif;cursor:pointer;box-shadow:0 4px 0 #ef4444;transition:all .15s;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;gap:5px}
  .choice .ic{font-size:clamp(32px,8vw,44px)}.choice .lb{font-size:clamp(13px,3.3vw,16px);font-weight:700;color:#b91c1c}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #ef4444}
  .choice.wrong{background:#fecaca;animation:shake .4s}.choice.right{background:#bbf7d0}.choice.right .lb{color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#b91c1c;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}.celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#991b1b;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="title">🚒 Community Helpers</div>
    <div class="stars" id="stars"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div></div>
  <div class="question" id="question"></div>
  <div class="stage"><div class="scene" id="scene"></div><div class="prompt" id="prompt"></div></div>
  <div class="choices" id="choices"></div>
  <div class="help">Community helpers keep us safe, healthy, and learning!</div>
</div>
<div class="celebration" id="celebration"></div>
<script>
  // Each helper: who they are, what they do, the tool they use
  const HELPERS=[
    {ic:"👩‍🚒",lb:"Firefighter",job:"puts out fires",tool:{ic:"🧯",lb:"Fire hose"}},
    {ic:"👮",lb:"Police officer",job:"keeps us safe",tool:{ic:"🚓",lb:"Police car"}},
    {ic:"👩‍⚕️",lb:"Doctor",job:"helps sick people",tool:{ic:"🩺",lb:"Stethoscope"}},
    {ic:"👨‍🏫",lb:"Teacher",job:"helps us learn",tool:{ic:"📚",lb:"Books"}},
    {ic:"👨‍🌾",lb:"Farmer",job:"grows our food",tool:{ic:"🚜",lb:"Tractor"}},
    {ic:"👩‍🍳",lb:"Chef",job:"cooks our meals",tool:{ic:"🍳",lb:"Frying pan"}},
    {ic:"📬",lb:"Mail carrier",job:"brings the mail",tool:{ic:"✉️",lb:"Letters"}},
    {ic:"🧑‍🔧",lb:"Mechanic",job:"fixes cars",tool:{ic:"🔧",lb:"Wrench"}},
    {ic:"👩‍🚀",lb:"Astronaut",job:"explores space",tool:{ic:"🚀",lb:"Rocket"}},
    {ic:"🧑‍🚒",lb:"Vet",job:"helps sick animals",tool:{ic:"🐶",lb:"Pets"}},
  ];
  const sceneEl=document.getElementById("scene"),promptEl=document.getElementById("prompt"),questionEl=document.getElementById("question"),choicesEl=document.getElementById("choices"),starsEl=document.getElementById("stars"),celebration=document.getElementById("celebration");
  let stars=0,round=0,answer="";
  let actx=null;function tone(f,d=.15,t="sine",v=.18){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.stop(actx.currentTime+d)}catch{}}
  const S={right:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.18,"triangle",.22),i*100))},wrong:()=>tone(220,.25,"sawtooth",.1),win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.22,"triangle",.25),i*120))}};
  function speak(t){try{const u=new SpeechSynthesisUtterance(t);u.rate=.85;u.pitch=1.05;speechSynthesis.cancel();speechSynthesis.speak(u);}catch{}}
  function nextRound(){round++;const h=HELPERS[Math.floor(Math.random()*HELPERS.length)];
    const mode=round%2===0?"tool":"who";
    if(mode==="who"){answer=h.lb;sceneEl.textContent=h.ic;questionEl.textContent="Who is this helper?";promptEl.textContent="They "+h.job+".";setTimeout(()=>speak("Who helps us? They "+h.job),250);
      const opts=new Set([h.lb]);while(opts.size<4)opts.add(HELPERS[Math.floor(Math.random()*HELPERS.length)].lb);
      choicesEl.innerHTML=[...opts].sort(()=>Math.random()-.5).map(lb=>`<button class="choice" onclick="pick('${lb}',this)"><span class="lb">${lb}</span></button>`).join("");
    }else{answer=h.tool.lb;sceneEl.textContent=h.ic;questionEl.textContent="What tool do they use?";promptEl.textContent="A "+h.lb+" who "+h.job+".";setTimeout(()=>speak("What does the "+h.lb+" use?"),250);
      const opts=new Map();opts.set(h.tool.lb,h.tool);while(opts.size<4){const x=HELPERS[Math.floor(Math.random()*HELPERS.length)].tool;opts.set(x.lb,x);}
      choicesEl.innerHTML=[...opts.values()].sort(()=>Math.random()-.5).map(x=>`<button class="choice" onclick="pick('${x.lb}',this)"><span class="ic">${x.ic}</span><span class="lb">${x.lb}</span></button>`).join("");}}
  window.pick=function(v,btn){[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=true);
    if(v===answer){btn.classList.add("right");S.right();stars++;lightStar(stars);post(true);if(stars>=5)setTimeout(win,700);else setTimeout(nextRound,1000);}
    else{btn.classList.add("wrong");S.wrong();post(false);setTimeout(()=>{btn.classList.remove("wrong");[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=false);},500);}};
  function lightStar(n){const s=starsEl.querySelectorAll(".star");if(s[n-1])s[n-1].classList.add("lit");}
  function confettiBurst(){const c=["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];for(let i=0;i<50;i++){const e=document.createElement("div");e.className="confetti";e.style.left=Math.random()*100+"vw";e.style.background=c[Math.floor(Math.random()*c.length)];e.style.animationDelay=(Math.random()*.8)+"s";document.body.appendChild(e);setTimeout(()=>e.remove(),2600);}}
  function win(){S.win();confettiBurst();celebration.textContent="🎉 Community star! 🎉";celebration.classList.add("show");post(true,true);setTimeout(()=>{celebration.classList.remove("show");stars=0;starsEl.querySelectorAll(".star").forEach(s=>s.classList.remove("lit"));nextRound();},2600);}
  function post(correct,complete=false){try{parent.postMessage({type:"labProgress",lab:"community-helpers",round,correct,answer,stars,complete},"*");}catch{}}
  nextRound();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}if(history.length>1){try{history.back()}catch(e){}setTimeout(function(){location.href="/"},400)}else{location.href="/"}};})();</script></body>
</html>
