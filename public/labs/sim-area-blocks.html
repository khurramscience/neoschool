<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Area Blocks 🧱</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#dbeafe,#93c5fd)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:560px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#1d4ed8}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#1d4ed8;box-shadow:0 2px 0 #60a5fa}
.task{background:#fff;border:3px solid #60a5fa;border-radius:16px;box-shadow:0 4px 0 #60a5fa;padding:10px 14px;text-align:center;font-size:clamp(13.5px,4vw,17px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;max-height:100%}
.controls{display:flex;flex-direction:column;gap:7px;margin-top:6px}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #60a5fa}
.srow label{font-weight:700;color:#1d4ed8;min-width:92px;font-size:13px}
.srow input{flex:1;accent-color:#1d4ed8;height:28px}
.srow .val{min-width:52px;text-align:right;font-weight:700;font-size:13px}
.brow{display:flex;gap:7px;justify-content:center;flex-wrap:wrap}
.bbtn{min-width:52px;min-height:44px;border:none;border-radius:12px;background:#fff;box-shadow:0 3px 0 #60a5fa;font-family:'Quicksand',sans-serif;font-size:16px;font-weight:700;color:#1d4ed8;cursor:pointer;touch-action:manipulation;padding:6px 10px}
.bbtn.on{background:#1d4ed8;color:#fff}
.check{min-height:50px;width:100%;background:#1d4ed8;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:13px;font-weight:700;min-height:20px;margin-top:6px;color:#1d4ed8}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#1d4ed8}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#1d4ed8;color:#fff;border:none;border-radius:99px;padding:13px 28px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin:0 4px}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🧱 Area Blocks</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox" style="flex-direction:column;gap:8px"><svg viewBox="0 0 300 190" id="scene"></svg><div class="brow" id="bank"></div></div>
  <button class="check" id="check">Check the build 🧱</button>
  <div class="fb" id="fb">Split big multiplications into easy rectangles — tap the right partial products in order.</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><div><button id="ovNext">Play again ↻</button><button id="ovDone" style="background:#1a1f3a">Finish ✓</button></div></div>
<script>
const GAME={id:"sim-area-blocks"};
let idx=0,score=0,tries=0,__perfects=0;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC;}
function tone(f,t,ty,g){t=t||.12;ty=ty||"sine";g=g||.15;const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+t);o.connect(v).connect(c.destination);o.start();o.stop(c.currentTime+t+.02);}
const CC=["#1d4ed8","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch(e){}}
function win(pts,msg){score+=pts;if(tries===1)__perfects++;tone(660,.12);tone(880,.14);confetti(30);
  document.getElementById("fb").textContent=msg+"  (+"+pts+" pts)";document.getElementById("score").textContent=score+" pts";setTimeout(next,1350);}
function lose(msg){tone(200,.2,"triangle",.1);document.getElementById("fb").textContent=msg;}
const CH=[[13,24],[12,35],[23,14],[16,22],[31,25]].map(([a,b])=>{
 const a1=Math.floor(a/10)*10,a2=a%10,b1=Math.floor(b/10)*10,b2=b%10;
 return {a,b,parts:[a1*b1,a1*b2,a2*b1,a2*b2],text:"Build <b>"+a+" × "+b+"</b> from four easy blocks"};});
let placed=[],bank=[];
function mkBank(){const c=CH[idx];const wrong=[c.parts[0]+10,c.parts[1]*2,c.parts[3]+c.a,c.parts[2]-10].filter(x=>x>0&&!c.parts.includes(x));
 bank=[...c.parts,...wrong.slice(0,3)].sort(()=>Math.random()-0.5);}
function render(){const c=CH[idx];const a1=Math.floor(c.a/10)*10,a2=c.a%10,b1=Math.floor(c.b/10)*10,b2=c.b%10;
 const W=200,H=140,x0=60,y0=25;const w1=W*b1/(b1+b2),h1=H*a1/(a1+a2);
 const cells=[[x0,y0,w1,h1,0],[x0+w1,y0,W-w1,h1,1],[x0,y0+h1,w1,H-h1,2],[x0+w1,y0+h1,W-w1,H-h1,3]];
 let s='<text x="'+(x0+w1/2)+'" y="16" font-size="12" text-anchor="middle" fill="#1d4ed8" font-weight="bold">'+b1+'</text><text x="'+(x0+w1+(W-w1)/2)+'" y="16" font-size="12" text-anchor="middle" fill="#1d4ed8" font-weight="bold">'+b2+'</text>';
 s+='<text x="'+(x0-14)+'" y="'+(y0+h1/2)+'" font-size="12" text-anchor="middle" fill="#1d4ed8" font-weight="bold">'+a1+'</text><text x="'+(x0-14)+'" y="'+(y0+h1+(H-h1)/2)+'" font-size="12" text-anchor="middle" fill="#1d4ed8" font-weight="bold">'+a2+'</text>';
 cells.forEach(([x,y,w,h,i])=>{const filled=placed[i]!==undefined;
  s+='<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(filled?"#bfdbfe":"#fff")+'" stroke="#1d4ed8" stroke-width="2"/>';
  if(filled)s+='<text x="'+(x+w/2)+'" y="'+(y+h/2+5)+'" font-size="15" text-anchor="middle" fill="#1d4ed8" font-weight="bold">'+placed[i]+'</text>';});
 const sum=placed.filter(x=>x!==undefined).reduce((a,b)=>a+b,0);
 s+='<text x="150" y="185" font-size="13" text-anchor="middle" fill="#1d4ed8" font-weight="bold">'+(placed.filter(x=>x!==undefined).length===4?(sum===CH[idx].a*CH[idx].b?"= "+sum+" ✓":"= "+sum+" …hmm"):"sum so far: "+sum)+'</text>';
 document.getElementById("scene").innerHTML=s;
 const bx=document.getElementById("bank");bx.innerHTML="";
 bank.forEach((v,i)=>{if(v===null)return;const b=document.createElement("button");b.className="bbtn";b.textContent=v;
  b.onclick=()=>{const slot=placed.findIndex((p,j)=>p===undefined&&j<4);const empty=[0,1,2,3].find(j=>placed[j]===undefined);
   if(empty===undefined)return;placed[empty]=v;bank[i]=null;tone(500,.06,"sine",.07);render();};bx.appendChild(b);});
 const undo=document.createElement("button");undo.className="bbtn";undo.textContent="↩ undo";
 undo.onclick=()=>{const last=[3,2,1,0].find(j=>placed[j]!==undefined);if(last===undefined)return;
  const v=placed[last];placed[last]=undefined;const slot=bank.findIndex(x=>x===null);if(slot>=0)bank[slot]=v;else bank.push(v);render();};
 bx.appendChild(undo);
 document.getElementById("prog").textContent=(idx+1)+"/5";document.getElementById("score").textContent=score+" pts";}
function check(){const c=CH[idx];tries++;
 if([0,1,2,3].some(j=>placed[j]===undefined)){lose("Fill all four blocks first!");return;}
 const ok=[0,1,2,3].every(j=>placed[j]===c.parts[j]);
 if(ok)win(Math.max(15,45-(tries-1)*10),"🧱 "+c.parts.join(" + ")+" = "+(c.a*c.b)+"!");
 else lose("Some blocks are in the wrong spot — match each block to its row × column.");}
function load(){tries=0;placed=[undefined,undefined,undefined,undefined];mkBank();
 document.getElementById("task").innerHTML=CH[idx].text;
 document.getElementById("fb").textContent="Split big multiplications into easy rectangles.";render();}
window.__qa={solve:()=>{const c=CH[idx];placed=[...c.parts];bank=bank.map(v=>c.parts.includes(v)?null:v);render();check();}};
document.getElementById("check").onclick=check;
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Area architect! 🏆";
    var st=__perfects>=5?5:__perfects>=4?4:__perfects>=3?3:__perfects>=2?2:1;
    document.getElementById("ovScore").textContent="⭐".repeat(st)+"☆".repeat(5-st)+"   "+(__perfects===5?"PERFECT RUN! ⚡  ":"")+score+" pts · the area model of multiplication mastered";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ovDone").onclick=()=>{try{parent.postMessage({type:"labExit"},"*")}catch(e){}if(window===window.top)if(history.length>1){try{history.back()}catch(e){}setTimeout(function(){location.href="/"},400)}else{location.href="/"}};
    document.getElementById("ov").classList.add("show");return;}
  load();}
load();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script>
<script>(function(){function post(kind,text){try{parent.postMessage({type:"labEvent",kind:kind,text:String(text).slice(0,140),ts:Date.now()},"*")}catch(e){}}
function watch(id,kind){var el=document.getElementById(id);if(!el)return;var last=el.textContent;new MutationObserver(function(){var t=el.textContent;if(t&&t!==last){last=t;post(kind,t)}}).observe(el,{childList:true,characterData:true,subtree:true})}
watch("fb","feedback");watch("task","challenge");watch("score","score");
document.addEventListener("click",function(e){var b=e.target.closest("button");if(b&&b.id!=="neoExit")post("action","clicked: "+(b.textContent||b.id).trim().slice(0,60))},true);
post("start","sim loaded: "+document.title);})();</script>
</body></html>
