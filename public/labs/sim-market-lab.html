<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Market Lab 📊</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#e0e7ff,#a5b4fc)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:600px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#3730a3}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#3730a3;box-shadow:0 2px 0 #818cf8}
.task{background:#fff;border:3px solid #818cf8;border-radius:16px;box-shadow:0 4px 0 #818cf8;padding:10px 14px;text-align:center;font-size:clamp(13.5px,3.9vw,16px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;height:auto}
.readout{display:flex;gap:8px;justify-content:center;margin:4px 0}
.readout div{background:#fff;border-radius:10px;padding:6px 12px;font-size:12.5px;font-weight:700;box-shadow:0 2px 0 #818cf8}
.sliders{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #818cf8}
.srow label{font-weight:700;color:#3730a3;min-width:70px;font-size:13px}
.srow input{flex:1;accent-color:#3730a3;height:28px}
.srow .val{min-width:46px;text-align:right;font-weight:700;color:#1a1f3a;font-size:13px}
.check{min-height:50px;width:100%;background:#3730a3;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:13.5px;font-weight:700;min-height:20px;margin-top:6px;color:#3730a3}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#3730a3}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#3730a3;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">📊 Market Lab</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 300 240" id="scene"></svg></div>
  <div class="readout"><div id="dem">Demand: —</div><div id="sup">Supply: —</div></div>
  <div class="sliders">
    <div class="srow"><label>💲 Price</label><input type="range" id="price" min="1" max="19" step="1" value="10"><span class="val" id="pricev">$10</span></div>
  </div>
  <button class="check" id="check">Set market price ✓</button>
  <div class="fb" id="fb">Find the price where buyers want exactly what sellers supply.</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><button id="ovNext">Next →</button></div>
<script>
const GAME={id:"sim-market-lab"};
// demand: Qd = dA - dB*P ; supply: Qs = sA + sB*P ; equilibrium where Qd=Qs
function genChallenges(){
  const ch=[];const R=(a,b)=>a+Math.floor(Math.random()*(b-a+1));
  const bases=[
    {dA:24,dB:1,sA:4,sB:1,item:"🎧 headphones"},
    {dA:30,dB:2,sA:2,sB:2,item:"🍦 ice cream cones"},
    {dA:20,dB:1,sA:8,sB:1,item:"⚽ soccer balls"},
    {dA:28,dB:2,sA:4,sB:2,item:"🎮 game passes"},
    {dA:22,dB:1,sA:2,sB:1,item:"📱 phone cases"},
  ];
  for(const b of bases){const P=(b.dA-b.sA)/(b.dB+b.sB);ch.push({...b,eqP:P,eqQ:b.sA+b.sB*P});}
  return ch;
}
const CH=genChallenges();
let idx=0,score=0,tries=0;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch{}}return AC;}
function tone(f,t=.12,ty="sine",g=.15,w=0){const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime+w);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+w+t);o.connect(v).connect(c.destination);o.start(c.currentTime+w);o.stop(c.currentTime+w+t+.02);}
const CC=["#3730a3","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch{}}
const PX=p=>30+p*13, QY=q=>210-q*7.5;
function render(){
  const c=CH[idx];const P=+document.getElementById("price").value;
  const Qd=Math.max(0,c.dA-c.dB*P),Qs=Math.max(0,c.sA+c.sB*P);
  document.getElementById("pricev").textContent="$"+P;
  document.getElementById("dem").textContent="Demand: "+Qd;
  document.getElementById("sup").textContent="Supply: "+Qs;
  let s='<line x1="30" y1="210" x2="290" y2="210" stroke="#1f2937" stroke-width="2"/><line x1="30" y1="20" x2="30" y2="210" stroke="#1f2937" stroke-width="2"/>';
  s+='<text x="160" y="234" font-size="11" text-anchor="middle" fill="#3730a3" font-weight="bold">Price →</text><text x="14" y="115" font-size="11" fill="#3730a3" font-weight="bold" transform="rotate(-90,14,115)">Quantity →</text>';
  // demand line (downward)
  s+='<line x1="'+PX(1)+'" y1="'+QY(Math.max(0,c.dA-c.dB))+'" x2="'+PX(19)+'" y2="'+QY(Math.max(0,c.dA-c.dB*19))+'" stroke="#dc2626" stroke-width="3"/><text x="'+PX(3)+'" y="'+(QY(c.dA-c.dB*3)-6)+'" font-size="10" fill="#dc2626" font-weight="bold">Demand</text>';
  // supply line (upward)
  s+='<line x1="'+PX(1)+'" y1="'+QY(c.sA+c.sB)+'" x2="'+PX(19)+'" y2="'+QY(c.sA+c.sB*19)+'" stroke="#2563eb" stroke-width="3"/><text x="'+PX(14)+'" y="'+(QY(c.sA+c.sB*14)-6)+'" font-size="10" fill="#2563eb" font-weight="bold">Supply</text>';
  // current price marker
  s+='<line x1="'+PX(P)+'" y1="20" x2="'+PX(P)+'" y2="210" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4 4"/>';
  s+='<circle cx="'+PX(P)+'" cy="'+QY(Qd)+'" r="5" fill="#dc2626"/><circle cx="'+PX(P)+'" cy="'+QY(Qs)+'" r="5" fill="#2563eb"/>';
  document.getElementById("scene").innerHTML=s;
  document.getElementById("prog").textContent=(idx+1)+"/5";
  document.getElementById("score").textContent=score+" pts";
}
document.getElementById("price").oninput=render;
document.getElementById("check").onclick=()=>{
  const c=CH[idx];tries++;const P=+document.getElementById("price").value;
  const Qd=c.dA-c.dB*P,Qs=c.sA+c.sB*P;
  if(Qd===Qs){
    const pts=Math.max(15,45-(tries-1)*10);score+=pts;
    tone(660,.12);tone(880,.14,"sine",.15,.1);confetti(35);
    document.getElementById("fb").textContent="📊 Equilibrium at $"+P+"! Demand = Supply = "+Qs+"  (+"+pts+" pts)";
    document.getElementById("score").textContent=score+" pts";
    setTimeout(next,1400);
  } else {
    tone(200,.2,"triangle",.1);
    document.getElementById("fb").textContent=Qd>Qs?"Shortage! Buyers want "+Qd+" but only "+Qs+" supplied — raise the price.":"Surplus! "+Qs+" supplied but only "+Qd+" wanted — lower the price.";
  }
};
function load(){tries=0;document.getElementById("price").value=10;
  document.getElementById("task").innerHTML="Find the fair market price for <b>"+CH[idx].item+"</b> — where demand meets supply.";
  document.getElementById("fb").textContent="Find the price where buyers want exactly what sellers supply.";
  render();}
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Market maker! 🏆";
    document.getElementById("ovScore").textContent=score+" pts · supply, demand & equilibrium mastered";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ov").classList.add("show");return;}
  load();}
window.__qa={solve:()=>{const c=CH[idx];document.getElementById("price").value=c.eqP;render();document.getElementById("check").click();}};
load();
</script><button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script></body></html>
