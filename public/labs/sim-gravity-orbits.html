<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Gravity & Orbits 🪐</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#1e1b4b,#312e81)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:600px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#c7d2fe}
.chip{background:#ffffff22;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#e0e7ff}
.lvlbadge{text-align:center;font-size:11px;font-weight:800;color:#a5b4fc;letter-spacing:.06em;margin-top:4px}
.task{background:#ffffff14;border:2px solid #6366f1;border-radius:16px;padding:10px 14px;text-align:center;font-size:clamp(13px,3.8vw,16px);font-weight:700;color:#e0e7ff;margin:8px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;max-height:100%}
.tele{display:flex;gap:6px;justify-content:center;margin:4px 0;flex-wrap:wrap}
.tele div{background:#ffffff14;border-radius:9px;padding:5px 10px;font-size:11px;font-weight:700;color:#c7d2fe;font-family:'Quicksand',monospace}
.controls{display:flex;flex-direction:column;gap:7px}
.srow{display:flex;align-items:center;gap:10px;background:#ffffff14;border-radius:14px;padding:8px 12px}
.srow label{font-weight:700;color:#c7d2fe;min-width:96px;font-size:13px}
.srow input{flex:1;accent-color:#818cf8;height:28px}
.srow .val{min-width:56px;text-align:right;font-weight:700;font-size:13px;color:#e0e7ff}
.check{min-height:50px;width:100%;background:#6366f1;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.35);margin-top:8px;touch-action:manipulation}
.check:disabled{opacity:.5}
.fb{text-align:center;font-size:12.5px;font-weight:700;min-height:20px;margin-top:6px;color:#c7d2fe}
.overlay{position:fixed;inset:0;background:rgba(30,27,75,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#c7d2fe}
.overlay .sc{font-size:17px;font-weight:700;color:#e0e7ff}
.overlay button{background:#6366f1;color:#fff;border:none;border-radius:99px;padding:13px 28px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.35);margin:0 4px}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🪐 Gravity & Orbits</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">Mission 1/3</div></div></div>
  <div class="lvlbadge" id="lvlname"></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 300 260" id="scene"></svg></div>
  <div class="tele"><div id="t1">v —</div><div id="t2">r —</div><div id="t3">GM —</div><div id="t4">E —</div></div>
  <div class="controls" id="ctrls"></div>
  <button class="check" id="check">Launch 🚀</button>
  <div class="fb" id="fb"></div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><div><button id="ovNext">Play again ↻</button><button id="ovDone" style="background:#1a1f3a">Finish ✓</button></div></div>
<script>
const GAME={id:"sim-gravity-orbits"};
let idx=0,score=0,tries=0,__perfects=0,animId=null,busy=false;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC;}
function tone(f,t,ty,g){t=t||.12;ty=ty||"sine";g=g||.15;const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+t);o.connect(v).connect(c.destination);o.start();o.stop(c.currentTime+t+.02);}
const CC=["#818cf8","#f59e0b","#ec4899","#22c55e","#38bdf8"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch(e){}}
function win(pts,msg){score+=pts;if(tries===1)__perfects++;tone(660,.12);tone(880,.14);confetti(30);
 document.getElementById("fb").textContent=msg+"  (+"+pts+" pts)";document.getElementById("score").textContent=score+" pts";setTimeout(next,1600);}
function lose(msg){tone(200,.2,"triangle",.1);document.getElementById("fb").textContent=msg;busy=false;S("check").disabled=false;}
const S=id=>document.getElementById(id);
const slider=(id,lbl,min,max,val,unit)=>'<div class="srow"><label>'+lbl+'</label><input type="range" id="'+id+'" min="'+min+'" max="'+max+'" step="1" value="'+val+'"><span class="val" id="'+id+'v">'+val+unit+'</span></div>';
function wire(id,unit){S(id).oninput=()=>{S(id+"v").textContent=S(id).value+unit;LV[idx].preview();};}
const stars=Array.from({length:34},(_,i)=>({x:(i*89)%300,y:(i*47)%260,r:0.5+((i*13)%10)/10}));
function starfield(){return stars.map(f=>'<circle cx="'+f.x+'" cy="'+f.y+'" r="'+f.r+'" fill="#ffffff88"/>').join("");}
function starBody(GM){const R=16+GM/12;return '<circle cx="150" cy="130" r="'+R+'" fill="#fbbf24"/><circle cx="150" cy="130" r="'+(R+9)+'" fill="#fbbf24" opacity="0.22"/>';}
function tele(v,r,GM,E){S("t1").textContent="v "+v;S("t2").textContent="r "+r;S("t3").textContent="GM "+GM;S("t4").textContent=E;}
// shared integrator + flight animation
function fly(GM,r0,spd,judge){busy=true;S("check").disabled=true;
 let px=150+r0,py=130,vx=0,vy=-spd*0.11,steps=0,minR=999,maxR=0;const trail=[];let outcome=null;
 const frame=()=>{ for(let k=0;k<3;k++){ // 3 physics steps per frame
   const dx=150-px,dy=130-py,d=Math.hypot(dx,dy);const g=GM/(d*d);vx+=g*dx/d;vy+=g*dy/d;px+=vx;py+=vy;steps++;
   minR=Math.min(minR,d);maxR=Math.max(maxR,d);trail.push([px,py]);if(trail.length>110)trail.shift();
   const sp=Math.hypot(vx,vy);const E=0.5*sp*sp-GM/d;
   if(steps%9===0)tele((sp*9).toFixed(1),Math.round(d),GM,E<0?"E<0 bound":"E>0 FREE");
   if(d<26){outcome="crash";break;}
   if(d>150){outcome="escape";break;}
   if(steps>620){outcome=((maxR-minR)/((maxR+minR)/2)<0.55)?"stable":"ellip";break;}}
  let s=starfield()+starBody(GM);
  s+='<polyline points="'+trail.map(p=>p[0].toFixed(0)+","+p[1].toFixed(0)).join(" ")+'" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.55"/>';
  s+='<circle cx="'+px.toFixed(1)+'" cy="'+py.toFixed(1)+'" r="8" fill="#38bdf8" stroke="#fff" stroke-width="1.5"/>';
  S("scene").innerHTML=s;
  if(!outcome){animId=requestAnimationFrame(frame);}
  else{busy=false;S("check").disabled=false;
   if(outcome==="crash")tone(120,.3,"sawtooth",.12);
   judge(outcome,{minR,maxR});}};
 animId=requestAnimationFrame(frame);}

const LV=[
 {name:"MISSION 1 · 📡 LAUNCH THE SATELLITE",GM:90,
  text:"Deploy an internet satellite! Choose <b>altitude AND speed</b> for a stable circular orbit — higher orbits need slower speeds (v = √(GM/r)).",
  init(){S("ctrls").innerHTML=slider("alt","🛰️ Altitude",60,105,80," px")+slider("spd","🚀 Speed",6,18,9,"");wire("alt"," px");wire("spd","");S("check").textContent="Launch 🚀";this.preview();},
  preview(){const r=+S("alt").value,spd=+S("spd").value;
   let s=starfield()+starBody(this.GM);
   s+='<circle cx="150" cy="130" r="'+r+'" fill="none" stroke="#ffffff22" stroke-width="1" stroke-dasharray="3 5"/>';
   s+='<circle cx="'+(150+r)+'" cy="130" r="8" fill="#38bdf8" stroke="#fff" stroke-width="1.5"/>';
   s+='<line x1="'+(150+r)+'" y1="130" x2="'+(150+r)+'" y2="'+(130-spd*4)+'" stroke="#22c55e" stroke-width="3"/><polygon points="'+(150+r)+','+(130-spd*4)+' '+(150+r-5)+','+(130-spd*4+7)+' '+(150+r+5)+','+(130-spd*4+7)+'" fill="#22c55e"/>';
   S("scene").innerHTML=s;
   tele((spd*0.11*9).toFixed(1),r,this.GM,"ideal v="+Math.round(Math.sqrt(this.GM/r)/0.11));},
  run(){const r=+S("alt").value,spd=+S("spd").value;const self=this;
   fly(this.GM,r,spd,(o)=>{ if(o==="stable")win(Math.max(20,50-(tries-1)*12),"📡 Satellite deployed — clean circular orbit at r="+r+"!");
    else if(o==="crash")lose("Burned up — too slow for this altitude! Higher speed or higher orbit.");
    else if(o==="escape")lose("Flew off into deep space — too fast! Ease off the throttle.");
    else lose("Orbit is a stretched ellipse — fine-tune the speed toward v = √(GM/r) ≈ "+Math.round(Math.sqrt(self.GM/r)/0.11)+"."); });},
  solve(){for(let r=60;r<=105;r+=15){const v=Math.round(Math.sqrt(this.GM/r)/0.11);
   S("alt").value=r;S("spd").value=v;tries++;this.run();return;}}},

 {name:"MISSION 2 · 🌙 CAPTURE THE MOON",spd:12,r:80,
  text:"A rogue moon streaks past at <b>speed 12</b>, distance 80. You control the STAR — dial its <b>mass</b> so gravity captures the moon into orbit. Heavier star = stronger pull!",
  init(){S("ctrls").innerHTML=slider("M","☀️ Star mass",6,16,8," ☉");wire("M"," ☉");S("check").textContent="Let it fly 🌙";this.preview();},
  preview(){const M=+S("M").value;
   let s=starfield()+starBody(10*M);
   s+='<circle cx="'+(150+this.r)+'" cy="130" r="7" fill="#e5e7eb" stroke="#94a3b8" stroke-width="2"/>';
   s+='<line x1="'+(150+this.r)+'" y1="130" x2="'+(150+this.r)+'" y2="'+(130-this.spd*4)+'" stroke="#22c55e" stroke-width="3"/>';
   S("scene").innerHTML=s;
   tele((this.spd*0.11*9).toFixed(1),this.r,10*M,"pull = GM/r²");},
  run(){const M=+S("M").value;
   fly(10*M,this.r,this.spd,(o)=>{ if(o==="stable")win(Math.max(20,50-(tries-1)*12),"🌙 Captured! Your star's gravity bent its path into an orbit.");
    else if(o==="escape")lose("The moon escaped — a "+M+"-sun star is too light for a speed-12 flyby. More mass!");
    else if(o==="crash")lose("Too heavy — your gravity crushed the flyby into the star! Ease the mass down.");
    else lose("Almost — it's swinging in a wild ellipse. Nudge the mass for a rounder capture."); });},
  solve(){S("M").value=13;S("Mv").textContent="13 ☉";tries++;this.run();}},

 {name:"MISSION 3 · 🌌 ESCAPE VELOCITY",GM:90,r:80,cap:13,
  text:"Voyager time! From r=80, reach <b>escape velocity</b> and leave the system forever — but fuel only allows speed ≤ <b>13</b>. (v_esc = √(2GM/r))",
  init(){S("ctrls").innerHTML=slider("spd","🚀 Speed",8,13,10,"");wire("spd","");S("check").textContent="Burn! 🔥";this.preview();},
  preview(){const spd=+S("spd").value;
   let s=starfield()+starBody(this.GM);
   s+='<circle cx="'+(150+this.r)+'" cy="130" r="8" fill="#38bdf8" stroke="#fff" stroke-width="1.5"/>';
   s+='<line x1="'+(150+this.r)+'" y1="130" x2="'+(150+this.r)+'" y2="'+(130-spd*4)+'" stroke="#f59e0b" stroke-width="3"/>';
   S("scene").innerHTML=s;
   tele((spd*0.11*9).toFixed(1),this.r,this.GM,"v_esc ≈ "+Math.round(Math.sqrt(2*this.GM/this.r)/0.11));},
  run(){const spd=+S("spd").value;
   fly(this.GM,this.r,spd,(o)=>{ if(o==="escape")win(Math.max(20,50-(tries-1)*12),"🌌 ESCAPED at speed "+spd+" — energy went positive, gravity can never bring it back!");
    else if(o==="stable"||o==="ellip")lose("Still bound (E<0) — gravity keeps winning at speed "+spd+". Push closer to v_esc!");
    else lose("Crashed?! That shouldn't happen going outward — try again."); });},
  solve(){S("spd").value=12;S("spdv").textContent="12";tries++;this.run();}},
];
function check(){if(busy)return;tries++;LV[idx].run();}
S("check").onclick=check;
function load(){tries=0;if(animId)cancelAnimationFrame(animId);busy=false;S("check").disabled=false;
 S("lvlname").textContent=LV[idx].name;S("task").innerHTML=LV[idx].text;
 S("fb").textContent="Watch the telemetry — v, distance, and total energy tell the whole story.";
 S("prog").textContent="Mission "+(idx+1)+"/3";LV[idx].init();}
function next(){idx++;
 if(idx>=LV.length){report(true);confetti(60);
  S("ovTitle").textContent="Orbital mechanic! 🏆";
  var st=__perfects>=3?5:__perfects>=2?4:__perfects>=1?3:2;
  S("ovScore").textContent="⭐".repeat(st)+"☆".repeat(5-st)+"   "+(__perfects===3?"PERFECT RUN! ⚡  ":"")+score+" pts · satellites, captures & escape velocity";
  S("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();S("ov").classList.remove("show");};
  S("ovDone").onclick=()=>{try{parent.postMessage({type:"labExit"},"*")}catch(e){}if(window===window.top)if(history.length>1){try{history.back()}catch(e){}setTimeout(function(){location.href="/"},400)}else{location.href="/"}};
  S("ov").classList.add("show");return;}
 load();}
window.__qa={solve:()=>LV[idx].solve()};
load();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script>
<script>(function(){function post(kind,text){try{parent.postMessage({type:"labEvent",kind:kind,text:String(text).slice(0,140),ts:Date.now()},"*")}catch(e){}}
function watch(id,kind){var el=document.getElementById(id);if(!el)return;var last=el.textContent;new MutationObserver(function(){var t=el.textContent;if(t&&t!==last){last=t;post(kind,t)}}).observe(el,{childList:true,characterData:true,subtree:true})}
watch("fb","feedback");watch("task","challenge");watch("score","score");
document.addEventListener("click",function(e){var b=e.target.closest("button");if(b&&b.id!=="neoExit")post("action","clicked: "+(b.textContent||b.id).trim().slice(0,60))},true);
post("start","sim loaded: "+document.title);})();</script>
</body></html>
