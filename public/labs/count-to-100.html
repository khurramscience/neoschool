<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Count to 100 💯</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#cffafe 0%,#67e8f9 100%);color:#1a1612}
  .wrap{display:flex;flex-direction:column;height:100%;padding:14px 12px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
  .title{font-size:20px;font-weight:700;color:#0891b2}
  .stars{display:flex;gap:3px;font-size:21px}.star{filter:grayscale(1);opacity:.35;transition:all .35s}.star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(15px,3.8vw,19px);font-weight:700;text-align:center;color:#1a1f3a;margin:2px 0 8px}
  .chart{background:#fff;border-radius:16px;border:2px solid #67e8f9;padding:8px;box-shadow:0 4px 0 #67e8f9;margin-bottom:10px}
  .grid{display:grid;grid-template-columns:repeat(10,1fr);gap:3px}
  .cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:clamp(9px,2.4vw,13px);font-weight:600;background:#f0fdff;border-radius:4px;color:#155e75}
  .cell.blank{background:#fde047;border:2px dashed #ca8a04;animation:pulse 1.3s ease-in-out infinite}
  @keyframes pulse{50%{transform:scale(1.12)}}
  .choices{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .choice{aspect-ratio:1.4;background:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:clamp(20px,5.5vw,30px);font-weight:700;color:#0891b2;cursor:pointer;box-shadow:0 4px 0 #22d3ee;transition:all .15s;touch-action:manipulation}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #22d3ee}
  .choice.wrong{background:#fecaca;animation:shake .4s}.choice.right{background:#bbf7d0;color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(34px,9vw,52px);font-weight:700;color:#0891b2;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}.celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:12px;color:#155e75;text-align:center;margin-top:6px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="title">💯 Count to 100</div>
    <div class="stars" id="stars"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div></div>
  <div class="question">Which number is missing? 🟡</div>
  <div class="chart"><div class="grid" id="grid"></div></div>
  <div class="choices" id="choices"></div>
  <div class="help">Use the numbers around the yellow box to figure it out!</div>
</div>
<div class="celebration" id="celebration"></div>
<script>
  const gridEl=document.getElementById("grid"),choicesEl=document.getElementById("choices"),starsEl=document.getElementById("stars"),celebration=document.getElementById("celebration");
  let stars=0,round=0,answer=0;
  let actx=null;function tone(f,d=.15,t="sine",v=.18){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.stop(actx.currentTime+d)}catch{}}
  const S={right:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.18,"triangle",.22),i*100))},wrong:()=>tone(220,.25,"sawtooth",.1),win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.22,"triangle",.25),i*120))}};
  function nextRound(){round++;answer=Math.floor(Math.random()*100)+1;
    let html="";for(let n=1;n<=100;n++){html+=n===answer?`<div class="cell blank" id="blankcell">?</div>`:`<div class="cell">${n}</div>`;}
    gridEl.innerHTML=html;
    const opts=new Set([answer]);while(opts.size<4){const v=answer+(Math.floor(Math.random()*7)-3);if(v>=1&&v<=100)opts.add(v);}
    choicesEl.innerHTML=[...opts].sort((a,b)=>a-b).map(n=>`<button class="choice" onclick="pick(${n},this)">${n}</button>`).join("");}
  window.pick=function(n,btn){[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=true);
    if(n===answer){btn.classList.add("right");const bc=document.getElementById("blankcell");if(bc){bc.textContent=answer;bc.classList.remove("blank");}S.right();stars++;lightStar(stars);post(true);if(stars>=5)setTimeout(win,700);else setTimeout(nextRound,900);}
    else{btn.classList.add("wrong");S.wrong();post(false);setTimeout(()=>{btn.classList.remove("wrong");[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=false);},500);}};
  function lightStar(n){const s=starsEl.querySelectorAll(".star");if(s[n-1])s[n-1].classList.add("lit");}
  function confettiBurst(){const c=["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];for(let i=0;i<50;i++){const e=document.createElement("div");e.className="confetti";e.style.left=Math.random()*100+"vw";e.style.background=c[Math.floor(Math.random()*c.length)];e.style.animationDelay=(Math.random()*.8)+"s";document.body.appendChild(e);setTimeout(()=>e.remove(),2600);}}
  function win(){S.win();confettiBurst();celebration.textContent="🎉 Counting champ! 🎉";celebration.classList.add("show");post(true,true);setTimeout(()=>{celebration.classList.remove("show");stars=0;starsEl.querySelectorAll(".star").forEach(s=>s.classList.remove("lit"));nextRound();},2600);}
  function post(correct,complete=false){try{parent.postMessage({type:"labProgress",lab:"count-to-100",round,correct,answer,stars,complete},"*");}catch{}}
  nextRound();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}if(history.length>1){try{history.back()}catch(e){}setTimeout(function(){location.href="/"},400)}else{location.href="/"}};})();</script></body>
</html>
