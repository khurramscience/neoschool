<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Lens Lab 🔎</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#e0e7ff,#a5b4fc)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:600px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#4338ca}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#4338ca;box-shadow:0 2px 0 #818cf8}
.lvlbadge{text-align:center;font-size:11px;font-weight:800;color:#4f46e5;letter-spacing:.06em;margin-top:4px}
.task{background:#fff;border:3px solid #818cf8;border-radius:16px;box-shadow:0 4px 0 #818cf8;padding:10px 14px;text-align:center;font-size:clamp(13px,3.8vw,16px);font-weight:700;color:#1a1f3a;margin:8px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;max-height:100%}
.tele{display:flex;gap:6px;justify-content:center;margin:4px 0;flex-wrap:wrap}
.tele div{background:#fff;border-radius:9px;padding:5px 10px;font-size:11.5px;font-weight:700;color:#4338ca;box-shadow:0 2px 0 #818cf8}
.controls{display:flex;flex-direction:column;gap:7px}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #818cf8}
.srow label{font-weight:700;color:#4338ca;min-width:96px;font-size:13px}
.srow input{flex:1;accent-color:#4338ca;height:28px}
.srow .val{min-width:54px;text-align:right;font-weight:700;font-size:13px}
.check{min-height:50px;width:100%;background:#4338ca;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:12.5px;font-weight:700;min-height:20px;margin-top:6px;color:#4338ca}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#4338ca}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#4338ca;color:#fff;border:none;border-radius:99px;padding:13px 28px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin:0 4px}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🔎 Lens Lab</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">Mission 1/3</div></div></div>
  <div class="lvlbadge" id="lvlname"></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 360 220" id="scene"></svg></div>
  <div class="tele"><div id="t1">object —</div><div id="t2">focal —</div><div id="t3">image —</div></div>
  <div class="controls" id="ctrls"></div>
  <button class="check" id="check">Focus 🔎</button>
  <div class="fb" id="fb"></div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><div><button id="ovNext">Play again ↻</button><button id="ovDone" style="background:#1a1f3a">Finish ✓</button></div></div>
<script>
const GAME={id:"sim-lens-lab"};
let idx=0,score=0,tries=0,__perfects=0;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}return AC;}
function tone(f,t,ty,g){t=t||.12;ty=ty||"sine";g=g||.15;const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+t);o.connect(v).connect(c.destination);o.start();o.stop(c.currentTime+t+.02);}
const CC=["#4338ca","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch(e){}}
function win(pts,msg){score+=pts;if(tries===1)__perfects++;tone(660,.12);tone(880,.14);confetti(30);
 document.getElementById("fb").textContent=msg+"  (+"+pts+" pts)";document.getElementById("score").textContent=score+" pts";setTimeout(next,1600);}
function lose(msg){tone(200,.2,"triangle",.1);document.getElementById("fb").textContent=msg;}
const S=id=>document.getElementById(id);
const slider=(id,lbl,min,max,val,unit)=>'<div class="srow"><label>'+lbl+'</label><input type="range" id="'+id+'" min="'+min+'" max="'+max+'" step="1" value="'+val+'"><span class="val" id="'+id+'v">'+val+unit+'</span></div>';
function wire(id,unit){S(id).oninput=()=>{S(id+"v").textContent=S(id).value+unit;render();};}
const LENS=180, AXIS=115, OBJH=42;
// thin lens: 1/f = 1/do + 1/di → di = f*do/(do-f); magnification m = -di/do

function render(){const o=optics();
 const ox=LENS-o.dObj, oy=AXIS-OBJH; // object tip
 let s='<rect x="0" y="0" width="360" height="220" fill="#eef2ff"/><line x1="10" y1="'+AXIS+'" x2="350" y2="'+AXIS+'" stroke="#94a3b8" stroke-width="1.5"/>';
 // lens (convex)
 s+='<ellipse cx="'+LENS+'" cy="'+AXIS+'" rx="9" ry="70" fill="#a5b4fc" opacity="0.55" stroke="#4338ca" stroke-width="2"/>';
 // focal points
 [LENS-o.f,LENS+o.f].forEach(fx=>{s+='<circle cx="'+fx+'" cy="'+AXIS+'" r="3" fill="#4338ca"/><text x="'+fx+'" y="'+(AXIS+16)+'" font-size="9" text-anchor="middle" fill="#4338ca">F</text>';});
 // object arrow (green, up)
 s+='<line x1="'+ox+'" y1="'+AXIS+'" x2="'+ox+'" y2="'+oy+'" stroke="#16a34a" stroke-width="3"/><polygon points="'+ox+','+oy+' '+(ox-5)+','+(oy+8)+' '+(ox+5)+','+(oy+8)+'" fill="#16a34a"/>';
 // ray 1: parallel to axis → through far focus
 s+='<line x1="'+ox+'" y1="'+oy+'" x2="'+LENS+'" y2="'+oy+'" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>';
 // image tip
 const ix=LENS+o.di, iy=AXIS-OBJH*o.m*-1; // image height = m*OBJH (m negative → inverted)
 const imgY=AXIS - (OBJH*o.m);
 if(o.real&&o.di<200){
   s+='<line x1="'+LENS+'" y1="'+oy+'" x2="'+ix+'" y2="'+imgY+'" stroke="#f59e0b" stroke-width="1.5" opacity="0.9"/>';
   // ray 2: through lens center straight
   s+='<line x1="'+ox+'" y1="'+oy+'" x2="'+ix+'" y2="'+imgY+'" stroke="#ec4899" stroke-width="1.5" opacity="0.8"/>';
   // image arrow (red)
   s+='<line x1="'+ix+'" y1="'+AXIS+'" x2="'+ix+'" y2="'+imgY+'" stroke="#dc2626" stroke-width="3"/><polygon points="'+ix+','+imgY+' '+(ix-5)+','+(imgY+(o.m<0?-8:8))+' '+(ix+5)+','+(imgY+(o.m<0?-8:8))+'" fill="#dc2626"/>';
   s+='<rect x="'+(ix-18)+'" y="'+(imgY<AXIS?imgY-16:AXIS+6)+'" width="1" height="1" fill="none"/>';
 } else {
   s+='<line x1="'+ox+'" y1="'+oy+'" x2="350" y2="'+(oy+(oy-AXIS)*0.4)+'" stroke="#f59e0b" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/><text x="250" y="30" font-size="11" fill="#4338ca" font-weight="bold">rays do not converge - no real image</text>';
 }
 S("scene").innerHTML=s;
 S("t1").textContent="object "+o.dObj;S("t2").textContent="focal "+o.f;
 S("t3").textContent=o.real&&o.di<300?("image "+Math.round(o.di)+" · "+(Math.abs(o.m)>1.1?"bigger":Math.abs(o.m)<0.9?"smaller":"same")+" · "+(o.m<0?"flipped":"upright")):"no real image";
 return o;
}
const LV=[
 {name:"MISSION 1 · 📷 FOCUS THE CAMERA",fixF:55,
  text:"A camera lens! The film is at the red mark. Slide the <b>object distance</b> until a sharp <b>real image</b> lands right on the film (image distance ≈ 90).",
  target:{diMin:80,diMax:100,real:true},
  init(){S("ctrls").innerHTML=slider("obj","🍎 Object dist",70,140,120,"");wire("obj","");this.f=55;render();},
  render(){return render();},
  check(){const o=optics();if(o.real&&o.di>=80&&o.di<=100)win(Math.max(20,50-(tries-1)*12),"📷 Sharp focus! Real inverted image on the film.");
   else lose(o.virtual?"Object too close — inside the focal point you get no real image. Move it back.":"Image lands at "+Math.round(o.di)+" — nudge the object toward the sweet spot (~90).");},
  solve(){for(let d=70;d<=140;d++){const di=(55*d)/(d-55);if(di>=80&&di<=100){S("obj").value=d;render();return;}}}},

 {name:"MISSION 2 · 🔬 MAGNIFY IT",fixObj:70,
  text:"A microscope! The bug is fixed close to the lens. Change the <b>focal length</b> to make its real image at least <b>2× bigger</b> (and still in view).",
  target:{magMin:2},
  init(){S("ctrls").innerHTML=slider("f","🔧 Focal length",30,66,45,"");wire("f","");this.dObj=70;render();},
  check(){const o=optics();if(o.real&&o.di<260&&Math.abs(o.m)>=2)win(Math.max(20,50-(tries-1)*12),"🔬 "+Math.abs(o.m).toFixed(1)+"× magnified — a real, enlarged image!");
   else lose(o.virtual?"Focal length too long — the object fell inside F. Shorten it a bit.":"Only "+Math.abs(o.m).toFixed(1)+"× — a longer focal length (closer to the object distance) magnifies more.");},
  solve(){for(let f=66;f>=30;f--){const di=(f*70)/(70-f);if(di>0&&di<260&&Math.abs(-di/70)>=2){S("f").value=f;render();return;}}}},

 {name:"MISSION 3 · 🔭 SPOT THE TELESCOPE IMAGE",fixObj:130,
  text:"A far-away star (object distance 130). Set the <b>focal length</b> so the image forms exactly at the eyepiece — a small, sharp, inverted real image (image distance 60-75).",
  target:{diMin:60,diMax:75},
  init(){S("ctrls").innerHTML=slider("f","🔧 Focal length",30,60,50,"");wire("f","");this.dObj=130;render();},
  check(){const o=optics();if(o.real&&o.di>=60&&o.di<=75)win(Math.max(20,50-(tries-1)*12),"🔭 Locked on! The star focuses right at the eyepiece.");
   else lose("Image at "+Math.round(o.di)+" — adjust focal length to land it in the 60-75 eyepiece zone.");},
  solve(){for(let f=30;f<=60;f++){const di=(f*130)/(130-f);if(di>=60&&di<=75){S("f").value=f;render();return;}}}},
];
function optics(){ // uses current level fixed values when a slider is absent
 const lv=LV[idx];
 const dObj=S("obj")?+S("obj").value:(lv.fixObj||lv.dObj||90);
 const f=S("f")?+S("f").value:(lv.fixF||lv.f||55);
 const di=(dObj===f)?1e9:(f*dObj)/(dObj-f);const m=-di/dObj;return {dObj,f,di,m,virtual:di<0,real:di>0&&di<1e8};}
function check(){if(!LV[idx])return;tries++;LV[idx].check();}
S("check").onclick=check;
function load(){tries=0;
 S("lvlname").textContent=LV[idx].name;S("task").innerHTML=LV[idx].text;
 S("fb").textContent="Thin-lens rule: 1/f = 1/dₒ + 1/dᵢ. Parallel rays bend through the focal point.";
 S("prog").textContent="Mission "+(idx+1)+"/3";LV[idx].init();}
function next(){idx++;
 if(idx>=LV.length){report(true);confetti(60);
  S("ovTitle").textContent="Optics expert! 🏆";
  var st=__perfects>=3?5:__perfects>=2?4:__perfects>=1?3:2;
  S("ovScore").textContent="⭐".repeat(st)+"☆".repeat(5-st)+"   "+(__perfects===3?"PERFECT RUN! ⚡  ":"")+score+" pts · cameras, microscopes & telescopes";
  S("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();S("ov").classList.remove("show");};
  S("ovDone").onclick=()=>{try{parent.postMessage({type:"labExit"},"*")}catch(e){}if(window===window.top)try{history.back()}catch(e){}};
  S("ov").classList.add("show");return;}
 load();}
window.__qa={solve:()=>{LV[idx].solve();check();}};
load();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script>
<script>(function(){function post(kind,text){try{parent.postMessage({type:"labEvent",kind:kind,text:String(text).slice(0,140),ts:Date.now()},"*")}catch(e){}}
function watch(id,kind){var el=document.getElementById(id);if(!el)return;var last=el.textContent;new MutationObserver(function(){var t=el.textContent;if(t&&t!==last){last=t;post(kind,t)}}).observe(el,{childList:true,characterData:true,subtree:true})}
watch("fb","feedback");watch("task","challenge");watch("score","score");
document.addEventListener("click",function(e){var b=e.target.closest("button");if(b&&b.id!=="neoExit")post("action","clicked: "+(b.textContent||b.id).trim().slice(0,60))},true);
post("start","sim loaded: "+document.title);})();</script>
</body></html>
