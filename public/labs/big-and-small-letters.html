<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Big & Small Letters 🅰️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fef3c7 0%,#fde68a 100%);color:#1a1612;-webkit-font-smoothing:antialiased}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#a16207}
  .stars{display:flex;gap:4px;font-size:24px}
  .star{filter:grayscale(1);opacity:.35;transition:all .35s}
  .star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(18px,4.5vw,24px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 12px}
  .target-card{background:#fff;border-radius:24px;border:3px solid #fde68a;padding:14px;display:flex;flex-direction:column;align-items:center;gap:6px;box-shadow:0 4px 0 #fde68a;margin-bottom:14px}
  .target-label{font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#7a7367;font-weight:700}
  .target-letter{font-family:'Quicksand',sans-serif;font-size:clamp(72px,18vw,110px);font-weight:700;color:#a16207;line-height:1}
  .speaker{background:#a16207;color:#fff;border:none;border-radius:99px;padding:6px 16px;font-family:'Quicksand',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 3px 0 #854d0e}
  .speaker:active{transform:translateY(2px);box-shadow:0 1px 0 #854d0e}
  .choices{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-content:start}
  .choice{aspect-ratio:1;background:#fff;border:none;border-radius:18px;font-family:'Quicksand',sans-serif;font-size:clamp(38px,9vw,52px);font-weight:700;color:#1a1f3a;cursor:pointer;box-shadow:0 4px 0 #ca8a04;transition:all .15s;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #ca8a04}
  .choice.wrong{background:#fecaca;animation:shake 0.4s}
  .choice.right{background:#bbf7d0;color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#a16207;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}
  .celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#7a7367;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">🅰️ Big & Small Letters</div>
    <div class="stars" id="stars">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>
  </div>
  <div class="question" id="question">Find the small letter that matches!</div>
  <div class="target-card">
    <div class="target-label" id="targetLabel">BIG LETTER</div>
    <div class="target-letter" id="targetLetter">A</div>
    <button class="speaker" onclick="speak()">🔊 Say it</button>
  </div>
  <div class="choices" id="choices"></div>
  <div class="help">Big letters and small letters make the same sound!</div>
</div>
<div class="celebration" id="celebration"></div>

<script>
  const targetLabel = document.getElementById("targetLabel");
  const targetLetter = document.getElementById("targetLetter");
  const questionEl = document.getElementById("question");
  const choicesEl = document.getElementById("choices");
  const starsEl = document.getElementById("stars");
  const celebration = document.getElementById("celebration");
  let stars = 0, target = "", direction = "upper", round = 0;

  let audioCtx = null;
  function tone(f,d=0.15,t="sine",v=0.18){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}catch{}}
  const sounds = {
    right: () => { [523, 659, 784].forEach((f,i) => setTimeout(() => tone(f, 0.18, "triangle", 0.22), i*100)); },
    wrong: () => tone(220, 0.25, "sawtooth", 0.1),
    win:   () => { [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.22, "triangle", 0.25), i*120)); },
  };

  window.speak = function() {
    if (!target) return;
    try { const u = new SpeechSynthesisUtterance(target.toUpperCase()); u.rate = 0.7; u.pitch = 1.15; speechSynthesis.cancel(); speechSynthesis.speak(u); } catch {}
  };

  function nextRound() {
    round++;
    // Trickier pairs (b/d, p/q) come in later rounds for more challenge
    const tricky = ["b","d","p","q","g","y"];
    const easy   = ["a","c","e","f","h","i","j","k","l","m","n","o","r","s","t","u","v","w","x","z"];
    const pool = round > 3 ? [...tricky, ...easy] : easy;
    target = pool[Math.floor(Math.random() * pool.length)];

    // Toggle direction: show upper, pick lower / show lower, pick upper
    direction = Math.random() < 0.5 ? "upper" : "lower";
    if (direction === "upper") {
      targetLabel.textContent = "BIG LETTER";
      targetLetter.textContent = target.toUpperCase();
      questionEl.textContent = "Find the small letter that matches!";
    } else {
      targetLabel.textContent = "small letter";
      targetLetter.textContent = target.toLowerCase();
      targetLetter.style.fontSize = "clamp(72px,18vw,110px)"; // keep size consistent
      questionEl.textContent = "Find the BIG letter that matches!";
    }
    setTimeout(speak, 300);

    // 4 choices: correct + 3 visually-similar distractors (especially the tricky ones)
    const correct = direction === "upper" ? target.toLowerCase() : target.toUpperCase();
    const opts = new Set([correct]);
    const allLetters = direction === "upper"
      ? "abcdefghijklmnopqrstuvwxyz".split("")
      : "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
    while (opts.size < 4) opts.add(allLetters[Math.floor(Math.random() * 26)]);
    const shuffled = [...opts].sort(() => Math.random() - 0.5);
    choicesEl.innerHTML = shuffled.map(l => `<button class="choice" onclick="pick('${l}', this)">${l}</button>`).join("");
  }

  window.pick = function(letter, btn) {
    [...document.querySelectorAll(".choice")].forEach(b => b.disabled = true);
    const correct = direction === "upper" ? target.toLowerCase() : target.toUpperCase();
    if (letter === correct) {
      btn.classList.add("right");
      sounds.right();
      stars++; lightStar(stars);
      postProgress(true);
      if (stars >= 5) setTimeout(win, 700);
      else setTimeout(nextRound, 1000);
    } else {
      btn.classList.add("wrong");
      sounds.wrong();
      postProgress(false);
      setTimeout(() => {
        btn.classList.remove("wrong");
        [...document.querySelectorAll(".choice")].forEach(b => b.disabled = false);
      }, 500);
    }
  };

  function lightStar(n) { const s = starsEl.querySelectorAll(".star"); if (s[n-1]) s[n-1].classList.add("lit"); }
  function confettiBurst() {
    const colors = ["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];
    for (let i = 0; i < 50; i++) {
      const c = document.createElement("div"); c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.8) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }
  function win() {
    sounds.win(); confettiBurst();
    celebration.textContent = "🎉 Alphabet ace! 🎉";
    celebration.classList.add("show");
    postProgress(true, true);
    setTimeout(() => {
      celebration.classList.remove("show");
      stars = 0; starsEl.querySelectorAll(".star").forEach(s => s.classList.remove("lit"));
      nextRound();
    }, 2800);
  }
  function postProgress(correct, complete=false) {
    try { parent.postMessage({ type:"labProgress", lab:"big-and-small-letters", round, correct, target, direction, stars, complete }, "*"); } catch {}
  }
  nextRound();
</script>
<button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}try{history.back()}catch(e){}};})();</script></body>
</html>
