<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Number Bonds 🔗</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fee2e2 0%,#fca5a5 100%);color:#1a1612}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .title{font-size:22px;font-weight:700;color:#b91c1c}
  .stars{display:flex;gap:4px;font-size:24px}.star{filter:grayscale(1);opacity:.35;transition:all .35s}.star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(18px,4.5vw,24px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 12px}
  .bond{flex:1;background:#fff;border-radius:24px;border:3px solid #fca5a5;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 #fca5a5;min-height:200px}
  .bondsvg{width:min(80vw,320px);height:auto}
  .node{font-family:'Quicksand',sans-serif;font-weight:700}
  .choices{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
  .choice{aspect-ratio:1.1;background:#fff;border:none;border-radius:18px;font-family:'Quicksand',sans-serif;font-size:clamp(26px,7vw,38px);font-weight:700;color:#b91c1c;cursor:pointer;box-shadow:0 4px 0 #ef4444;transition:all .15s;touch-action:manipulation}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #ef4444}
  .choice.wrong{background:#fecaca;animation:shake .4s}.choice.right{background:#bbf7d0;color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#b91c1c;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}.celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#991b1b;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="title">🔗 Number Bonds</div>
    <div class="stars" id="stars"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div></div>
  <div class="question" id="question">What is the missing part?</div>
  <div class="bond"><svg class="bondsvg" id="bond" viewBox="0 0 300 200"></svg></div>
  <div class="choices" id="choices"></div>
  <div class="help">The two small circles add up to the big circle (the whole).</div>
</div>
<div class="celebration" id="celebration"></div>
<script>
  const bondEl=document.getElementById("bond"),choicesEl=document.getElementById("choices"),starsEl=document.getElementById("stars"),celebration=document.getElementById("celebration"),questionEl=document.getElementById("question");
  let stars=0,round=0,answer=0;
  let actx=null;function tone(f,d=.15,t="sine",v=.18){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.stop(actx.currentTime+d)}catch{}}
  const S={right:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.18,"triangle",.22),i*100))},wrong:()=>tone(220,.25,"sawtooth",.1),win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.22,"triangle",.25),i*120))}};
  function draw(whole,left,right,missing){
    // missing: "left" | "right" | "whole"
    const col="#dc2626";
    const wv=missing==="whole"?"?":whole, lv=missing==="left"?"?":left, rv=missing==="right"?"?":right;
    bondEl.innerHTML=`
      <line x1="150" y1="58" x2="80" y2="140" stroke="${col}" stroke-width="4"/>
      <line x1="150" y1="58" x2="220" y2="140" stroke="${col}" stroke-width="4"/>
      <circle cx="150" cy="42" r="34" fill="#fee2e2" stroke="${col}" stroke-width="4"/>
      <text x="150" y="42" text-anchor="middle" dominant-baseline="central" font-size="30" font-weight="700" fill="${col}" class="node">${wv}</text>
      <circle cx="80" cy="158" r="30" fill="${missing==='left'?'#fef9c3':'#fff'}" stroke="${col}" stroke-width="4"/>
      <text x="80" y="158" text-anchor="middle" dominant-baseline="central" font-size="26" font-weight="700" fill="${col}" class="node">${lv}</text>
      <circle cx="220" cy="158" r="30" fill="${missing==='right'?'#fef9c3':'#fff'}" stroke="${col}" stroke-width="4"/>
      <text x="220" y="158" text-anchor="middle" dominant-baseline="central" font-size="26" font-weight="700" fill="${col}" class="node">${rv}</text>`;
  }
  function nextRound(){round++;
    const whole=round<3?10:(Math.floor(Math.random()*6)+5); // early rounds: make 10
    const left=Math.floor(Math.random()*(whole-1))+1;const right=whole-left;
    const which=["left","right","whole"][Math.floor(Math.random()*3)];
    answer=which==="left"?left:which==="right"?right:whole;
    questionEl.textContent=which==="whole"?"What is the whole?":"What is the missing part?";
    draw(whole,left,right,which);
    const max=which==="whole"?whole+4:whole;
    const opts=new Set([answer]);while(opts.size<4){const v=Math.floor(Math.random()*(max+1));if(v>=0)opts.add(v);}
    choicesEl.innerHTML=[...opts].sort((a,b)=>a-b).map(n=>`<button class="choice" onclick="pick(${n},this)">${n}</button>`).join("");}
  window.pick=function(n,btn){[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=true);
    if(n===answer){btn.classList.add("right");S.right();stars++;lightStar(stars);post(true);if(stars>=5)setTimeout(win,700);else setTimeout(nextRound,900);}
    else{btn.classList.add("wrong");S.wrong();post(false);setTimeout(()=>{btn.classList.remove("wrong");[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=false);},500);}};
  function lightStar(n){const s=starsEl.querySelectorAll(".star");if(s[n-1])s[n-1].classList.add("lit");}
  function confettiBurst(){const c=["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];for(let i=0;i<50;i++){const e=document.createElement("div");e.className="confetti";e.style.left=Math.random()*100+"vw";e.style.background=c[Math.floor(Math.random()*c.length)];e.style.animationDelay=(Math.random()*.8)+"s";document.body.appendChild(e);setTimeout(()=>e.remove(),2600);}}
  function win(){S.win();confettiBurst();celebration.textContent="🎉 Bond builder! 🎉";celebration.classList.add("show");post(true,true);setTimeout(()=>{celebration.classList.remove("show");stars=0;starsEl.querySelectorAll(".star").forEach(s=>s.classList.remove("lit"));nextRound();},2600);}
  function post(correct,complete=false){try{parent.postMessage({type:"labProgress",lab:"number-bonds",round,correct,answer,stars,complete},"*");}catch{}}
  nextRound();
</script>
</body>
</html>
