<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Subtraction Garden 🥕</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fef3c7 0%,#fbbf24 100%);color:#1a1612;-webkit-font-smoothing:antialiased}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#a16207}
  .stars{display:flex;gap:4px;font-size:24px}
  .star{filter:grayscale(1);opacity:.35;transition:all .35s}
  .star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .equation{font-size:clamp(32px,8vw,52px);font-weight:700;text-align:center;color:#a16207;margin:8px 0;display:flex;align-items:center;justify-content:center;gap:14px;flex-wrap:wrap}
  .equation .qmark{color:#c25420;background:#fef3c7;padding:0 18px;border-radius:18px;border:3px dashed #f59e0b;animation:pulseBg 1.4s ease-in-out infinite}
  @keyframes pulseBg{50%{background:#fde68a}}
  .garden{flex:1;background:linear-gradient(180deg,#86efac 0%,#65a30d 100%);border-radius:22px;border:3px solid #a3a3a3;padding:20px 16px;box-shadow:0 4px 0 #65a30d;min-height:160px;position:relative;overflow:hidden}
  .garden-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(40px,1fr));gap:8px;align-items:end;height:100%}
  .carrot{font-size:clamp(36px,9vw,52px);transition:all .5s;transform-origin:bottom center;animation:wiggle 2s ease-in-out infinite;text-align:center}
  .carrot.taken{transform:translateY(-100px) rotate(40deg);opacity:0;animation:none}
  @keyframes wiggle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
  .choices{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
  .choice{aspect-ratio:1.1;background:#fff;border:none;border-radius:18px;font-family:'Quicksand',sans-serif;font-size:clamp(28px,7vw,42px);font-weight:700;color:#a16207;cursor:pointer;box-shadow:0 4px 0 #f59e0b;transition:all .15s;touch-action:manipulation}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #f59e0b}
  .choice.wrong{background:#fecaca;animation:shake 0.4s}
  .choice.right{background:#bbf7d0;color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#a16207;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}
  .celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#78350f;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">🥕 Subtraction Garden</div>
    <div class="stars" id="stars">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>
  </div>
  <div class="equation" id="equation"></div>
  <div class="garden">
    <div class="garden-row" id="garden"></div>
  </div>
  <div class="choices" id="choices"></div>
  <div class="help">Watch the bunny pick carrots. How many are left in the garden?</div>
</div>
<div class="celebration" id="celebration"></div>

<script>
  const eq = document.getElementById("equation");
  const gardenEl = document.getElementById("garden");
  const choicesEl = document.getElementById("choices");
  const starsEl = document.getElementById("stars");
  const celebration = document.getElementById("celebration");
  let stars = 0, start = 0, takeAway = 0, target = 0, round = 0;

  let audioCtx = null;
  function tone(f, d=0.15, t="sine", v=0.18) { try { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); const o = audioCtx.createOscillator(), g = audioCtx.createGain(); o.type = t; o.frequency.value = f; g.gain.value = v; o.connect(g); g.connect(audioCtx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + d); o.stop(audioCtx.currentTime + d); } catch {} }
  const sounds = {
    pick:  () => tone(440 + Math.random()*200, 0.1, "sine"),
    right: () => { [523, 659, 784].forEach((f,i) => setTimeout(() => tone(f, 0.18, "triangle", 0.22), i*100)); },
    wrong: () => tone(220, 0.25, "sawtooth", 0.1),
    win:   () => { [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.22, "triangle", 0.25), i*120)); },
  };

  function nextRound() {
    round++;
    start = Math.floor(Math.random() * 7) + 4; // 4-10
    takeAway = Math.floor(Math.random() * (start - 1)) + 1; // 1..start-1
    target = start - takeAway;

    eq.innerHTML = `<span>${start}</span> <span style="color:#1a1f3a">➖</span> <span>${takeAway}</span> <span style="color:#1a1f3a">=</span> <span class="qmark">?</span>`;

    gardenEl.innerHTML = "";
    for (let i = 0; i < start; i++) {
      const c = document.createElement("div");
      c.className = "carrot";
      c.style.animationDelay = (Math.random() * 1.5) + "s";
      c.textContent = "🥕";
      gardenEl.appendChild(c);
    }

    // Watch the bunny pick (animated)
    setTimeout(() => animatePick(), 600);

    // 4 choices
    const opts = new Set([target]);
    while (opts.size < 4) opts.add(Math.max(0, Math.min(10, target + (Math.random()<0.5?-1:1) * (Math.floor(Math.random()*3)+1))));
    const shuffled = [...opts].sort(() => Math.random() - 0.5);
    choicesEl.innerHTML = shuffled.map(n => `<button class="choice" onclick="pick(${n}, this)">${n}</button>`).join("");
  }

  function animatePick() {
    const carrots = [...gardenEl.querySelectorAll(".carrot:not(.taken)")];
    // Pick takeAway carrots randomly, one at a time
    const order = carrots.sort(() => Math.random() - 0.5).slice(0, takeAway);
    order.forEach((c, i) => {
      setTimeout(() => { c.classList.add("taken"); sounds.pick(); }, i * 400);
    });
  }

  window.pick = function(n, btn) {
    [...document.querySelectorAll(".choice")].forEach(b => b.disabled = true);
    if (n === target) {
      btn.classList.add("right");
      sounds.right();
      stars++; lightStar(stars);
      postProgress(true);
      if (stars >= 5) setTimeout(win, 600);
      else setTimeout(nextRound, 900);
    } else {
      btn.classList.add("wrong");
      sounds.wrong();
      postProgress(false);
      setTimeout(() => {
        btn.classList.remove("wrong");
        [...document.querySelectorAll(".choice")].forEach(b => b.disabled = false);
      }, 500);
    }
  };

  function lightStar(n) { const s = starsEl.querySelectorAll(".star"); if (s[n-1]) s[n-1].classList.add("lit"); }
  function confettiBurst() {
    const colors = ["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];
    for (let i = 0; i < 50; i++) {
      const c = document.createElement("div"); c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.8) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }
  function win() {
    sounds.win(); confettiBurst();
    celebration.textContent = "🎉 Garden master! 🎉";
    celebration.classList.add("show");
    postProgress(true, true);
    setTimeout(() => {
      celebration.classList.remove("show");
      stars = 0; starsEl.querySelectorAll(".star").forEach(s => s.classList.remove("lit"));
      nextRound();
    }, 2600);
  }
  function postProgress(correct, complete=false) {
    try { parent.postMessage({ type:"labProgress", lab:"subtraction-garden", round, correct, equation:`${start}-${takeAway}=${target}`, stars, complete }, "*"); } catch {}
  }
  nextRound();
</script>
</body>
</html>
