<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Projectile Park 🎯</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#e0f2fe,#7dd3fc)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:600px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#0369a1}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#0369a1;box-shadow:0 2px 0 #38bdf8}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%;height:auto}
.sliders{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #38bdf8}
.srow label{font-weight:700;color:#0369a1;min-width:78px;font-size:14px}
.srow input{flex:1;accent-color:#0369a1;height:28px}
.srow .val{min-width:44px;text-align:right;font-weight:700;color:#1a1f3a}
.check{min-height:52px;width:100%;background:#0369a1;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:14px;font-weight:700;min-height:20px;margin-top:6px;color:#0369a1}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#0369a1}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#0369a1;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🎯 Projectile Park</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="svgbox"><svg viewBox="0 0 560 250" id="scene"></svg></div>
  <div class="sliders">
    <div class="srow"><label>angle 📐</label><input type="range" id="ang" min="15" max="75" step="5" value="45"><span class="val" id="angv">45°</span></div>
    <div class="srow"><label>power ⚡</label><input type="range" id="pow" min="4" max="12" step="1" value="8"><span class="val" id="powv">8</span></div>
  </div>
  <button class="check" id="launch">Launch! 🚀</button>
  <div class="fb" id="fb">Higher angle = higher arc · more power = farther flight</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><button id="ovNext">Play again ↻</button><button id="ovDone" style="background:#1a1f3a;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)">Finish ✓</button></div>
<script>
const GAME={id:"sim-projectile-park"};
const G=10, SC=3.0; // px per meter
function rangeOf(ang,v){const r=ang*Math.PI/180;return v*v*Math.sin(2*r)/G;}
function genChallenges(){
  const ch=[];const R=n=>Math.floor(Math.random()*n);
  const angles=[30,45,60],powers=[6,8,10,12];
  while(ch.length<5){
    const a=angles[R(3)],p=powers[R(4)];
    const d=rangeOf(a,p);
    if(!ch.some(c=>Math.abs(c.d-d)<1))ch.push({a,p,d});
  }
  return ch;
}
const CH=genChallenges();
let idx=0,score=0,tries=0,__perfects=0,anim=null;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch{}}return AC;}
function tone(f,t=.12,ty="sine",g=.15,w=0){const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime+w);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+w+t);o.connect(v).connect(c.destination);o.start(c.currentTime+w);o.stop(c.currentTime+w+t+.02);}
const CC=["#0369a1","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch{}}
const X0=40, GY=210;
function arcPts(ang,v){
  const r=ang*Math.PI/180,vx=v*Math.cos(r),vy=v*Math.sin(r),T=2*vy/G;
  const pts=[];for(let i=0;i<=24;i++){const t=T*i/24;pts.push([X0+vx*t*SC,GY-(vy*t-0.5*G*t*t)*SC]);}
  return pts;
}
function render(trace){
  const c=CH[idx];
  const ang=+document.getElementById("ang").value,pow=+document.getElementById("pow").value;
  document.getElementById("angv").textContent=ang+"°";document.getElementById("powv").textContent=pow;
  const tx=X0+c.d*SC;
  let s='<rect x="0" y="'+GY+'" width="560" height="40" fill="#86efac"/>';
  s+='<circle cx="500" cy="40" r="22" fill="#fde047"/>';
  // target
  s+='<rect x="'+(tx-14)+'" y="'+(GY-8)+'" width="28" height="8" rx="3" fill="#ef4444"/><circle cx="'+tx+'" cy="'+(GY-14)+'" r="10" fill="#fff" stroke="#ef4444" stroke-width="4"/><circle cx="'+tx+'" cy="'+(GY-14)+'" r="3.5" fill="#ef4444"/>';
  s+='<text x="'+tx+'" y="'+(GY+28)+'" font-size="13" text-anchor="middle" fill="#0369a1" font-weight="bold">'+c.d.toFixed(1)+' m</text>';
  // cannon
  const r=ang*Math.PI/180;
  s+='<line x1="'+X0+'" y1="'+GY+'" x2="'+(X0+34*Math.cos(r))+'" y2="'+(GY-34*Math.sin(r))+'" stroke="#334155" stroke-width="10" stroke-linecap="round"/><circle cx="'+X0+'" cy="'+GY+'" r="12" fill="#475569"/>';
  if(trace){s+='<polyline points="'+trace.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ")+'" fill="none" stroke="#0369a1" stroke-width="3" stroke-dasharray="2 6" stroke-linecap="round"/>';
    const last=trace[trace.length-1];s+='<circle cx="'+last[0].toFixed(1)+'" cy="'+Math.min(last[1],GY-5).toFixed(1)+'" r="8" fill="#0369a1"/>';}
  document.getElementById("scene").innerHTML=s;
  document.getElementById("prog").textContent=(idx+1)+"/5";
  document.getElementById("score").textContent=score+" pts";
}
document.getElementById("ang").oninput=()=>render();
document.getElementById("pow").oninput=()=>render();
document.getElementById("launch").onclick=()=>{
  const c=CH[idx];tries++;
  const ang=+document.getElementById("ang").value,pow=+document.getElementById("pow").value;
  const pts=arcPts(ang,pow),land=rangeOf(ang,pow);
  // animate the trace growing
  let i=2;if(anim)clearInterval(anim);
  tone(340,.15,"square",.08);
  anim=setInterval(()=>{render(pts.slice(0,i));i+=2;
    if(i>pts.length+1){clearInterval(anim);settle();}},40);
  function settle(){
    const hit=Math.abs(land-c.d)<=0.8;
    if(hit){const pts2=Math.max(15,45-(tries-1)*10);score+=pts2;if(tries===1)__perfects++;
      tone(660,.12);tone(880,.14,"sine",.15,.1);confetti(35);
      document.getElementById("fb").textContent="🎯 Direct hit at "+land.toFixed(1)+" m!  (+"+pts2+" pts)";
      document.getElementById("score").textContent=score+" pts";
      setTimeout(next,1300);
    } else {
      tone(200,.2,"triangle",.1);
      document.getElementById("fb").textContent="Landed at "+land.toFixed(1)+" m — "+(land<c.d?"too short. More power or closer to 45°!":"too far! Less power or a steeper angle.");
    }
  }
};
function load(){tries=0;if(anim)clearInterval(anim);
  document.getElementById("ang").value=45;document.getElementById("pow").value=8;
  document.getElementById("fb").textContent="Hit the target! Higher angle = higher arc · more power = farther.";
  render();}
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Trajectory genius! 🏆";
    var __st=__perfects>=5?5:__perfects>=4?4:__perfects>=3?3:__perfects>=2?2:1;document.getElementById("ovScore").textContent="⭐".repeat(__st)+"☆".repeat(5-__st)+"   "+(__perfects===5?"PERFECT RUN! ⚡  ":"")+score+" pts · v²·sin(2θ)/g is your friend now";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ov").classList.add("show");return;}
  load();}
window.__qa={solve:()=>{const c=CH[idx];document.getElementById("ang").value=c.a;document.getElementById("pow").value=c.p;render();document.getElementById("launch").click();}};
load();
</script><button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}if(history.length>1){try{history.back()}catch(e){}setTimeout(function(){location.href="/"},400)}else{location.href="/"}};})();</script><script>(function(){function post(kind,text){try{parent.postMessage({type:"labEvent",kind:kind,text:String(text).slice(0,140),ts:Date.now()},"*")}catch(e){}}
function watch(id,kind){var el=document.getElementById(id);if(!el)return;var last=el.textContent;new MutationObserver(function(){var t=el.textContent;if(t&&t!==last){last=t;post(kind,t)}}).observe(el,{childList:true,characterData:true,subtree:true})}
if(document.getElementById("fb"))watch("fb","feedback");if(document.getElementById("task"))watch("task","challenge");if(document.getElementById("score"))watch("score","score");
document.addEventListener("click",function(e){var b=e.target.closest("button");if(b&&b.id!=="neoExit")post("action","clicked: "+(b.textContent||b.id).trim().slice(0,60))},true);
var inputs=document.querySelectorAll("input[type=range]");inputs.forEach(function(r){r.addEventListener("change",function(){post("adjust",(r.id||"slider")+" → "+r.value)})});
post("start","sim loaded: "+document.title);})();</script><script>(function(){var d=document.getElementById("ovDone");if(d)d.onclick=function(){try{parent.postMessage({type:"labExit"},"*")}catch(e){}if(window===window.top)try{history.back()}catch(e){}};})();</script></body></html>
