<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Wave Lab 🌊</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#cffafe,#5eead4)}
.wrap{display:flex;flex-direction:column;height:100%;padding:14px;max-width:600px;margin:0 auto}
.topbar{display:flex;justify-content:space-between;align-items:center}
.title{font-size:18px;font-weight:700;color:#0f766e}
.chip{background:#fff;border-radius:99px;padding:5px 13px;font-size:13px;font-weight:700;color:#0f766e;box-shadow:0 2px 0 #2dd4bf}
.task{background:#fff;border:3px solid #2dd4bf;border-radius:16px;box-shadow:0 4px 0 #2dd4bf;padding:10px 14px;text-align:center;font-size:clamp(14px,4vw,17px);font-weight:700;color:#1a1f3a;margin:10px 0}
.svgbox{flex:1;display:flex;align-items:center;justify-content:center;min-height:0}
svg{max-width:100%}
.srow{display:flex;align-items:center;gap:10px;background:#fff;border-radius:14px;padding:8px 12px;box-shadow:0 3px 0 #2dd4bf;margin-top:6px}
.srow label{font-weight:700;color:#0f766e;min-width:96px;font-size:13px}
.srow input{flex:1;accent-color:#0f766e;height:28px}
.srow .val{min-width:40px;text-align:right;font-weight:700;font-size:13px}
.check{min-height:50px;width:100%;background:#0f766e;color:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:17px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2);margin-top:8px;touch-action:manipulation}
.fb{text-align:center;font-size:13.5px;font-weight:700;min-height:20px;margin-top:6px;color:#0f766e}
.overlay{position:fixed;inset:0;background:rgba(255,255,255,.94);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;opacity:0;pointer-events:none;transition:opacity .3s;z-index:50;text-align:center;padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.overlay h2{font-size:clamp(26px,7vw,36px);color:#0f766e}
.overlay .sc{font-size:17px;font-weight:700;color:#374151}
.overlay button{background:#0f766e;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)}
.confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards;z-index:70}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
</style></head><body>
<div class="wrap">
  <div class="topbar"><div class="title">🌊 Wave Lab</div><div style="display:flex;gap:6px"><div class="chip" id="score">0 pts</div><div class="chip" id="prog">1/5</div></div></div>
  <div class="task" id="task"></div>
  <div class="svgbox"><svg viewBox="0 0 360 200" id="scene"></svg></div>
  <div class="srow"><label>📈 Amplitude</label><input type="range" id="amp" min="1" max="6" step="1" value="3"><span class="val" id="ampv">3</span></div>
  <div class="srow"><label>🔁 Frequency</label><input type="range" id="freq" min="1" max="6" step="1" value="2"><span class="val" id="freqv">2</span></div>
  <button class="check" id="check">Match the wave ✓</button>
  <div class="fb" id="fb">Amplitude = wave height · frequency = how many waves fit.</div>
</div>
<div class="overlay" id="ov"><h2 id="ovTitle"></h2><div class="sc" id="ovScore"></div><button id="ovNext">Play again ↻</button><button id="ovDone" style="background:#1a1f3a;color:#fff;border:none;border-radius:99px;padding:13px 32px;font-family:'Quicksand',sans-serif;font-size:18px;font-weight:700;cursor:pointer;box-shadow:0 4px 0 rgba(0,0,0,.2)">Finish ✓</button></div>
<script>
const GAME={id:"sim-wave-lab"};
function gen(){const ch=[];const R=n=>1+Math.floor(Math.random()*n);
 ch.push({a:4,f:2,text:"🌊 Ocean swells before a storm: match the <b>tall, slow</b> wave surfers wait for"});
 ch.push({a:2,f:5,text:"📱 A phone buzzing in a pocket: match the <b>short, fast</b> vibration wave"});
 ch.push({a:5,f:3,text:"🎸 A guitar string in slow motion — match its shape exactly"});
 while(ch.length<5){const a=R(6),f=R(6);if(!ch.some(c=>c.a===a&&c.f===f))ch.push({a,f,text:"🎸 A guitar string in slow motion — match its shape exactly"});}
 return ch;}
const CH=gen();
let idx=0,score=0,tries=0,__perfects=0,t0=Date.now(),anim=null;
let AC=null;function ac(){if(!AC){try{AC=new (window.AudioContext||window.webkitAudioContext)()}catch{}}return AC;}
function tone(f,t=.12,ty="sine",g=.15,w=0){const c=ac();if(!c)return;const o=c.createOscillator(),v=c.createGain();o.type=ty;o.frequency.value=f;v.gain.setValueAtTime(g,c.currentTime+w);v.gain.exponentialRampToValueAtTime(.001,c.currentTime+w+t);o.connect(v).connect(c.destination);o.start(c.currentTime+w);o.stop(c.currentTime+w+t+.02);}
const CC=["#0f766e","#f59e0b","#ec4899","#22c55e","#3b82f6"];
function confetti(n){for(let i=0;i<n;i++){const d=document.createElement("div");d.className="confetti";d.style.left=Math.random()*100+"vw";d.style.background=CC[i%5];d.style.animationDelay=Math.random()*.4+"s";document.body.appendChild(d);setTimeout(()=>d.remove(),2300);}}
function report(complete){try{parent.postMessage({type:"labProgress",lab:GAME.id,score,complete},"*");}catch{}}
function wavePath(a,f,phase,yc){let d="M0,"+yc;for(let x=0;x<=360;x+=4){const y=yc-Math.sin((x/360)*f*2*Math.PI+phase)*a*11;d+=" L"+x+","+y.toFixed(1);}return d;}
function draw(){
  const a=+document.getElementById("amp").value,f=+document.getElementById("freq").value;
  const c=CH[idx];const ph=(Date.now()-t0)/300;
  let s='<line x1="0" y1="60" x2="360" y2="60" stroke="#99f6e4" stroke-width="1"/><line x1="0" y1="140" x2="360" y2="140" stroke="#99f6e4" stroke-width="1"/>';
  s+='<path d="'+wavePath(c.a,c.f,ph,60)+'" fill="none" stroke="#f59e0b" stroke-width="3" stroke-dasharray="6 5" opacity="0.85"/><text x="6" y="18" font-size="11" fill="#b45309" font-weight="bold">🎯 target</text>';
  s+='<path d="'+wavePath(a,f,ph,140)+'" fill="none" stroke="#0f766e" stroke-width="3.5"/><text x="6" y="182" font-size="11" fill="#0f766e" font-weight="bold">your wave</text>';
  document.getElementById("scene").innerHTML=s;
}
function loop(){draw();anim=setTimeout(loop,50);}
document.getElementById("amp").oninput=()=>document.getElementById("ampv").textContent=document.getElementById("amp").value;
document.getElementById("freq").oninput=()=>document.getElementById("freqv").textContent=document.getElementById("freq").value;
document.getElementById("check").onclick=()=>{
  const c=CH[idx];tries++;
  const a=+document.getElementById("amp").value,f=+document.getElementById("freq").value;
  if(a===c.a&&f===c.f){const pts=Math.max(15,40-(tries-1)*10);score+=pts;if(tries===1)__perfects++;
    tone(660,.12);tone(880,.14,"sine",.15,.1);confetti(30);
    document.getElementById("fb").textContent="🌊 Waves match!  (+"+pts+" pts)";
    document.getElementById("score").textContent=score+" pts";setTimeout(next,1300);
  } else { tone(200,.2,"triangle",.1);
    document.getElementById("fb").textContent=(a!==c.a?"Amplitude "+(a<c.a?"too low":"too high")+". ":"")+(f!==c.f?"Frequency "+(f<c.f?"too low":"too high")+".":""); }
};
function load(){tries=0;document.getElementById("amp").value=3;document.getElementById("freq").value=2;
  document.getElementById("ampv").textContent="3";document.getElementById("freqv").textContent="2";
  document.getElementById("task").innerHTML=CH[idx].text;
  document.getElementById("fb").textContent="Amplitude = wave height · frequency = how many waves fit.";
  document.getElementById("prog").textContent=(idx+1)+"/5";}
function next(){idx++;
  if(idx>=CH.length){report(true);confetti(60);
    document.getElementById("ovTitle").textContent="Wave wizard! 🏆";
    var __st=__perfects>=5?5:__perfects>=4?4:__perfects>=3?3:__perfects>=2?2:1;document.getElementById("ovScore").textContent="⭐".repeat(__st)+"☆".repeat(5-__st)+"   "+(__perfects===5?"PERFECT RUN! ⚡  ":"")+score+" pts · amplitude & frequency mastered";
    document.getElementById("ovNext").onclick=()=>{idx=0;score=0;__perfects=0;load();document.getElementById("ov").classList.remove("show");};
    document.getElementById("ov").classList.add("show");return;}
  load();}
window.__qa={solve:()=>{const c=CH[idx];document.getElementById("amp").value=c.a;document.getElementById("freq").value=c.f;
  document.getElementById("ampv").textContent=c.a;document.getElementById("freqv").textContent=c.f;document.getElementById("check").click();}};
load();loop();
</script><button id="neoExit" aria-label="Back" style="position:fixed;top:10px;right:10px;z-index:90;width:38px;height:38px;border:none;border-radius:50%;background:rgba(255,255,255,.92);box-shadow:0 2px 8px rgba(0,0,0,.18);font-size:17px;font-weight:700;cursor:pointer;font-family:inherit;color:#334155">✕</button><script>(function(){var b=document.getElementById("neoExit");b.onclick=function(){try{if(window.parent!==window){parent.postMessage({type:"labExit"},"*");return}}catch(e){}if(history.length>1){try{history.back()}catch(e){}setTimeout(function(){location.href="/"},400)}else{location.href="/"}};})();</script><script>(function(){function post(kind,text){try{parent.postMessage({type:"labEvent",kind:kind,text:String(text).slice(0,140),ts:Date.now()},"*")}catch(e){}}
function watch(id,kind){var el=document.getElementById(id);if(!el)return;var last=el.textContent;new MutationObserver(function(){var t=el.textContent;if(t&&t!==last){last=t;post(kind,t)}}).observe(el,{childList:true,characterData:true,subtree:true})}
if(document.getElementById("fb"))watch("fb","feedback");if(document.getElementById("task"))watch("task","challenge");if(document.getElementById("score"))watch("score","score");
document.addEventListener("click",function(e){var b=e.target.closest("button");if(b&&b.id!=="neoExit")post("action","clicked: "+(b.textContent||b.id).trim().slice(0,60))},true);
var inputs=document.querySelectorAll("input[type=range]");inputs.forEach(function(r){r.addEventListener("change",function(){post("adjust",(r.id||"slider")+" → "+r.value)})});
post("start","sim loaded: "+document.title);})();</script><script>(function(){var d=document.getElementById("ovDone");if(d)d.onclick=function(){try{parent.postMessage({type:"labExit"},"*")}catch(e){}if(window===window.top)try{history.back()}catch(e){}};})();</script></body></html>
