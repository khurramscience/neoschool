<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Measure It 📏</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fef9c3 0%,#fde047 100%);color:#1a1612}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#a16207}
  .stars{display:flex;gap:4px;font-size:24px}.star{filter:grayscale(1);opacity:.35;transition:all .35s}.star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(19px,4.8vw,25px);font-weight:700;text-align:center;color:#1a1f3a;margin:6px 0 14px}
  .stage{flex:1;background:#fff;border-radius:24px;border:3px solid #fde047;padding:22px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;box-shadow:0 4px 0 #fde047;min-height:160px}
  .object{font-size:clamp(40px,11vw,64px)}
  .ruler{display:flex;gap:3px;align-items:center}
  .cube{width:clamp(22px,6vw,34px);height:clamp(22px,6vw,34px);background:linear-gradient(135deg,#fb923c,#ea580c);border-radius:5px;box-shadow:0 2px 0 rgba(0,0,0,.15);animation:popIn .3s ease-out backwards}
  @keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
  .choices{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
  .choice{aspect-ratio:1;background:#fff;border:none;border-radius:18px;font-family:'Quicksand',sans-serif;font-size:clamp(28px,7vw,40px);font-weight:700;color:#a16207;cursor:pointer;box-shadow:0 4px 0 #ca8a04;transition:all .15s;touch-action:manipulation;display:flex;align-items:center;justify-content:center}
  .choice:active{transform:translateY(2px);box-shadow:0 2px 0 #ca8a04}
  .choice.wrong{background:#fecaca;animation:shake .4s}.choice.right{background:#bbf7d0;color:#15803d}
  @keyframes shake{25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#a16207;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}.celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:13px;color:#854d0e;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar"><div class="title">📏 Measure It</div>
    <div class="stars" id="stars"><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span></div></div>
  <div class="question">How many cubes long?</div>
  <div class="stage"><div class="object" id="object"></div><div class="ruler" id="ruler"></div></div>
  <div class="choices" id="choices"></div>
  <div class="help">Count the orange cubes lined up under the object.</div>
</div>
<div class="celebration" id="celebration"></div>
<script>
  const OBJS=["🖊️","🥕","🍌","🔑","🥄","🪥","🖍️","🌽","🦴","🧂"];
  const objEl=document.getElementById("object"),rulerEl=document.getElementById("ruler"),choicesEl=document.getElementById("choices"),starsEl=document.getElementById("stars"),celebration=document.getElementById("celebration");
  let stars=0,target=0,round=0;
  let actx=null;function tone(f,d=.15,t="sine",v=.18){try{if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator(),g=actx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(actx.destination);o.start();g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+d);o.stop(actx.currentTime+d)}catch{}}
  const S={tick:()=>tone(700,.05,"sine"),right:()=>{[523,659,784].forEach((f,i)=>setTimeout(()=>tone(f,.18,"triangle",.22),i*100))},wrong:()=>tone(220,.25,"sawtooth",.1),win:()=>{[523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,.22,"triangle",.25),i*120))}};
  function nextRound(){round++;target=Math.floor(Math.random()*6)+3;objEl.textContent=OBJS[Math.floor(Math.random()*OBJS.length)];
    rulerEl.innerHTML="";for(let i=0;i<target;i++){const c=document.createElement("div");c.className="cube";c.style.animationDelay=(i*.08)+"s";rulerEl.appendChild(c);setTimeout(()=>S.tick(),i*120);}
    const opts=new Set([target]);while(opts.size<4){const v=target+(Math.floor(Math.random()*5)-2);if(v>=1&&v<=10)opts.add(v);}
    choicesEl.innerHTML=[...opts].sort((a,b)=>a-b).map(n=>`<button class="choice" onclick="pick(${n},this)">${n}</button>`).join("");}
  window.pick=function(n,btn){[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=true);
    if(n===target){btn.classList.add("right");S.right();stars++;lightStar(stars);post(true);if(stars>=5)setTimeout(win,700);else setTimeout(nextRound,900);}
    else{btn.classList.add("wrong");S.wrong();post(false);setTimeout(()=>{btn.classList.remove("wrong");[...document.querySelectorAll(".choice")].forEach(b=>b.disabled=false);},500);}};
  function lightStar(n){const s=starsEl.querySelectorAll(".star");if(s[n-1])s[n-1].classList.add("lit");}
  function confettiBurst(){const c=["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];for(let i=0;i<50;i++){const e=document.createElement("div");e.className="confetti";e.style.left=Math.random()*100+"vw";e.style.background=c[Math.floor(Math.random()*c.length)];e.style.animationDelay=(Math.random()*.8)+"s";document.body.appendChild(e);setTimeout(()=>e.remove(),2600);}}
  function win(){S.win();confettiBurst();celebration.textContent="🎉 Measuring pro! 🎉";celebration.classList.add("show");post(true,true);setTimeout(()=>{celebration.classList.remove("show");stars=0;starsEl.querySelectorAll(".star").forEach(s=>s.classList.remove("lit"));nextRound();},2600);}
  function post(correct,complete=false){try{parent.postMessage({type:"labProgress",lab:"measure-it",round,correct,target,stars,complete},"*");}catch{}}
  nextRound();
</script>
</body>
</html>
