<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Word Builder 🐱</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
  html,body{height:100%;overflow:hidden;font-family:'Quicksand',sans-serif;background:linear-gradient(160deg,#fce7f3 0%,#fbcfe8 100%);color:#1a1612;-webkit-font-smoothing:antialiased}
  .wrap{display:flex;flex-direction:column;height:100%;padding:18px 16px;max-width:760px;margin:0 auto}
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{font-size:22px;font-weight:700;color:#be185d}
  .stars{display:flex;gap:4px;font-size:24px}
  .star{filter:grayscale(1);opacity:.35;transition:all .35s}
  .star.lit{filter:none;opacity:1;transform:scale(1.2) rotate(-8deg)}
  .question{font-size:clamp(16px,4vw,20px);font-weight:600;text-align:center;color:#1a1f3a;margin:4px 0 10px}
  .stage{flex:1;background:#fff;border-radius:24px;border:3px solid #fbcfe8;padding:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;box-shadow:0 4px 0 #fbcfe8;min-height:200px}
  .picture{font-size:clamp(70px,18vw,110px);line-height:1}
  .speaker{background:#be185d;color:#fff;border:none;border-radius:99px;padding:8px 16px;font-family:'Quicksand',sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;box-shadow:0 3px 0 #9d174d}
  .speaker:active{transform:translateY(2px);box-shadow:0 1px 0 #9d174d}
  .slots{display:flex;gap:10px}
  .slot{width:clamp(56px,15vw,76px);height:clamp(56px,15vw,76px);border:3px dashed #f472b6;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:clamp(28px,7vw,42px);font-weight:700;color:#be185d;background:#fdf2f8;text-transform:uppercase;transition:all .2s}
  .slot.filled{background:#fbcfe8;border-style:solid;border-color:#be185d;animation:popIn 0.3s}
  .slot.correct{background:#bbf7d0;border-color:#16a34a;color:#15803d}
  .slot.shake{animation:shake 0.4s}
  @keyframes popIn{from{transform:scale(0)}to{transform:scale(1)}}
  @keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .letters{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:14px}
  .letter{aspect-ratio:1;background:#fff;border:none;border-radius:14px;font-family:'Quicksand',sans-serif;font-size:clamp(22px,5vw,30px);font-weight:700;color:#1a1f3a;cursor:pointer;box-shadow:0 3px 0 #ec4899;transition:all .15s;touch-action:manipulation;text-transform:uppercase}
  .letter:active{transform:translateY(2px);box-shadow:0 1px 0 #ec4899}
  .letter:disabled{opacity:.3;cursor:default}
  .clear{background:transparent;border:none;color:#7a7367;font-family:'Quicksand',sans-serif;font-size:13px;font-weight:600;cursor:pointer;padding:6px 14px;text-decoration:underline}
  .celebration{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,9vw,54px);font-weight:700;color:#be185d;pointer-events:none;opacity:0;transition:opacity .25s;background:rgba(255,255,255,.85);text-align:center}
  .celebration.show{opacity:1}
  .confetti{position:fixed;top:-10px;width:10px;height:14px;border-radius:2px;pointer-events:none;animation:fall 1.6s linear forwards}
  @keyframes fall{to{transform:translateY(110vh) rotate(720deg)}}
  .help{font-size:12px;color:#7a7367;text-align:center;margin-top:8px;font-weight:500}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="title">🐱 Word Builder</div>
    <div class="stars" id="stars">
      <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
    </div>
  </div>
  <div class="question">Spell the word you see!</div>
  <div class="stage">
    <div class="picture" id="picture"></div>
    <button class="speaker" onclick="speak()">🔊 Say it</button>
    <div class="slots" id="slots"></div>
    <button class="clear" onclick="clearSlots()">Start over</button>
  </div>
  <div class="letters" id="letters"></div>
  <div class="help">Tap each letter in order: first sound, middle sound, last sound.</div>
</div>
<div class="celebration" id="celebration"></div>

<script>
  // CVC words across short-vowel families. Each pairs with a recognizable emoji.
  const WORDS = [
    {w:"cat", e:"🐱"}, {w:"dog", e:"🐶"}, {w:"pig", e:"🐷"}, {w:"cow", e:"🐮"},
    {w:"hen", e:"🐔"}, {w:"bug", e:"🐛"}, {w:"bat", e:"🦇"}, {w:"fox", e:"🦊"},
    {w:"bee", e:"🐝"}, {w:"owl", e:"🦉"},
    {w:"sun", e:"☀️"}, {w:"hat", e:"🎩"}, {w:"bus", e:"🚌"}, {w:"cup", e:"☕"},
    {w:"bed", e:"🛏️"}, {w:"map", e:"🗺️"}, {w:"pen", e:"🖊️"}, {w:"top", e:"🪀"},
    {w:"box", e:"📦"}, {w:"key", e:"🔑"}, {w:"car", e:"🚗"}, {w:"jet", e:"✈️"},
    {w:"pot", e:"🍲"}, {w:"web", e:"🕸️"},
  ];

  const pictureEl = document.getElementById("picture");
  const slotsEl = document.getElementById("slots");
  const lettersEl = document.getElementById("letters");
  const starsEl = document.getElementById("stars");
  const celebration = document.getElementById("celebration");
  let stars = 0, target = null, slotIdx = 0, round = 0;

  let audioCtx = null;
  function tone(f,d=0.15,t="sine",v=0.18){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}catch{}}
  const sounds = {
    tap:   () => tone(550 + Math.random()*100, 0.06, "sine"),
    good:  () => tone(700, 0.12, "triangle", 0.2),
    right: () => { [523, 659, 784].forEach((f,i) => setTimeout(() => tone(f, 0.18, "triangle", 0.22), i*100)); },
    wrong: () => tone(220, 0.2, "sawtooth", 0.1),
    win:   () => { [523, 659, 784, 1047].forEach((f,i) => setTimeout(() => tone(f, 0.22, "triangle", 0.25), i*120)); },
  };

  window.speak = function() {
    if (!target) return;
    try { const u = new SpeechSynthesisUtterance(target.w); u.rate = 0.7; u.pitch = 1.15; speechSynthesis.cancel(); speechSynthesis.speak(u); } catch {}
  };

  function nextRound() {
    round++;
    target = WORDS[Math.floor(Math.random() * WORDS.length)];
    slotIdx = 0;
    pictureEl.textContent = target.e;
    setTimeout(speak, 300);

    const len = target.w.length;
    slotsEl.innerHTML = Array.from({length: len}, () => `<div class="slot"></div>`).join("");

    // Letter pool: target letters + distractors, total 12 unique
    const used = new Set(target.w.split(""));
    const allLetters = "abcdefghijklmnopqrstuvwxyz".split("");
    const pool = new Set(used);
    while (pool.size < 12) pool.add(allLetters[Math.floor(Math.random() * 26)]);
    const arr = [...pool].sort(() => Math.random() - 0.5);
    lettersEl.innerHTML = arr.map(l => `<button class="letter" onclick="tapLetter('${l}', this)">${l}</button>`).join("");
  }

  window.tapLetter = function(letter, btn) {
    const slots = slotsEl.querySelectorAll(".slot");
    const want = target.w[slotIdx];
    sounds.tap();
    if (letter === want) {
      slots[slotIdx].textContent = letter;
      slots[slotIdx].classList.add("filled");
      slotIdx++;
      sounds.good();
      btn.disabled = true;
      if (slotIdx === target.w.length) {
        // All letters placed correctly
        slots.forEach(s => s.classList.add("correct"));
        setTimeout(() => {
          sounds.right();
          stars++; lightStar(stars);
          postProgress(true);
          if (stars >= 5) setTimeout(win, 700);
          else setTimeout(nextRound, 1100);
        }, 300);
      }
    } else {
      // Shake the next slot, don't fill
      slots[slotIdx].classList.add("shake");
      sounds.wrong();
      postProgress(false);
      setTimeout(() => slots[slotIdx].classList.remove("shake"), 400);
    }
  };

  window.clearSlots = function() {
    slotIdx = 0;
    slotsEl.querySelectorAll(".slot").forEach(s => { s.textContent = ""; s.classList.remove("filled","correct"); });
    lettersEl.querySelectorAll(".letter").forEach(b => b.disabled = false);
  };

  function lightStar(n) { const s = starsEl.querySelectorAll(".star"); if (s[n-1]) s[n-1].classList.add("lit"); }
  function confettiBurst() {
    const colors = ["#fb7185","#fbbf24","#34d399","#60a5fa","#a78bfa","#f472b6"];
    for (let i = 0; i < 50; i++) {
      const c = document.createElement("div"); c.className = "confetti";
      c.style.left = Math.random() * 100 + "vw";
      c.style.background = colors[Math.floor(Math.random() * colors.length)];
      c.style.animationDelay = (Math.random() * 0.8) + "s";
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 2600);
    }
  }
  function win() {
    sounds.win(); confettiBurst();
    celebration.textContent = "🎉 Word builder! 🎉";
    celebration.classList.add("show");
    postProgress(true, true);
    setTimeout(() => {
      celebration.classList.remove("show");
      stars = 0; starsEl.querySelectorAll(".star").forEach(s => s.classList.remove("lit"));
      nextRound();
    }, 2800);
  }
  function postProgress(correct, complete=false) {
    try { parent.postMessage({ type:"labProgress", lab:"word-builder", round, correct, word:target?.w, stars, complete }, "*"); } catch {}
  }
  nextRound();
</script>
</body>
</html>
